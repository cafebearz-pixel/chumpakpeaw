<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวงาน อบต. ชำผักแพว Online</title>

    <meta name="apple-mobile-web-app-title" content="CPP Q">
    <meta name="application-name" content="CPP Q">
    <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1KkCDCvXZThPoNsj7a8ST51V1Im91PioL&sz=w500">
    <link rel="icon" href="https://drive.google.com/thumbnail?id=1KkCDCvXZThPoNsj7a8ST51V1Im91PioL&sz=w500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = { theme: { extend: { borderRadius: { 'xl': '1rem', '2xl': '1.5rem', '3xl': '2rem' } } } }
    </script>

    <style>
        html { font-size: 18px !important; }
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .bg-main { background-color: #152D4D; }
        .text-main { color: #152D4D; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tap-effect:active { transform: scale(0.97); opacity: 0.9; }
        
        /* คลื่นสีทอง */
        .wave-text span { display: inline-block; color: #FFD700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); animation: wave 2s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .wave-text span:nth-child(1) { animation-delay: 0.1s; } .wave-text span:nth-child(2) { animation-delay: 0.2s; }
        .wave-text span:nth-child(3) { animation-delay: 0.3s; } .wave-text span:nth-child(4) { animation-delay: 0.4s; }
        .wave-text span:nth-child(5) { animation-delay: 0.5s; } .wave-text span:nth-child(6) { animation-delay: 0.6s; }
        .wave-text span:nth-child(7) { animation-delay: 0.7s; } .wave-text span:nth-child(8) { animation-delay: 0.8s; }
        .wave-text span:nth-child(9) { animation-delay: 0.9s; } .wave-text span:nth-child(10) { animation-delay: 1.0s; }
        .wave-text span:nth-child(11) { animation-delay: 1.1s; }

        /* Countdown กระพริบ */
        @keyframes pulse-orange { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }
        .animate-countdown { animation: pulse-orange 1.5s infinite; }

        /* การ์ดเด้งขึ้นลงสำหรับงานวันนี้ */
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-today-card { 
            animation: bounce-subtle 2.5s infinite; 
            border: 2px solid #ef4444 !important; 
            box-shadow: 0 15px 30px rgba(239, 68, 68, 0.15) !important; 
        }

        .glass-stat-card {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            position: relative; overflow: hidden;
        }
        .glass-stat-card .bg-icon { position: absolute; bottom: -20px; right: -15px; font-size: 90px; opacity: 0.08; transform: rotate(-15deg); }
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="max-w-6xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        
        <div class="sticky top-0 z-50 flex flex-col w-full shadow-md">
            <header class="bg-main px-5 py-4 flex justify-between items-center text-white">
                <div class="flex items-center gap-3">
                    <img src="https://drive.google.com/thumbnail?id=1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY&sz=w200" class="w-12 h-12 object-contain">
                    <div class="flex flex-col">
                        <span class="font-black text-xl sm:text-2xl tracking-wide sm:tracking-widest wave-text uppercase leading-none">
                            <span>C</span><span>H</span><span>U</span><span>M</span><span>P</span><span>A</span><span>K</span><span>P</span><span>A</span><span>E</span><span>W</span>
                        </span>
                        <span class="text-xs sm:text-sm font-medium opacity-90 leading-tight font-prompt mt-1">องค์การบริหารส่วนตำบลชำผักแพว</span>
                    </div>
                </div>
                <button onclick="handleAdminToggle()" class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center tap-effect border border-white/20">
                    <i id="adminIcon" class="fa-solid fa-user-shield text-lg"></i>
                </button>
            </header>

            <nav class="flex bg-white border-b overflow-x-auto no-scrollbar font-prompt">
                <button onclick="changePage('dashboard')" id="nav-dashboard" class="flex-1 py-4 text-main border-b-4 border-main font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-chart-line mr-2"></i>แดชบอร์ด</button>
                <button onclick="changePage('calendar')" id="nav-calendar" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-calendar-alt mr-2"></i>ปฏิทิน</button>
                <button onclick="changePage('tasks')" id="nav-tasks" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-list-check mr-2"></i>คิวทั้งหมด</button>
                <button onclick="changePage('contacts')" id="nav-contacts" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-address-book mr-2"></i>เบอร์โทร</button>
            </nav>
        </div>

        <main id="mainContent" class="flex-1 p-4 md:p-8 space-y-8 bg-[#f8fafc]">
            <div id="page-dashboard" class="space-y-8">
                
                <div class="bg-white p-5 md:p-6 rounded-[2rem] border border-gray-100 flex items-center justify-between shadow-sm hover:shadow-md transition-all tap-effect relative">
                    <div class="flex items-center gap-4 md:gap-5">
                        <div class="relative">
                            <img src="https://drive.google.com/thumbnail?id=1ET2DmRqMeDl1f13eL9EZpxr_FNvtZpwM&sz=w200" class="w-16 h-16 md:w-20 md:h-20 rounded-2xl object-cover shadow-sm border-2 border-white">
                            <div id="statusDot" class="absolute -bottom-1 -right-1 w-5 h-5 md:w-6 md:h-6 rounded-full border-4 border-white bg-green-500 shadow-sm"></div>
                        </div>
                        <div>
                            <h2 class="font-black text-main text-lg md:text-xl leading-tight">นายกณัฐรดา กล้าหาญ</h2>
                            <p id="statusText" class="text-sm text-gray-500 font-medium font-prompt mt-0.5">กำลังเชื่อมต่อ...</p>
                        </div>
                    </div>
                    <button id="admin-status-btn" onclick="openModal('statusModal')" class="hidden absolute top-5 right-5 md:relative md:top-0 md:right-0 w-10 h-10 rounded-xl bg-gray-50 border border-gray-100 flex items-center justify-center tap-effect hover:bg-gray-100 transition-all"><i class="fa-solid fa-pen text-sm text-gray-400"></i></button>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="glass-stat-card p-5 rounded-[2rem] text-indigo-700">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">ทั้งหมด</p><h3 id="stat-total" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-folder-tree bg-icon"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-[2rem] text-amber-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">รอดำเนินการ</p><h3 id="stat-pending" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-clock-rotate-left bg-icon"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-[2rem] text-emerald-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">กำลังทำ</p><h3 id="stat-active" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-spinner bg-icon animate-spin-slow"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-[2rem] text-red-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">เสร็จสิ้น</p><h3 id="stat-done" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-check-double bg-icon"></i>
                    </div>
                </div>

                <div id="dashboardTaskList" class="w-full">
                    <div class="py-12 text-center text-gray-400 font-prompt">
                        <i class="fa-solid fa-spinner animate-spin text-3xl mb-3 text-main"></i>
                        <p>กำลังเชื่อมต่อฐานข้อมูล...</p>
                    </div>
                </div>
            </div>

            <div id="page-calendar" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 max-w-3xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="prevMonth()" class="w-10 h-10 rounded-full bg-gray-50 border tap-effect"><i class="fa-solid fa-chevron-left text-gray-500"></i></button>
                        <h3 id="currentMonthYear" class="font-black text-main text-lg uppercase"></h3>
                        <button onclick="nextMonth()" class="w-10 h-10 rounded-full bg-gray-50 border tap-effect"><i class="fa-solid fa-chevron-right text-gray-500"></i></button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center font-bold text-xs text-gray-400 mb-4 uppercase border-b pb-4">
                        <div class="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-400">ส</div>
                    </div>
                    <div id="daysGrid" class="grid grid-cols-7 gap-2"></div>
                </div>
                <div id="selectedDateTasks" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="page-tasks" class="hidden space-y-6">
                <h2 class="font-black text-main text-lg border-l-4 border-blue-500 pl-3 uppercase mb-4">สถานะคิวทั้งหมด</h2>
                <div id="fullTaskList" class="w-full"></div>
            </div>

            <div id="page-contacts" class="hidden space-y-6">
                <div class="max-w-3xl mx-auto space-y-6">
                    <div class="relative">
                        <input type="text" id="contactSearch" onkeyup="renderContacts(this.value)" placeholder="ค้นหารายชื่อ ชื่อเล่น หรือ ตำแหน่ง..." class="w-full p-4 pl-12 bg-white rounded-2xl shadow-md border-none outline-none focus:ring-2 focus:ring-main font-prompt">
                        <i class="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    </div>
                    <button id="admin-add-contact" onclick="openContactModal()" class="hidden w-full py-4 bg-indigo-50 text-indigo-700 rounded-2xl font-black border-2 border-dashed border-indigo-200 tap-effect">
                        <i class="fa-solid fa-user-plus mr-2"></i> เพิ่มรายชื่อใหม่
                    </button>
                    <div id="contactGroups" class="space-y-8"></div>
                </div>
            </div>
        </main>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden fixed bottom-8 right-6 md:bottom-10 md:right-10 w-16 h-16 bg-main text-white rounded-3xl shadow-2xl flex items-center justify-center text-3xl z-[60] border-4 border-white transform tap-effect">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm font-prompt">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="taskModalTitle" class="text-2xl font-black text-main">บันทึกคิวงาน</h2>
                <button onclick="closeModal('taskModal')" class="text-gray-400 hover:text-red-500 tap-effect"><i class="fa-solid fa-times text-2xl"></i></button>
            </div>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="taskEditId">
                <input type="text" id="t-title" placeholder="ชื่องาน/ภารกิจ" required class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none font-bold text-main">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">วันที่เริ่ม</label><input type="date" id="t-startDate" required class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">เวลาเริ่ม</label><input type="time" id="t-startTime" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">วันที่สิ้นสุด (ถ้ามี)</label><input type="date" id="t-endDate" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">เวลาสิ้นสุด (ถ้ามี)</label><input type="time" id="t-endTime" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm"></div>
                </div>
                
                <select id="t-status" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100"><option>รอดำเนินการ</option><option>กำลังดำเนินการ</option><option>เสร็จสิ้น</option></select>
                <input type="text" id="t-loc" placeholder="สถานที่" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="text" id="t-dress" placeholder="การแต่งกาย" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="text" id="t-coord" placeholder="ผู้ประสานงาน" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <select id="t-owner" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <option>นายก อบต.</option>
                    <option>รองนายก อบต.</option>
                    <option>เลขานุการนายก</option>
                    <option>ปลัด อบต.</option>
                    <option>รองปลัด อบต.</option>
                    <option>สำนักปลัด</option>
                    <option>กองช่าง</option>
                    <option>กองคลัง</option>
                    <option>กองการศึกษาฯ</option>
                    <option>กองสวัสดิการสังคม</option>
                    <option>กองสาธารณสุขและสิ่งแวดล้อม</option>
                    <option>ประธานสภาฯ</option>
                    <option>รองประธานสภาฯ</option>
                    <option>สมาชิกสภาฯ</option>
                    <option>อื่นๆ</option>
                </select>
                <input type="url" id="t-link" placeholder="ลิงก์แนบไฟล์ Google Drive (ถ้ามี)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-sm">
                
                <div class="pt-4 flex gap-3">
                    <button type="button" id="btnDeleteTask" onclick="deleteTask()" class="hidden px-5 bg-red-50 text-red-500 rounded-2xl tap-effect"><i class="fa-solid fa-trash"></i></button>
                    <button type="button" onclick="closeModal('taskModal')" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold tap-effect">ยกเลิก</button>
                    <button type="submit" id="btnSaveTask" class="flex-1 py-4 bg-main text-white rounded-2xl font-bold shadow-lg tap-effect">บันทึกคิวงาน</button>
                </div>
            </form>
        </div>
    </div>

    <div id="contactModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm font-prompt">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border-t-8 border-indigo-600">
            <h2 id="contactModalTitle" class="text-xl font-black text-indigo-900 mb-6 uppercase">จัดการรายชื่อ</h2>
            <form id="contactForm" class="space-y-4">
                <input type="hidden" id="contactEditId">
                <input type="text" id="c-name" placeholder="ชื่อ-นามสกุล" required class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 font-bold">
                <input type="text" id="c-nickname" placeholder="ชื่อเล่น" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="text" id="c-role" placeholder="ตำแหน่ง" required class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="tel" id="c-tel" placeholder="เบอร์โทรศัพท์" required class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 font-bold">
                <select id="c-group" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <option value="1">1. ผู้บริหาร</option><option value="2">2. ข้าราชการ</option><option value="3">3. พนักงานจ้าง</option><option value="4">4. พนักงานจ้างเหมา</option><option value="5">5. สมาชิก อบต.</option><option value="6">6. กำนัน</option><option value="7">7. ผู้ใหญ่บ้าน</option><option value="8">8. ผู้ช่วยผู้ใหญ่บ้าน</option>
                </select>
                <div class="flex gap-3 pt-6">
                    <button type="button" onclick="closeModal('contactModal')" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold tap-effect">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg tap-effect">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md font-prompt">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center">
            <div class="w-16 h-16 bg-main rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-lock text-white text-2xl"></i></div>
            <h2 class="text-xl font-black text-main mb-6 uppercase tracking-widest">Admin</h2>
            <input type="password" id="adminPassword" placeholder="••••" class="w-full p-4 bg-gray-50 rounded-2xl text-center font-black mb-8 outline-none text-2xl tracking-[0.5em] border focus:border-main focus:ring-1">
            <div class="flex gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 py-3 rounded-2xl text-gray-400 font-bold bg-gray-100 tap-effect">ยกเลิก</button>
                <button onclick="verifyAdminLogin()" class="flex-1 py-3 rounded-2xl bg-main text-white font-bold tap-effect">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div id="statusModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm font-prompt">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center border-t-8 border-emerald-500 shadow-2xl">
            <h3 class="mb-6 text-main leading-tight font-black text-xl">อัปเดตสถานะนายก</h3>
            <div class="grid gap-3">
                <button onclick="updateMayorStatus('อยู่อบต./ห้องทำงาน', 'bg-green-500')" class="p-4 bg-green-50 text-green-700 font-bold rounded-2xl tap-effect hover:bg-green-100 text-lg border border-green-100">🟢 อยู่อบต.</button>
                <button onclick="updateMayorStatus('ลงพื้นที่/ติดภารกิจ', 'bg-amber-500')" class="p-4 bg-amber-50 text-amber-700 font-bold rounded-2xl tap-effect hover:bg-amber-100 text-lg border border-amber-100">🟡 ลงพื้นที่</button>
                <button onclick="updateMayorStatus('ไม่อยู่อบต.', 'bg-red-500')" class="p-4 bg-red-50 text-red-700 font-bold rounded-2xl tap-effect hover:bg-red-100 text-lg border border-red-100">🔴 ไม่อยู่อบต.</button>
            </div>
            <button onclick="closeModal('statusModal')" class="mt-6 text-gray-400 tap-effect uppercase text-sm font-bold bg-gray-50 px-6 py-3 rounded-xl w-full">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script>

        const firebaseConfig = {

            authDomain: "flutter-ai-playground-ca0f3.firebaseapp.com",

        function updateAdminUI() {

        function getDiffDays(startStr, endStr) {
            const today = new Date(); today.setHours(0,0,0,0);
            const start = new Date(startStr); start.setHours(0,0,0,0);
            let end = start;
            if(endStr) { end = new Date(endStr); end.setHours(0,0,0,0); }
            
            if(today >= start && today <= end) return 0; // ถือว่าเป็น "วันนี้" ตลอดช่วงวันเชื่อม
            return Math.ceil((start - today) / 86400000);
        }

        // ✅ ฟังก์ชันจัดรูปแบบวันที่แบบช่วง (วันเชื่อม)
        function formatDateRangeThai(startStr, endStr) {
            if(!startStr) return '';
            const days = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            
            const d1 = new Date(startStr);
            if(isNaN(d1.getTime())) return startStr;

            if(!endStr || startStr === endStr) {
                return days[d1.getDay()] + " " + d1.getDate() + " " + months[d1.getMonth()] + " " + (d1.getFullYear() + 543);
            }

            const d2 = new Date(endStr);
            if(isNaN(d2.getTime())) return startStr + ' ถึง ' + endStr;

            const y1 = d1.getFullYear() + 543;
            const y2 = d2.getFullYear() + 543;
            const m1 = months[d1.getMonth()];
            const m2 = months[d2.getMonth()];
            const day1 = d1.getDate();
            const day2 = d2.getDate();

            if (y1 === y2) {
                if (m1 === m2) {
                    return day1 + "-" + day2 + " " + m1 + " " + y1;
                } else {
                    return day1 + " " + m1 + " - " + day2 + " " + m2 + " " + y1;
                }
            } else {
                return day1 + " " + m1 + " " + y1 + " - " + day2 + " " + m2 + " " + y2;
            }
        }

        function formatThaiDate(dateStr) {
            if(!dateStr) return '';
            const days = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return dateStr;
            return days[d.getDay()] + " " + d.getDate() + " " + months[d.getMonth()] + " " + (d.getFullYear() + 543);
        }

        function taskCardHTML(t, isTodayTask) {
            const diff = getDiffDays(t.startDate, t.endDate);
            let countdown = '';
            if(diff === 0) countdown = '<div class="absolute -top-3 -right-2 bg-red-600 text-white text-[11px] font-black px-3 py-1.5 rounded-full animate-countdown shadow-lg">วันนี้!</div>';
            else if(diff > 0 && diff <= 10) countdown = '<div class="absolute -top-3 -right-2 bg-orange-500 text-white text-[11px] font-black px-3 py-1.5 rounded-full animate-countdown shadow-lg">อีก ' + diff + ' วันจะถึงงาน</div>';
            
            let html = '<div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 relative tap-effect ' + (isTodayTask?'animate-today-card':'') + ' font-prompt hover:shadow-md transition-all">';
            html += countdown;
            html += '<div class="flex justify-between items-center mb-4"><span class="bg-blue-50 text-main px-3 py-1.5 rounded-xl text-sm font-bold"><i class="fa-regular fa-clock mr-1"></i>' + (t.startTime||'ไม่ระบุเวลา') + '</span><span class="text-[10px] border px-2 py-1 rounded-lg uppercase text-gray-400 font-bold">' + t.status + '</span></div>';
            html += '<h4 class="font-bold text-xl leading-tight mb-4 text-gray-800">' + t.title + '</h4>';
            html += '<div class="text-sm text-gray-500 space-y-2">';
            // ✅ เปลี่ยนมาใช้ฟังก์ชันวันเชื่อมตรงนี้
            html += '<p><i class="fa-solid fa-calendar-day mr-2 text-main w-4"></i><span class="font-medium">' + formatDateRangeThai(t.startDate, t.endDate) + '</span></p>';
            html += '<p><i class="fa-solid fa-location-dot mr-2 text-main w-4"></i>' + (t.loc||'-') + '</p>';
            html += '<p><i class="fa-solid fa-shirt mr-2 text-main w-4"></i>การแต่งกาย: ' + (t.dress||'-') + '</p>';
            html += '<p><i class="fa-solid fa-user mr-2 text-main w-4"></i>รับผิดชอบ: <span class="text-main font-medium">' + t.owner + '</span></p>';
            if(t.coord) html += '<p><i class="fa-solid fa-handshake mr-2 text-main w-4"></i>ประสานงาน: ' + t.coord + '</p>';
            html += '</div>';
            if(t.link) html += '<a href="' + t.link + '" target="_blank" class="block mt-5 text-center py-2.5 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold border border-blue-100 hover:bg-blue-100 transition-all"><i class="fa-brands fa-google-drive mr-2"></i>เปิดไฟล์เอกสารแนบ</a>';
            if(window.isAdmin) html += '<button onclick="editTask(\'' + t.id + '\')" class="absolute bottom-6 right-6 w-10 h-10 bg-gray-50 text-gray-400 rounded-xl flex items-center justify-center border hover:text-main hover:bg-white transition-all"><i class="fa-solid fa-pen"></i></button>';
            html += '</div>';
            return html;
        }

        function renderAll() {
            document.getElementById('stat-total').innerText = window.tasks.length;
            document.getElementById('stat-pending').innerText = window.tasks.filter(function(t){return t.status==='รอดำเนินการ';}).length;
            document.getElementById('stat-active').innerText = window.tasks.filter(function(t){return t.status==='กำลังดำเนินการ';}).length;
            document.getElementById('stat-done').innerText = window.tasks.filter(function(t){return t.status==='เสร็จสิ้น';}).length;

            const d = new Date();
            const yyyy = d.getFullYear();
            let mm = d.getMonth() + 1; if(mm<10) mm='0'+mm;
            let dd = d.getDate(); if(dd<10) dd='0'+dd;
            const todayStr = yyyy + '-' + mm + '-' + dd;

            if (window.currentPage === 'dashboard') {
                const dashContainer = document.getElementById('dashboardTaskList');
                
                // ✅ แก้ไขให้เช็คงานที่คร่อม "วันนี้" (วันเชื่อม) ให้ขึ้นโชว์ด้วย
                const todayTasks = window.tasks.filter(function(t){
                    if(!t.endDate || t.endDate === "") return t.startDate === todayStr;
                    return todayStr >= t.startDate && todayStr <= t.endDate;
                });
                
                const upcomingTasksAll = window.tasks.filter(function(t){
                    return t.startDate > todayStr;
                });
                upcomingTasksAll.sort(function(a,b){
                    if(a.startDate < b.startDate) return -1;
                    if(a.startDate > b.startDate) return 1;
                    return 0;
                });
                const upcomingTasks = upcomingTasksAll.slice(0, 10);

                let html = '';
                html += '<div class="mb-10"><h2 class="font-black text-main text-lg border-l-4 border-main pl-3 mb-4 uppercase tracking-widest">คิวงานวันนี้</h2>';
                html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
                if(todayTasks.length > 0) {
                    for(let i=0; i<todayTasks.length; i++) html += taskCardHTML(todayTasks[i], true); 
                } else {
                    html += '<div class="col-span-full bg-white rounded-[2rem] p-8 border border-dashed border-gray-200 text-center shadow-sm"><p class="text-gray-400 font-prompt"><i class="fa-regular fa-calendar-xmark text-3xl mb-3 block opacity-50"></i>ไม่มีคิวงานในวันนี้</p></div>';
                }
                html += '</div></div>';
                
                html += '<div><h2 class="font-black text-blue-500 text-lg border-l-4 border-blue-500 pl-3 mb-4 uppercase tracking-widest">คิวงานวันถัดไป (10 คิวล่าสุด)</h2>';
                html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
                if(upcomingTasks.length > 0) {
                    for(let i=0; i<upcomingTasks.length; i++) html += taskCardHTML(upcomingTasks[i], false); 
                } else {
                    html += '<div class="col-span-full bg-white rounded-[2rem] p-8 border border-dashed border-gray-200 text-center shadow-sm"><p class="text-gray-400 font-prompt">ไม่มีคิวงานถัดไป</p></div>';
                }
                html += '</div></div>';
                dashContainer.innerHTML = html;
            }

            if (window.currentPage === 'calendar') {
                const grid = document.getElementById('daysGrid'); 
                grid.innerHTML = '';
                const y = currentViewDate.getFullYear();
                const m = currentViewDate.getMonth();
                const names = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                document.getElementById('currentMonthYear').innerText = names[m] + " " + (y+543);
                
                const first = new Date(y,m,1).getDay();
                const total = new Date(y,m+1,0).getDate();
                
                for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
                for(let d=1; d<=total; d++) {
                    let sm = m + 1; if(sm<10) sm='0'+sm;
                    let sd = d; if(sd<10) sd='0'+sd;
                    const dateKey = sm + '-' + sd;
                    const fullDate = y + '-' + dateKey;
                    
                    let hasTask = false;
                    for(let k=0; k<window.tasks.length; k++){
                        let t = window.tasks[k];
                        // ✅ จุดแจ้งเตือนในปฏิทิน ต้องแสดงทุกวันที่คาบเกี่ยวกัน
                        if(!t.endDate || t.endDate === "") {
                            if(t.startDate === fullDate) { hasTask = true; break; }
                        } else {
                            if(fullDate >= t.startDate && fullDate <= t.endDate) { hasTask = true; break; }
                        }
                    }
                    
                    const h = holidays2026[dateKey];
                    let btnHTML = '<button onclick="showDayTasks(\'' + fullDate + '\',\'' + (h||'') + '\')" class="h-12 flex flex-col items-center justify-center rounded-2xl hover:bg-blue-50 relative tap-effect border border-transparent hover:border-blue-100 transition-all">';
                    btnHTML += '<span class="' + (h?'text-red-500 font-bold':'text-gray-700 font-medium') + ' text-sm">' + d + '</span>';
                    if(hasTask) btnHTML += '<div class="w-1.5 h-1.5 bg-main rounded-full mt-1"></div>';
                    btnHTML += '</button>';
                    grid.innerHTML += btnHTML;
                }
            }

            if (window.currentPage === 'tasks') {
                const fullList = document.getElementById('fullTaskList');
                
                const activeTasks = window.tasks.filter(function(t){return t.status === 'กำลังดำเนินการ';}).sort(function(a,b){return a.startDate < b.startDate ? -1 : 1;});
                const pendingTasks = window.tasks.filter(function(t){return t.status === 'รอดำเนินการ';}).sort(function(a,b){return a.startDate < b.startDate ? -1 : 1;});
                const doneTasks = window.tasks.filter(function(t){return t.status === 'เสร็จสิ้น';}).sort(function(a,b){return a.startDate > b.startDate ? -1 : 1;}); 

                function buildTaskGroup(title, icon, colorClass, badgeClass, tasksArr, isOpen) {
                    let html = '<details class="bg-white rounded-[2rem] shadow-sm border border-gray-100 mb-5 group" ' + (isOpen ? 'open' : '') + '>';
                    html += '<summary class="font-black text-main text-lg p-5 cursor-pointer list-none flex justify-between items-center tap-effect outline-none [&::-webkit-details-marker]:hidden">';
                    html += '<div class="flex items-center gap-3"><i class="' + icon + ' ' + colorClass + '"></i> ' + title + ' <span class="' + badgeClass + ' text-xs px-3 py-1 rounded-full">' + tasksArr.length + '</span></div>';
                    html += '<i class="fa-solid fa-chevron-down transition-transform group-open:rotate-180 text-gray-400"></i>';
                    html += '</summary>';
                    html += '<div class="p-5 pt-0 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 border-t border-gray-50 mt-2 pt-5">';
                    if(tasksArr.length > 0) {
                        for(let i=0; i<tasksArr.length; i++) {
                            // ✅ ประเมินค่าว่างานนี้เป็นของวันนี้หรือไม่ เพื่อให้มันเด้ง
                            let isToday = false;
                            if(!tasksArr[i].endDate || tasksArr[i].endDate === "") isToday = (tasksArr[i].startDate === todayStr);
                            else isToday = (todayStr >= tasksArr[i].startDate && todayStr <= tasksArr[i].endDate);
                            
                            html += taskCardHTML(tasksArr[i], isToday);
                        }
                    } else {
                        html += '<p class="text-center text-gray-300 py-6 w-full col-span-full font-prompt">ไม่มีคิวงานในสถานะนี้</p>';
                    }
                    html += '</div></details>';
                    return html;
                }

                let html = '';
                html += buildTaskGroup('กำลังดำเนินการ', 'fa-solid fa-spinner', 'text-emerald-500', 'bg-emerald-50 text-emerald-600', activeTasks, true);
                html += buildTaskGroup('รอดำเนินการ', 'fa-solid fa-clock-rotate-left', 'text-amber-500', 'bg-amber-50 text-amber-600', pendingTasks, true);
                html += buildTaskGroup('เสร็จสิ้น', 'fa-solid fa-check-double', 'text-red-500', 'bg-red-50 text-red-600', doneTasks, false);

                fullList.innerHTML = html;
            }
            
            if (window.currentPage === 'contacts') renderContacts();
        }

        function showDayTasks(date, h) {
            const container = document.getElementById('selectedDateTasks');
            
            // ✅ ดึงงานเฉพาะวันที่กด (รวมงานวันเชื่อมด้วย)
            const dayTasks = window.tasks.filter(function(t){
                if(!t.endDate || t.endDate === "") return t.startDate === date;
                return date >= t.startDate && date <= t.endDate;
            });
            
            const thaiDate = formatThaiDate(date);
            
            const d = new Date();
            const yyyy = d.getFullYear();
            let mm = d.getMonth() + 1; if(mm<10) mm='0'+mm;
            let dd = d.getDate(); if(dd<10) dd='0'+dd;
            const todayStr = yyyy + '-' + mm + '-' + dd;
            
            let head = '<div class="col-span-full p-4 bg-white rounded-[2rem] border border-gray-100 shadow-sm font-prompt text-center"><p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">วันที่เลือก</p><p class="font-black text-main text-xl">' + thaiDate + '</p>';
            if(h) head += '<div class="mt-3 inline-block bg-red-50 text-red-500 font-bold text-sm px-4 py-2 rounded-xl"><i class="fa-solid fa-flag mr-2"></i>วันหยุดราชการ: ' + h + '</div>';
            head += '</div>';
            
            let bodyHTML = '';
            if(dayTasks.length > 0) {
                for(let i=0; i<dayTasks.length; i++) {
                    let isToday = false;
                    if(!dayTasks[i].endDate || dayTasks[i].endDate === "") isToday = (dayTasks[i].startDate === todayStr);
                    else isToday = (todayStr >= dayTasks[i].startDate && todayStr <= dayTasks[i].endDate);
                    
                    bodyHTML += taskCardHTML(dayTasks[i], isToday);
                }
            } else {
                bodyHTML = '<div class="col-span-full bg-white rounded-[2rem] p-8 border border-dashed border-gray-200 text-center"><p class="text-gray-400 font-prompt">ไม่มีคิวงานในวันนี้</p></div>';
            }
            container.innerHTML = head + bodyHTML;
        }

        function renderContacts(query) {
            if(query === undefined) query = '';
            const container = document.getElementById('contactGroups'); if(!container) return;
            const groups = { "1":"ผู้บริหาร","2":"ข้าราชการ","3":"พนักงานจ้าง","4":"พนักงานจ้างเหมา","5":"สมาชิก อบต.","6":"กำนัน","7":"ผู้ใหญ่บ้าน","8":"ผู้ช่วยผู้ใหญ่บ้าน" };
            container.innerHTML = '';
            
            let gKeys = Object.keys(groups);
            for(let i=0; i<gKeys.length; i++) {
                let g = gKeys[i];
                let list = [];
                for(let j=0; j<window.contacts.length; j++){
                    let c = window.contacts[j];
                    if(c.group === g && (c.name.indexOf(query) > -1 || c.role.indexOf(query) > -1 || (c.nickname && c.nickname.indexOf(query) > -1))) {
                        list.push(c);
                    }
                }
                
                if(list.length > 0) {
                    let html = '<div class="space-y-4 font-prompt"><h4 class="text-xs font-black text-gray-400 uppercase pl-3 border-l-4 border-gray-200 ml-1 mb-2 tracking-widest">' + groups[g] + '</h4>';
                    for(let k=0; k<list.length; k++){
                        let m = list[k];
                        html += '<div class="bg-white p-5 rounded-[2rem] border border-gray-100 flex items-center justify-between shadow-sm tap-effect hover:shadow-md transition-all">';
                        html += '<div onclick="window.location=\'tel:' + m.tel + '\'" class="flex-1">';
                        html += '<p class="font-bold text-main text-lg leading-tight mb-1"><i class="fa-solid fa-circle-user mr-3 text-main w-5"></i>' + m.name + '</p>';
                        html += '<p class="text-[15px] text-main font-medium mb-1 leading-tight"><i class="fa-solid fa-heart mr-3 text-main w-5 opacity-40"></i>' + (m.nickname || '-') + '</p>';
                        html += '<p class="text-[15px] text-gray-500 font-normal mb-3 leading-tight"><i class="fa-solid fa-briefcase mr-3 text-main w-5 opacity-40"></i>' + m.role + '</p>';
                        html += '<p class="text-xl font-black text-main tracking-widest leading-tight"><i class="fa-solid fa-mobile-retro mr-3 text-main w-5 opacity-40 text-sm"></i>' + m.tel + '</p>';
                        html += '</div>';
                        html += '<div class="flex flex-col items-center gap-3">';
                        html += '<a href="tel:' + m.tel + '" class="w-14 h-14 bg-green-50 text-green-600 rounded-[1.5rem] flex items-center justify-center shadow-sm hover:bg-green-100"><i class="fa-solid fa-phone text-xl"></i></a>';
                        if(window.isAdmin) {
                            html += '<div class="flex gap-2 bg-gray-50 px-3 py-2 rounded-xl border border-gray-100">';
                            html += '<button onclick="editContact(\'' + m.id + '\')" class="text-gray-400 hover:text-main w-6 h-6 flex items-center justify-center"><i class="fa-solid fa-pen text-sm"></i></button>';
                            html += '<button onclick="deleteContact(\'' + m.id + '\')" class="text-red-300 hover:text-red-500 w-6 h-6 flex items-center justify-center"><i class="fa-solid fa-trash text-sm"></i></button>';
                            html += '</div>';
                        }
                        html += '</div></div>';
                    }
                    html += '</div>';
                    container.innerHTML += html;
                }
            }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth()-1); renderAll(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth()+1); renderAll(); }
        
        function openTaskModal() { 
            document.getElementById('taskForm').reset(); 
            document.getElementById('taskEditId').value = ''; 
            document.getElementById('btnDeleteTask').classList.add('hidden'); 
            openModal('taskModal'); 
        }
        function editTask(id) { 
            let t = null;
            for(let i=0; i<window.tasks.length; i++){ if(window.tasks[i].id == id) { t = window.tasks[i]; break; } }
            if(!t) return; 
            document.getElementById('taskEditId').value = t.id; 
            
            const keys = ['title','startDate','startTime','endDate','endTime','status','loc','dress','coord','owner','link'];
            for(let i=0; i<keys.length; i++) {
                const el = document.getElementById('t-' + keys[i]);
                if(el) el.value = t[keys[i]] || '';
            }
            document.getElementById('btnDeleteTask').classList.remove('hidden'); 
            openModal('taskModal'); 
        }
        
        document.getElementById('taskForm').onsubmit = function(e) { 
            e.preventDefault(); 
            const btn = document.getElementById('btnSaveTask');
            const originalText = btn.innerText;
            btn.innerText = 'กำลังบันทึก...';
            btn.disabled = true;

            const id = document.getElementById('taskEditId').value || new Date().getTime().toString(); 
            let data = { id: id }; 
            const keys = ['title','startDate','startTime','endDate','endTime','status','loc','dress','coord','owner','link'];
            for(let i=0; i<keys.length; i++) {
                data[keys[i]] = document.getElementById('t-' + keys[i]).value;
            }
            
            let idx = -1;
            for(let i=0; i<window.tasks.length; i++){ if(window.tasks[i].id === id) { idx = i; break; } }
            if(idx > -1) window.tasks[idx] = data; else window.tasks.push(data); 
            
            window.saveToCloud(window.tasks, window.contacts, window.mayorStatus); 

            // ส่งข้อมูลไปเก็บที่ Google Sheets (Backup)
            const scriptURL = 'https://script.google.com/macros/s/AKfycbx2WLgayblJSdhnA_Ad0Bjeng0tjn4aw7UzngKCctWOHJJYDCruvw1hpsSr4t-bNe8ogQ/exec';
            
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(function() {
                btn.innerText = originalText;
                btn.disabled = false;
                closeModal('taskModal'); 
            }).catch(function(error) {
                console.error('Sheets Backup Error:', error.message);
                btn.innerText = originalText;
                btn.disabled = false;
                closeModal('taskModal'); 
            });
        };

        function deleteTask() { 
            if(confirm('ยืนยันการลบคิวงานนี้ถาวร?')) { 
                const id = document.getElementById('taskEditId').value;
                let newTasks = [];
                for(let i=0; i<window.tasks.length; i++){ if(window.tasks[i].id !== id) newTasks.push(window.tasks[i]); }
                window.tasks = newTasks;
                window.saveToCloud(window.tasks, window.contacts, window.mayorStatus); 
                closeModal('taskModal'); 
            } 
        }

        function openContactModal() { document.getElementById('contactForm').reset(); document.getElementById('contactEditId').value = ''; openModal('contactModal'); }
        function editContact(id) { 
            let c = null;
            for(let i=0; i<window.contacts.length; i++){ if(window.contacts[i].id == id) { c = window.contacts[i]; break; } }
            if(!c) return; 
            document.getElementById('contactEditId').value = c.id; 
            const keys = ['name','nickname','role','tel','group'];
            for(let i=0; i<keys.length; i++) {
                const el = document.getElementById('c-' + keys[i]);
                if(el) el.value = c[keys[i]] || '';
            }
            openModal('contactModal'); 
        }
        document.getElementById('contactForm').onsubmit = function(e) { 
            e.preventDefault(); 
            const id = document.getElementById('contactEditId').value || new Date().getTime().toString(); 
            let data = { id: id }; 
            const keys = ['name','nickname','role','tel','group'];
            for(let i=0; i<keys.length; i++) {
                data[keys[i]] = document.getElementById('c-' + keys[i]).value;
            }
            
            let idx = -1;
            for(let i=0; i<window.contacts.length; i++){ if(window.contacts[i].id === id) { idx = i; break; } }
            if(idx > -1) window.contacts[idx] = data; else window.contacts.push(data); 
            
            window.saveToCloud(window.tasks, window.contacts, window.mayorStatus); 
            closeModal('contactModal'); 
        };
        
        function deleteContact(id) { 
            if(confirm('ยืนยันการลบรายชื่อนี้?')) { 
                let newContacts = [];
                for(let i=0; i<window.contacts.length; i++){ if(window.contacts[i].id !== id) newContacts.push(window.contacts[i]); }
                window.contacts = newContacts;
                window.saveToCloud(window.tasks, window.contacts, window.mayorStatus); 
            } 
        }

        function updateMayorStatus(txt, cls) {
            window.mayorStatus = { text: txt, color: cls };
            window.saveToCloud(window.tasks, window.contacts, window.mayorStatus);
            closeModal('statusModal');
        }
    </script>
</body>
