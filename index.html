<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHUMPAKPAEW - SAO Chief Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #1a2b48;
            --accent-blue: #3b82f6;
            --bg-light: #f8fafc;
            --text-dark: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); }

        /* Header Section */
        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .profile-info { display: flex; align-items: center; gap: 10px; }
        .logo-circle { width: 40px; height: 40px; background: white; border-radius: 50%; overflow: hidden; }

        /* Status Bar */
        .status-card {
            background: white;
            margin: 10px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .status-dot { width: 15px; height: 15px; background: #4ade80; border-radius: 50%; border: 2px solid #fff; outline: 2px solid #4ade80; }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
        }
        .tab-item {
            flex: 1;
            padding: 15px 5px;
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-item.active {
            color: var(--accent-blue);
            border-bottom: 3px solid var(--accent-blue);
        }
        .tab-item i { display: block; font-size: 1.2rem; margin-bottom: 5px; }

        /* Content Area */
        .content-section { padding: 15px; display: none; }
        .content-section.active { display: block; }

        /* Dashboard Cards */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .stat-card .num { font-size: 2rem; font-weight: 500; margin-top: 10px; color: var(--accent-blue); }
        .tag { font-size: 0.7rem; position: absolute; top: 15px; right: 15px; padding: 2px 8px; border-radius: 10px; background: #eff6ff; }

        /* Contact Card */
        .contact-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
            border-left: 5px solid #8b5cf6;
        }

        /* Bottom Floating Social */
        .social-float {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .social-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <div class="profile-info">
            <div class="logo-circle"><img src="https://via.placeholder.com/40" alt="logo"></div>
            <div>
                <div style="font-weight: 500; font-size: 0.9rem;">CHUMPAKPAEW</div>
                <div style="font-size: 0.7rem; opacity: 0.8;">SAO Chief Schedule</div>
            </div>
        </div>
        <div style="display: flex; gap: 15px;">
            <i class="fa-solid fa-rotate-right"></i>
            <i class="fa-solid fa-user-gear"></i>
        </div>
    </header>

    <div class="status-card">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-building-user" style="color: var(--accent-blue); font-size: 1.5rem;"></i>
            <div>
                <div style="font-weight: 500;">นายกณัฐรดา</div>
                <div style="font-size: 0.8rem; color: #64748b;">สถานะ: เข้า อบต. (อยู่ห้อง)</div>
            </div>
        </div>
        <div class="status-dot"></div>
    </div>

    <nav class="nav-tabs">
        <div class="tab-item active" onclick="showTab('dashboard')"><i class="fa-solid fa-grip"></i>แดชบอร์ด</div>
        <div class="tab-item" onclick="showTab('calendar')"><i class="fa-solid fa-calendar-days"></i>ปฏิทิน</div>
        <div class="tab-item" onclick="showTab('tasks')"><i class="fa-solid fa-list-check"></i>งานทั้งหมด</div>
        <div class="tab-item" onclick="showTab('contacts')"><i class="fa-solid fa-phone"></i>สมุดเบอร์</div>
    </nav>

    <div id="dashboard" class="content-section active">
        <div class="grid-container">
            <div class="stat-card"><span class="tag">ทั้งหมด</span><i class="fa-regular fa-clipboard"></i><div class="num">0</div></div>
            <div class="stat-card"><span class="tag">รอดำเนินการ</span><i class="fa-regular fa-clock"></i><div class="num">0</div></div>
            <div class="stat-card"><span class="tag" style="background:#fef3c7">กำลังดำเนินการ</span><i class="fa-regular fa-sun"></i><div class="num">0</div></div>
            <div class="stat-card"><span class="tag" style="background:#dcfce7">เสร็จสิ้น</span><i class="fa-regular fa-circle-check"></i><div class="num">0</div></div>
        </div>
        <p style="text-align: center; margin-top: 50px; color: #94a3b8;">ไม่มีงานวันนี้</p>
    </div>

    <div id="contacts" class="content-section">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" placeholder="ค้นหาชื่อ, เบอร์..." style="flex:1; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0;">
            <button style="background: var(--accent-blue); color: white; border: none; padding: 10px 15px; border-radius: 10px;"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div class="contact-card">
            <div style="display: flex; justify-content: space-between;">
                <strong>คุณสัญญา</strong>
                <div><i class="fa-solid fa-pen" style="margin-right:10px; color:#64748b"></i> <i class="fa-solid fa-trash" style="color:#f87171"></i></div>
            </div>
            <div style="font-size: 0.85rem; color: #64748b;">ชื่อเล่น: แบมแบม</div>
            <span style="background: #f3e8ff; color: #8b5cf6; font-size: 0.7rem; padding: 2px 8px; border-radius: 5px;">พนักงานจ้างเหมา</span>
            <div style="margin-top: 10px; color: var(--accent-blue);"><i class="fa-solid fa-phone"></i> 0838270002</div>
        </div>
    </div>

    <div class="social-float">
        <a href="#" class="social-btn" style="background: #3b5998;"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" class="social-btn" style="background: #25d366;"><i class="fa-brands fa-line"></i></a>
        <a href="#" class="social-btn" style="background: #ea4335;"><i class="fa-solid fa-phone"></i></a>
    </div>

    <script>
        function showTab(tabId) {
            // ซ่อนทุก section
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            // เอาเส้นใต้เมนูออก
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            
            // แสดง section ที่เลือก
            document.getElementById(tabId).classList.add('active');
            // เพิ่มเส้นใต้เมนูที่คลิก
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
