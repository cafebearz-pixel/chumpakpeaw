<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวงาน อบต. ชำผักแพว Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg_kQRN64eIdhRDtIdsR24JSUiwHdT7tM",
            authDomain: "flutter-ai-playground-ca0f3.firebaseapp.com",
            projectId: "flutter-ai-playground-ca0f3",
            storageBucket: "flutter-ai-playground-ca0f3.firebasestorage.app",
            messagingSenderId: "679308094535",
            appId: "1:679308094535:web:81bd85c714926a10909562",
            databaseURL: "https://flutter-ai-playground-ca0f3-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.saveToCloud = (tasks, contacts) => set(ref(db, 'data/'), { tasks, contacts });
        onValue(ref(db, 'data/'), (snapshot) => {
            const data = snapshot.val();
            window.tasks = data?.tasks || [];
            window.contacts = data?.contacts || [];
            window.renderAll();
        });
    </script>

    <script>
        tailwind.config = { theme: { extend: { borderRadius: { 'xl': '1rem', '2xl': '1.5rem', '3xl': '2rem' } } } }
    </script>

    <style>
        html { font-size: 18px !important; }
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .bg-main { background-color: #152D4D; }
        .text-main { color: #152D4D; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tap-effect { transition: all 0.2s ease; cursor: pointer; }
        .tap-effect:active { transform: scale(0.97); opacity: 0.9; }
        
        /* Countdown กระพริบ */
        @keyframes pulse-orange { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }
        .animate-countdown { animation: pulse-orange 1s infinite; }

        /* การ์ดเด้งขึ้นลงสำหรับงานถัดไป */
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-upcoming-card { animation: bounce-subtle 2s infinite; border: 2px solid #3b82f6 !important; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2) !important; }

        /* Glass Big Number */
        .glass-stat-card {
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            position: relative; overflow: hidden;
        }
        .glass-stat-card .bg-icon { position: absolute; bottom: -20px; right: -15px; font-size: 100px; opacity: 0.08; transform: rotate(-15deg); }
        
        #fabAdd { position: fixed; bottom: 100px; right: 25px; z-index: 100; box-shadow: 0 10px 25px rgba(21, 45, 77, 0.3); }
        .wave-text span { display: inline-block; color: #FFD700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); animation: wave 2s infinite; }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="max-w-6xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        
        <header class="bg-main px-5 py-4 flex justify-between items-center text-white sticky top-0 z-50 shadow-xl">
            <div class="flex items-center gap-3">
                <img src="https://drive.google.com/thumbnail?id=1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY&sz=w200" class="w-11 h-11 object-contain">
                <div class="flex flex-col"><span class="font-black text-xl tracking-widest wave-text"><span>C</span><span>H</span><span>U</span><span>M</span><span>P</span><span>A</span><span>K</span><span>P</span><span>A</span><span>E</span><span>W</span></span><span class="text-[11px] font-light opacity-80 font-prompt">อบต. ชำผักแพว</span></div>
            </div>
            <button onclick="handleAdminToggle()" class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center tap-effect relative"><i id="adminIcon" class="fa-solid fa-user-shield"></i></button>
        </header>

        <nav class="flex bg-white border-b sticky top-[72px] z-40 shadow-sm overflow-x-auto no-scrollbar">
            <button onclick="changePage('dashboard')" id="nav-dashboard" class="flex-1 py-4 text-main border-b-4 border-main font-bold text-sm min-w-[100px] tap-effect font-prompt">แดชบอร์ด</button>
            <button onclick="changePage('calendar')" id="nav-calendar" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect font-prompt">ปฏิทิน</button>
            <button onclick="changePage('tasks')" id="nav-tasks" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect font-prompt">คิวงาน</button>
            <button onclick="changePage('contacts')" id="nav-contacts" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect font-prompt">เบอร์โทร</button>
        </nav>

        <main id="mainContent" class="flex-1 p-4 md:p-8 space-y-8 bg-[#f8fafc]">
            <div id="page-dashboard" class="space-y-8">
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="glass-stat-card p-5 rounded-3xl text-indigo-700">
                        <p class="text-[10px] font-bold opacity-60 uppercase">ทั้งหมด</p><h3 id="stat-total" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-folder-tree bg-icon"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-3xl text-amber-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase">รอดำเนินการ</p><h3 id="stat-pending" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-clock-rotate-left bg-icon"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-3xl text-emerald-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase">กำลังทำ</p><h3 id="stat-active" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-spinner bg-icon"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-3xl text-red-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase">เสร็จสิ้น</p><h3 id="stat-done" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-check-double bg-icon"></i>
                    </div>
                </div>
                <h2 class="font-black text-main text-lg border-l-4 border-main pl-3 uppercase">คิวงานที่ต้องโฟกัส</h2>
                <div id="dashboardTaskList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="page-calendar" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-3xl border shadow-xl max-w-2xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="prevMonth()" class="w-10 h-10 rounded-full border tap-effect"><i class="fa-solid fa-chevron-left"></i></button>
                        <h3 id="currentMonthYear" class="font-black text-main text-lg"></h3>
                        <button onclick="nextMonth()" class="w-10 h-10 rounded-full border tap-effect"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="grid grid-cols-7 gap-2 text-center font-bold text-xs text-gray-400 mb-4 uppercase">
                        <div class="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-400">ส</div>
                    </div>
                    <div id="daysGrid" class="grid grid-cols-7 gap-2"></div>
                </div>
                <div id="selectedDateTasks" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="page-tasks" class="hidden space-y-6"><div id="fullTaskList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></div>
            <div id="page-contacts" class="hidden space-y-6">
                <input type="text" onkeyup="renderContacts(this.value)" placeholder="ค้นหารายชื่อ/ตำแหน่ง..." class="w-full p-4 rounded-2xl border shadow-sm outline-none font-prompt">
                <button id="admin-add-contact" onclick="openContactModal()" class="hidden w-full py-4 bg-indigo-50 text-indigo-700 rounded-2xl font-black border-2 border-dashed border-indigo-200 tap-effect">+ เพิ่มรายชื่อใหม่</button>
                <div id="contactGroups" class="space-y-6"></div>
            </div>
        </main>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden w-16 h-16 bg-main text-white rounded-3xl flex items-center justify-center text-3xl border-4 border-white transform tap-effect"><i class="fa-solid fa-plus"></i></button>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar font-prompt">
            <h2 id="taskModalTitle" class="text-2xl font-black mb-6 text-main">ลงคิวงาน</h2>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="taskEditId">
                <input type="text" id="t-title" placeholder="ชื่องาน/ภารกิจ" required class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="t-startDate" required class="p-4 bg-gray-50 rounded-2xl border-none">
                    <input type="time" id="t-startTime" class="p-4 bg-gray-50 rounded-2xl border-none">
                </div>
                <select id="t-status" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-prompt"><option>รอดำเนินการ</option><option>กำลังดำเนินการ</option><option>เสร็จสิ้น</option></select>
                <input type="text" id="t-loc" placeholder="สถานที่" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input type="text" id="t-coord" placeholder="ผู้ประสานงาน" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <select id="t-owner" class="w-full p-4 bg-gray-50 rounded-2xl border-none"><option>นายก</option><option>องรองฯ</option><option>ปลัด</option><option>กองช่าง</option></select>
                <div class="pt-4 flex gap-3"><button type="button" id="btnDeleteTask" onclick="deleteTask()" class="hidden px-5 bg-red-50 text-red-500 rounded-2xl"><i class="fa-solid fa-trash"></i></button><button type="button" onclick="closeModal('taskModal')" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">ยกเลิก</button><button type="submit" class="flex-1 py-4 bg-main text-white rounded-2xl font-bold shadow-lg">บันทึก</button></div>
            </form>
        </div>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 z-[200] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center"><h2 class="text-xl font-black text-main mb-6">ADMIN ACCESS</h2><input type="password" id="adminPassword" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl border text-center font-black mb-8 outline-none tracking-widest"><div class="flex gap-3"><button onclick="closeModal('loginModal')" class="flex-1 py-3 rounded-2xl bg-gray-100 font-bold">ยกเลิก</button><button onclick="verifyAdminLogin()" class="flex-1 py-3 rounded-2xl bg-main text-white font-bold">ยืนยัน</button></div></div></div>

    <script>
        const holidays2026 = { "01-01": "วันขึ้นปีใหม่", "03-03": "วันมาฆบูชา", "04-06": "วันจักรี", "04-13": "วันสงกรานต์", "04-14": "วันสงกรานต์", "04-15": "วันสงกรานต์", "05-01": "วันแรงงานแห่งชาติ", "05-04": "วันฉัตรมงคล", "05-11": "วันพืชมงคลฯ", "05-31": "วันวิสาขบูชา", "06-03": "วันเฉลิมฯ พระราชินี", "07-28": "วันเฉลิมฯ ร.10", "07-29": "วันอาสาฬหบูชา", "07-30": "วันเข้าพรรษา", "08-12": "วันแม่แห่งชาติ", "10-13": "วันนวมินทรมหาราช", "10-23": "วันปิยมหาราช", "12-05": "วันพ่อแห่งชาติ", "12-10": "วันรัฐธรรมนูญ", "12-31": "วันสิ้นปี" };
        window.isAdmin = false; window.tasks = []; window.contacts = []; let currentViewDate = new Date();

        function handleAdminToggle() { if(window.isAdmin){ window.isAdmin=false; renderAll(); } else { document.getElementById('adminPassword').value=''; openModal('loginModal'); } }
        function verifyAdminLogin() { if(document.getElementById('adminPassword').value === 'ntrd'){ window.isAdmin=true; closeModal('loginModal'); renderAll(); } else { alert('Wrong Password'); } }
        
        function changePage(p) { 
            window.currentPage = p;
            ['dashboard','calendar','tasks','contacts'].forEach(id => {
                document.getElementById('page-'+id).classList.add('hidden');
                document.getElementById('nav-'+id).className = 'flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect font-prompt';
            });
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('nav-'+p).className = 'flex-1 py-4 text-main border-b-4 border-main font-bold text-sm min-w-[100px] tap-effect font-prompt';
            document.getElementById('fabAdd').classList.toggle('hidden', !window.isAdmin || p !== 'dashboard');
            if(document.getElementById('admin-add-contact')) document.getElementById('admin-add-contact').classList.toggle('hidden', !window.isAdmin || p !== 'contacts');
        }

        function getDiffDays(dateString) {
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateString); target.setHours(0,0,0,0);
            return Math.ceil((target - today) / (86400000));
        }

        function taskCardHTML(t, animate = false) {
            const diff = getDiffDays(t.startDate);
            let countdown = diff === 0 ? `<div class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-black px-3 py-1 rounded-full animate-countdown shadow-lg">วันนี้!</div>` : 
                           (diff > 0 && diff <= 3) ? `<div class="absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-black px-3 py-1 rounded-full animate-countdown shadow-lg">อีก ${diff} วัน</div>` : '';
            
            return `<div class="bg-white rounded-[2rem] p-6 shadow-md border relative tap-effect ${animate?'animate-upcoming-card':''} font-prompt">
                ${countdown}
                <div class="flex justify-between mb-3 text-main font-bold"><span class="bg-blue-50 px-3 py-1 rounded-xl text-sm">${t.startTime||'ไม่ระบุเวลา'}</span><span class="text-[10px] border px-2 py-1 rounded-lg uppercase">${t.status}</span></div>
                <h4 class="font-medium text-[22px] leading-tight mb-4">${t.title}</h4>
                <div class="text-sm text-gray-400 space-y-2">
                    <p><i class="fa-solid fa-location-dot mr-2 text-main"></i>${t.loc||'-'}</p>
                    <p><i class="fa-solid fa-user-tag mr-2 text-main"></i>${t.owner}</p>
                    ${t.coord?`<p><i class="fa-solid fa-user-check mr-2 text-main"></i>ประสาน: ${t.coord}</p>`:''}
                </div>
                ${window.isAdmin?`<button onclick="editTask('${t.id}')" class="absolute top-4 right-4 text-gray-300"><i class="fa-solid fa-pen-to-square"></i></button>`:''}
            </div>`;
        }

        window.renderAll = () => {
            // Stats
            document.getElementById('stat-total').innerText = window.tasks.length;
            document.getElementById('stat-pending').innerText = window.tasks.filter(t=>t.status==='รอดำเนินการ').length;
            document.getElementById('stat-active').innerText = window.tasks.filter(t=>t.status==='กำลังดำเนินการ').length;
            document.getElementById('stat-done').innerText = window.tasks.filter(t=>t.status==='เสร็จสิ้น').length;

            // Dashboard Logic
            const todayStr = new Date().toISOString().split('T')[0];
            const todayTasks = window.tasks.filter(t => t.startDate === todayStr);
            const dashContainer = document.getElementById('dashboardTaskList');
            if(todayTasks.length > 0) {
                dashContainer.innerHTML = todayTasks.map(t => taskCardHTML(t)).join('');
            } else {
                const upcoming = window.tasks.filter(t => t.startDate > todayStr).sort((a,b)=>a.startDate.localeCompare(b.startDate))[0];
                dashContainer.innerHTML = upcoming ? `<p class="col-span-full text-center text-gray-400 text-xs italic mb-2">-- ไม่มีคิววันนี้ คิวถัดไปที่ใกล้ที่สุด --</p>${taskCardHTML(upcoming, true)}` : '<p class="text-center text-gray-300 py-10 w-full col-span-full">ไม่มีข้อมูลคิวงาน</p>';
            }

            // Calendar
            const daysGrid = document.getElementById('daysGrid'); daysGrid.innerHTML = '';
            const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
            const names = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('currentMonthYear').innerText = `${names[m]} ${y+543}`;
            const first = new Date(y,m,1).getDay(), total = new Date(y,m+1,0).getDate();
            for(let i=0; i<first; i++) daysGrid.innerHTML += '<div></div>';
            for(let d=1; d<=total; d++) {
                const dateKey = `${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const hasTask = window.tasks.some(t => t.startDate === `${y}-${dateKey}`);
                const h = holidays2026[dateKey];
                daysGrid.innerHTML += `<button onclick="showDayTasks('${y}-${dateKey}','${h||''}')" class="h-11 flex flex-col items-center justify-center rounded-2xl hover:bg-blue-50 relative tap-effect"><span class="${h?'text-red-500 font-bold':'text-gray-700'} text-sm">${d}</span>${hasTask?'<div class="w-1 h-1 bg-main rounded-full mt-1"></div>':''}</button>`;
            }

            // Other Lists
            const fullList = document.getElementById('fullTaskList'); if(fullList) fullList.innerHTML = window.tasks.map(t => taskCardHTML(t)).join('');
            renderContacts();
            updateAdminVisibility();
        };

        function showDayTasks(date, h) {
            const container = document.getElementById('selectedDateTasks');
            const tasks = window.tasks.filter(t => t.startDate === date);
            let head = `<div class="col-span-full p-4 bg-white rounded-3xl border border-gray-100 shadow-sm"><p class="text-[10px] font-bold text-gray-400">วันที่: ${date}</p>${h?`<p class="text-red-500 font-bold text-sm mt-1">วันหยุด: ${h}</p>`:''}</div>`;
            container.innerHTML = head + tasks.map(t => taskCardHTML(t)).join('') || head + '<p class="text-center text-gray-300 py-6">ไม่มีงาน</p>';
        }

        function renderContacts() {
            const container = document.getElementById('contactGroups'); if(!container) return;
            const groups = { "1":"ผู้บริหาร","2":"ข้าราชการ","3":"พนักงานจ้าง","4":"พนักงานจ้างเหมา","5":"สมาชิก อบต.","6":"กำนัน","7":"ผู้ใหญ่บ้าน","8":"ผู้ช่วยผู้ใหญ่บ้าน" };
            container.innerHTML = '';
            Object.keys(groups).forEach(g => {
                const list = window.contacts.filter(c => c.group === g);
                if(list.length) {
                    let html = `<div class="space-y-3"><h4 class="text-xs font-black text-gray-400 uppercase pl-3 border-l-4 border-gray-200 ml-1 mb-4">${groups[g]}</h4>`;
                    list.forEach(m => html += `<div class="bg-white p-5 rounded-[2rem] border flex justify-between items-center shadow-sm tap-effect"><div onclick="window.location='tel:${m.tel}'" class="flex-1 font-prompt"><p class="font-medium text-main text-lg"><i class="fa-solid fa-user-circle mr-3"></i>${m.name} ${m.nickname?`(${m.nickname})`:''}</p><p class="text-sm text-gray-400 font-normal mb-1 ml-8">${m.role}</p><p class="text-lg font-black text-main tracking-widest ml-8"><i class="fa-solid fa-phone mr-3 text-xs opacity-30"></i>${m.tel}</p></div><a href="tel:${m.tel}" class="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center shadow-sm"><i class="fa-solid fa-phone"></i></a></div>`);
                    container.innerHTML += html + `</div>`;
                }
            });
        }

        // Standard Functions
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth()-1); window.renderAll(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth()+1); window.renderAll(); }
        function openTaskModal() { document.getElementById('taskForm').reset(); document.getElementById('taskEditId').value = ''; openModal('taskModal'); }
        function editTask(id) { const t = window.tasks.find(x => x.id == id); if(!t) return; document.getElementById('taskEditId').value = t.id; ['title','startDate','startTime','status','loc','coord','owner'].forEach(k => document.getElementById(`t-${k}`).value = t[k]||''); openModal('taskModal'); }
        document.getElementById('taskForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('taskEditId').value || Date.now().toString(); const data = { id }; ['title','startDate','startTime','status','loc','coord','owner'].forEach(k => data[k] = document.getElementById(`t-${k}`).value); const idx = window.tasks.findIndex(x => x.id === id); if(idx > -1) window.tasks[idx] = data; else window.tasks.push(data); window.saveToCloud(window.tasks, window.contacts); closeModal('taskModal'); };
        function deleteTask() { if(confirm('ลบ?')) { window.tasks = window.tasks.filter(t => t.id !== document.getElementById('taskEditId').value); window.saveToCloud(window.tasks, window.contacts); closeModal('taskModal'); } }
    </script>
</body>
</html>
