<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวงาน อบต. ชำผักแพว V.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg_kQRN64eIdhRDtIdsR24JSUiwHdT7tM",
            authDomain: "flutter-ai-playground-ca0f3.firebaseapp.com",
            projectId: "flutter-ai-playground-ca0f3",
            storageBucket: "flutter-ai-playground-ca0f3.firebasestorage.app",
            messagingSenderId: "679308094535",
            appId: "1:679308094535:web:81bd85c714926a10909562",
            databaseURL: "https://flutter-ai-playground-ca0f3-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveToCloud = (tasks, contacts) => {
            set(ref(db, 'data/'), { tasks, contacts });
        };

        onValue(ref(db, 'data/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.tasks = data.tasks || [];
                window.contacts = data.contacts || [];
                window.renderAll();
            }
        });
    </script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .bg-main { background-color: #152D4D; }
        .text-main { color: #152D4D; }
        
        /* แอนิเมชันกระพริบสำหรับตัวนับวัน */
        @keyframes pulse-orange { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }
        .animate-countdown { animation: pulse-orange 1.5s ease-in-out infinite; }

        /* แอนิเมชันเด้งขึ้นลงสำหรับการ์ดที่ใกล้ถึง */
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-upcoming-card { animation: bounce-subtle 2s ease-in-out infinite; border: 2px solid #3b82f6 !important; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2); }

        .glass-stat-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); position: relative; overflow: hidden; }
        .glass-stat-card .background-icon { position: absolute; bottom: -20px; right: -10px; font-size: 80px; opacity: 0.1; transform: rotate(-15deg); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tap-effect:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
        
        <header class="bg-main px-5 py-4 flex justify-between items-center text-white sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img src="https://drive.google.com/thumbnail?id=1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY&sz=w200" class="w-10 h-10 object-contain">
                <span class="font-bold text-lg tracking-tight">CHUMPAKPAEW</span>
            </div>
            <button onclick="handleAdminToggle()" id="adminBtn" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center tap-effect">
                <i class="fa-solid fa-user-shield"></i>
            </button>
        </header>

        <nav class="flex bg-white border-b sticky top-[68px] z-40 overflow-x-auto no-scrollbar">
            <button onclick="changePage('dashboard')" id="nav-dashboard" class="flex-1 py-4 text-main border-b-2 border-main font-bold text-xs uppercase"><i class="fa-solid fa-chart-line mb-1 block"></i>แดชบอร์ด</button>
            <button onclick="changePage('calendar')" id="nav-calendar" class="flex-1 py-4 text-gray-400 font-bold text-xs uppercase"><i class="fa-solid fa-calendar-alt mb-1 block"></i>ปฏิทิน</button>
            <button onclick="changePage('tasks')" id="nav-tasks" class="flex-1 py-4 text-gray-400 font-bold text-xs uppercase"><i class="fa-solid fa-list-check mb-1 block"></i>คิวงาน</button>
            <button onclick="changePage('contacts')" id="nav-contacts" class="flex-1 py-4 text-gray-400 font-bold text-xs uppercase"><i class="fa-solid fa-phone mb-1 block"></i>เบอร์โทร</button>
        </nav>

        <main id="mainContent" class="flex-1 p-4 space-y-6">
            <div id="page-dashboard" class="space-y-6">
                <div class="grid grid-cols-2 gap-3">
                    <div class="glass-stat-card p-4 rounded-3xl text-indigo-700">
                        <p class="text-[10px] font-bold opacity-60 uppercase">งานทั้งหมด</p>
                        <h3 id="stat-total" class="text-3xl font-black">0</h3>
                        <i class="fa-solid fa-folder-open background-icon"></i>
                    </div>
                    <div class="glass-stat-card p-4 rounded-3xl text-amber-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase">รอดำเนินการ</p>
                        <h3 id="stat-pending" class="text-3xl font-black">0</h3>
                        <i class="fa-solid fa-clock background-icon"></i>
                    </div>
                </div>

                <h3 class="font-bold text-main border-l-4 border-main pl-3">คิวงานที่ต้องโฟกัส</h3>
                <div id="dashboardTaskList" class="space-y-4"></div>
            </div>

            <div id="page-calendar" class="hidden space-y-4">
                <div class="bg-white p-4 rounded-3xl border shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <button onclick="prevMonth()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center border"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                        <h3 id="currentMonthYear" class="font-bold text-main"></h3>
                        <button onclick="nextMonth()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center border"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center font-bold text-[10px] text-gray-400 mb-2">
                        <div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div>
                    </div>
                    <div id="daysGrid" class="grid grid-cols-7 gap-1"></div>
                </div>
                <div id="selectedDateTasks" class="space-y-4"></div>
            </div>

            <div id="page-tasks" class="hidden space-y-4"><div id="fullTaskList" class="space-y-4"></div></div>
            <div id="page-contacts" class="hidden space-y-4">
                <input type="text" onkeyup="renderContacts(this.value)" placeholder="ค้นหารายชื่อ..." class="w-full p-4 bg-gray-50 rounded-2xl border-none shadow-inner outline-none">
                <div id="contactGroups" class="space-y-4"></div>
            </div>
        </main>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden fixed bottom-10 right-6 w-14 h-14 bg-main text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-[60]">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 z-[200] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full rounded-3xl p-8 text-center font-prompt">
            <h2 class="text-xl font-bold text-main mb-4">Admin Access</h2>
            <input type="password" id="adminPassword" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-xl border text-center mb-6 outline-none">
            <button onclick="verifyAdminLogin()" class="w-full py-3 bg-main text-white rounded-xl font-bold">ยืนยัน</button>
        </div>
    </div>

    <script>
        const holidays2026 = { "01-01": "วันขึ้นปีใหม่", "03-03": "วันมาฆบูชา", "04-06": "วันจักรี", "04-13": "วันสงกรานต์", "04-14": "วันสงกรานต์", "04-15": "วันสงกรานต์", "05-01": "วันแรงงานแห่งชาติ", "05-04": "วันฉัตรมงคล", "05-11": "วันพืชมงคลฯ", "05-31": "วันวิสาขบูชา", "06-03": "วันเฉลิมฯ พระราชินี", "07-28": "วันเฉลิมฯ ร.10", "07-29": "วันอาสาฬหบูชา", "07-30": "วันเข้าพรรษา", "08-12": "วันแม่แห่งชาติ", "10-13": "วันนวมินทรมหาราช", "10-23": "วันปิยมหาราช", "12-05": "วันพ่อแห่งชาติ", "12-10": "วันรัฐธรรมนูญ", "12-31": "วันสิ้นปี" };
        window.isAdmin = false; window.tasks = []; window.contacts = []; let currentViewDate = new Date();

        function handleAdminToggle() { if(window.isAdmin){ window.isAdmin=false; renderAll(); } else { document.getElementById('loginModal').classList.remove('hidden'); } }
        function verifyAdminLogin() { if(document.getElementById('adminPassword').value === 'ntrd'){ window.isAdmin=true; document.getElementById('loginModal').classList.add('hidden'); renderAll(); } else { alert('Wrong Password'); } }
        
        function changePage(p) { 
            ['dashboard','calendar','tasks','contacts'].forEach(id => {
                document.getElementById('page-'+id).classList.add('hidden');
                document.getElementById('nav-'+id).className = 'flex-1 py-4 text-gray-400 font-bold text-xs uppercase';
            });
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('nav-'+p).className = 'flex-1 py-4 text-main border-b-2 border-main font-bold text-xs uppercase';
            document.getElementById('fabAdd').classList.toggle('hidden', !window.isAdmin || p !== 'dashboard');
        }

        function getDiffDays(targetDate) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(targetDate);
            target.setHours(0,0,0,0);
            const diffTime = target - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function generateTaskCardHTML(t, isUpcomingAlert = false) {
            const diff = getDiffDays(t.startDate);
            let countdownHTML = '';
            
            if (diff > 0) {
                countdownHTML = `<div class="absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg animate-countdown">อีก ${diff} วันจะถึงงาน</div>`;
            } else if (diff === 0) {
                countdownHTML = `<div class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg animate-countdown">วันนี้!</div>`;
            }

            return `
            <div class="bg-white rounded-[2rem] border border-gray-100 p-5 shadow-sm relative tap-effect ${isUpcomingAlert ? 'animate-upcoming-card' : ''}">
                ${countdownHTML}
                <div class="flex justify-between items-start mb-3">
                    <span class="text-sm font-bold text-main">${t.startTime || 'ไม่ระบุเวลา'}</span>
                    <span class="text-[10px] px-2 py-1 bg-gray-100 rounded-lg text-gray-500 font-bold uppercase">${t.status}</span>
                </div>
                <h4 class="font-bold text-lg text-gray-800 leading-tight mb-2">${t.title}</h4>
                <div class="text-xs text-gray-400 space-y-1">
                    <p><i class="fa-solid fa-location-dot mr-2"></i>${t.loc || '-'}</p>
                    <p><i class="fa-solid fa-user-tie mr-2"></i>${t.owner}</p>
                </div>
            </div>`;
        }

        function renderDashboardTasks() {
            const container = document.getElementById('dashboardTaskList');
            const today = new Date().toISOString().split('T')[0];
            const todayTasks = window.tasks.filter(t => t.startDate === today);
            
            if (todayTasks.length > 0) {
                container.innerHTML = todayTasks.map(t => generateTaskCardHTML(t)).join('');
            } else {
                // ถ้าวันนี้ไม่มีคิว ให้หาคิวที่ใกล้ที่สุดในอนาคต
                const upcoming = window.tasks
                    .filter(t => new Date(t.startDate) > new Date())
                    .sort((a,b) => new Date(a.startDate) - new Date(b.startDate))[0];
                
                if (upcoming) {
                    container.innerHTML = `
                        <p class="text-center text-gray-400 text-xs italic mb-4">-- วันนี้ไม่มีคิวงาน คิวถัดไปที่ใกล้ที่สุด --</p>
                        ${generateTaskCardHTML(upcoming, true)}
                    `;
                } else {
                    container.innerHTML = '<p class="text-center text-gray-300 py-10">ไม่มีคิวงานเร็วๆ นี้</p>';
                }
            }
        }

        // --- ระบบปฏิทินที่แก้ไขแล้ว ---
        function renderCalendar() {
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';
            const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('currentMonthYear').innerText = `${monthNames[m]} ${y+543}`;
            
            const firstDay = new Date(y, m, 1).getDay();
            const totalDays = new Date(y, m + 1, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            
            for(let d=1; d<=totalDays; d++) {
                const dateKey = `${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const fullDate = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const holiday = holidays2026[dateKey];
                const hasTask = window.tasks.some(t => t.startDate === fullDate);
                
                grid.innerHTML += `
                    <button onclick="showDateTasks('${fullDate}', '${holiday || ''}')" class="h-10 relative flex flex-col items-center justify-center rounded-xl hover:bg-blue-50 tap-effect">
                        <span class="text-xs font-bold ${holiday ? 'text-red-500' : 'text-gray-700'}">${d}</span>
                        ${hasTask ? '<span class="w-1 h-1 bg-main rounded-full mt-0.5"></span>' : ''}
                        ${holiday ? '<span class="absolute top-0 right-0 w-1.5 h-1.5 bg-red-400 rounded-full"></span>' : ''}
                    </button>`;
            }
        }

        function showDateTasks(date, holidayName) {
            const container = document.getElementById('selectedDateTasks');
            const dayTasks = window.tasks.filter(t => t.startDate === date);
            
            let html = `<div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <p class="text-[10px] font-bold text-gray-400 uppercase">วันที่เลือก</p>
                <p class="font-bold text-main">${date}</p>
                ${holidayName ? `<p class="text-red-500 text-sm font-bold mt-1"><i class="fa-solid fa-flag mr-2"></i>วันหยุด: ${holidayName}</p>` : ''}
            </div>`;
            
            html += dayTasks.map(t => generateTaskCardHTML(t)).join('') || '<p class="text-center text-gray-300 py-4 text-sm">ไม่มีคิวงานในวันนี้</p>';
            container.innerHTML = html;
        }

        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth()-1); renderCalendar(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth()+1); renderCalendar(); }

        window.renderAll = () => {
            document.getElementById('stat-total').innerText = window.tasks.length;
            document.getElementById('stat-pending').innerText = window.tasks.filter(t => t.status === 'รอดำเนินการ').length;
            renderDashboardTasks();
            renderCalendar();
        };
    </script>
</body>
</html>
