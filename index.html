<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวงาน อบต. ชำผักแพว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { theme: { extend: { borderRadius: { 'xl': '1rem', '2xl': '1.25rem', '3xl': '1.5rem' } } } }
    </script>

    <style>
        html { font-size: 18px !important; }
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; color: #334155; }
        .bg-main { background-color: #152D4D; }
        @keyframes slow-bounce { 0%, 100% { transform: translateY(-3px); } 50% { transform: translateY(3px); } }
        .animate-slow-bounce { animation: slow-bounce 2s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .today-card { border: 2px solid #ef4444; background-color: #fffafa; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="w-full max-w-5xl mx-auto min-h-screen bg-[#fcfdfe] relative flex flex-col shadow-sm">
        
        <header class="bg-main px-5 py-4 flex justify-between items-center text-white sticky top-0 z-50 shadow-lg">
            <div class="flex items-center gap-3">
                <img src="https://drive.google.com/thumbnail?id=1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY&sz=w200" class="w-12 h-12 object-contain">
                <div class="flex flex-col">
                    <span class="font-bold text-2xl leading-tight tracking-wide">CHUMPAKPAEW</span>
                    <span class="text-sm font-light opacity-90">องค์การบริหารส่วนตำบลชำผักแพว</span>
                </div>
            </div>
            <button onclick="handleAdminToggle()" class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition relative" id="adminBtn">
                <i id="adminIcon" class="fa-solid fa-user-shield text-xl"></i>
                <div id="adminBadge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-[#152D4D]"></div>
            </button>
        </header>

        <nav class="flex bg-white border-b py-1 sticky top-[84px] z-40 shadow-sm overflow-x-auto no-scrollbar">
            <button onclick="changePage('dashboard')" id="nav-dashboard" class="flex-1 py-2 flex flex-col items-center text-[#152D4D] border-b-2 border-[#152D4D] min-w-[80px]"><i class="fa-solid fa-house text-xl"></i><span class="text-[12px]">หน้าหลัก</span></button>
            <button onclick="changePage('calendar')" id="nav-calendar" class="flex-1 py-2 flex flex-col items-center text-gray-400 min-w-[80px]"><i class="fa-solid fa-calendar-alt text-xl"></i><span class="text-[12px]">ปฏิทิน</span></button>
            <button onclick="changePage('tasks')" id="nav-tasks" class="flex-1 py-2 flex flex-col items-center text-gray-400 min-w-[80px]"><i class="fa-solid fa-tasks text-xl"></i><span class="text-[12px]">งานทั้งหมด</span></button>
            <button onclick="changePage('contacts')" id="nav-contacts" class="flex-1 py-2 flex flex-col items-center text-gray-400 min-w-[80px]"><i class="fa-solid fa-phone-alt text-xl"></i><span class="text-[12px]">เบอร์โทร</span></button>
        </nav>

        <main id="mainContent" class="flex-1 p-4 space-y-6">
            
            <section id="page-dashboard" class="space-y-5">
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <img src="https://drive.google.com/thumbnail?id=1ET2DmRqMeDl1f13eL9EZpxr_FNvtZpwM&sz=w200" class="w-20 h-20 rounded-full object-cover border-4 border-gray-50 shadow-sm">
                            <div id="statusDot" class="absolute bottom-1 right-1 w-5 h-5 rounded-full border-2 border-white bg-green-500"></div>
                        </div>
                        <div>
                            <h2 class="font-bold text-[#152D4D] text-xl leading-tight">นายกณัฐรดา กล้าหาญ</h2>
                            <p id="statusText" class="text-gray-500 text-sm mt-1">อยู่อบต./ห้องทำงาน</p>
                        </div>
                    </div>
                    <button id="admin-status-btn" onclick="openModal('statusModal')" class="hidden w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fa-solid fa-ellipsis-v"></i></button>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-gray-700 text-sm uppercase tracking-widest">ความคืบหน้าภารกิจโดยรวม</h3>
                        <span id="overallProgressValue" class="text-blue-600 font-black text-xl">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden shadow-inner">
                        <div id="overallProgressBar" class="bg-main h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-indigo-50 p-4 rounded-2xl text-center border border-indigo-100">
                        <p class="text-indigo-600 font-bold text-xs uppercase">ทั้งหมด</p>
                        <h3 id="stat-total" class="text-3xl font-black text-indigo-900 mt-1">0</h3>
                    </div>
                    <div class="bg-amber-50 p-4 rounded-2xl text-center border border-amber-100">
                        <p class="text-amber-700 font-bold text-xs uppercase">รอดำเนินการ</p>
                        <h3 id="stat-pending" class="text-3xl font-black text-amber-900 mt-1">0</h3>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-2xl text-center border border-emerald-100">
                        <p class="text-emerald-700 font-bold text-xs uppercase">กำลังทำ</p>
                        <h3 id="stat-active" class="text-3xl font-black text-emerald-900 mt-1">0</h3>
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl text-center border border-red-100">
                        <p class="text-red-700 font-bold text-xs uppercase">เสร็จสิ้น</p>
                        <h3 id="stat-done" class="text-3xl font-black text-red-900 mt-1">0</h3>
                    </div>
                </div>

                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-[#152D4D] text-lg border-l-4 border-[#152D4D] pl-3">รายการคิวงาน</h3>
                    <span id="taskCountBadge" class="text-sm font-bold text-gray-400"></span>
                </div>
                <div id="dashboardTaskList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </section>

            <section id="page-calendar" class="hidden space-y-4">
                <div class="bg-white p-5 rounded-2xl border shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="prevMonth()" class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100"><i class="fa-solid fa-chevron-left"></i></button>
                        <h3 id="currentMonthYear" class="font-bold text-[#152D4D] text-lg"></h3>
                        <button onclick="nextMonth()" class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="grid grid-cols-7 text-center text-xs font-bold text-gray-400 mb-2">
                        <div class="text-red-500 font-black">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-500 font-black">ส</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center font-medium"></div>
                </div>
                <div id="selectedDateTasks" class="space-y-4"></div>
            </section>

            <section id="page-tasks" class="hidden space-y-4">
                <h3 class="font-bold text-[#152D4D] border-l-4 border-blue-500 pl-3">คิวงานทั้งหมดในระบบ</h3>
                <div id="fullTaskList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="page-contacts" class="hidden space-y-4">
                <div class="relative">
                    <input type="text" onkeyup="renderContacts(this.value)" placeholder="ค้นหาชื่อหรือตำแหน่ง..." class="w-full p-4 bg-white rounded-2xl border border-gray-100 shadow-sm focus:ring-2 focus:ring-main outline-none">
                    <i class="fa-solid fa-search absolute right-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                </div>
                <div id="contactGroups" class="space-y-5"></div>
                <button id="admin-add-contact" onclick="openContactModal()" class="hidden w-full py-4 rounded-2xl border-2 border-dashed border-[#152D4D] text-[#152D4D] font-bold bg-blue-50/30">
                    <i class="fa-solid fa-plus mr-2"></i>เพิ่มรายชื่อติดต่อใหม่
                </button>
            </section>
        </main>

        <footer class="bg-white border-t flex justify-around p-4 pb-8 z-40 shadow-inner">
            <a href="https://www.chumpakpaew.go.th" class="flex flex-col items-center text-gray-400 hover:text-main"><i class="fa-solid fa-globe text-2xl mb-1"></i><span class="text-xs">เว็บ</span></a>
            <a href="https://www.facebook.com/xbt.cha.phak.ph.w" class="flex flex-col items-center text-gray-400 hover:text-blue-700"><i class="fa-brands fa-facebook text-2xl mb-1"></i><span class="text-xs">เฟสบุ๊ก</span></a>
            <a href="https://lin.ee/dCB8MH3" class="flex flex-col items-center text-gray-400 hover:text-green-500"><i class="fa-brands fa-line text-2xl mb-1"></i><span class="text-xs">ไลน์</span></a>
            <a href="tel:036-714-081" class="flex flex-col items-center text-gray-400 hover:text-red-500"><i class="fa-solid fa-phone text-2xl mb-1"></i><span class="text-xs">โทร</span></a>
        </footer>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden fixed bottom-28 right-6 w-16 h-16 bg-main text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-50 border-4 border-white transition transform hover:scale-110 active:scale-95">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 z-[200] bg-black/70 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-main text-3xl"><i class="fa-solid fa-shield-halved"></i></div>
            <h2 class="text-xl font-bold text-[#152D4D] mb-6">ยืนยันตัวตนแอดมิน</h2>
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน..." class="w-full p-4 bg-gray-50 rounded-2xl border text-center font-bold tracking-widest mb-6 focus:ring-2 focus:ring-main outline-none">
            <div class="flex gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 py-4 rounded-2xl bg-gray-100 font-bold hover:bg-gray-200">ยกเลิก</button>
                <button onclick="verifyAdminLogin()" class="flex-1 py-4 rounded-2xl bg-main text-white font-bold hover:bg-blue-900">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="taskModalTitle" class="text-xl font-bold text-[#152D4D]">ลงคิวงาน</h2>
                <button onclick="closeModal('taskModal')" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="taskEditId">
                <div><label class="block font-bold mb-2 text-gray-700">ชื่องาน *</label><input type="text" id="t-title" required class="w-full p-3.5 bg-gray-50 rounded-2xl border focus:border-main outline-none"></div>
                
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <div class="flex justify-between mb-2"><label class="font-bold text-blue-800">ความคืบหน้า (%)</label><span id="progressValue" class="font-bold text-blue-900 text-lg">0%</span></div>
                    <input type="range" id="t-progress" min="0" max="100" value="0" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-[#152D4D]" oninput="document.getElementById('progressValue').innerText = this.value + '%'">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label class="block font-bold mb-2 text-gray-700">วันที่เริ่มต้น *</label><input type="date" id="t-startDate" required class="w-full p-3.5 bg-gray-50 rounded-2xl border"></div>
                    <div><label class="block font-bold mb-2 text-gray-700">เวลาเริ่ม</label><input type="time" id="t-startTime" class="w-full p-3.5 bg-gray-50 rounded-2xl border"></div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label class="block font-bold mb-2 text-gray-700">วันที่สิ้นสุด</label><input type="date" id="t-endDate" class="w-full p-3.5 bg-gray-50 rounded-2xl border"></div>
                    <div><label class="block font-bold mb-2 text-gray-700">เวลาสิ้นสุด</label><input type="time" id="t-endTime" class="w-full p-3.5 bg-gray-50 rounded-2xl border"></div>
                </div>

                <div><label class="block font-bold mb-2 text-gray-700">สถานะ</label>
                    <select id="t-status" class="w-full p-3.5 bg-gray-50 rounded-2xl border appearance-none">
                        <option>รอดำเนินการ</option><option>กำลังดำเนินการ</option><option>เสร็จสิ้น</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label class="block font-bold mb-2 text-gray-700">สถานที่</label><input type="text" id="t-loc" class="w-full p-3.5 bg-gray-50 rounded-2xl border"></div>
                    <div><label class="block font-bold mb-2 text-gray-700">การแต่งกาย</label><input type="text" id="t-dress" class="w-full p-3.5 bg-gray-50 rounded-2xl border"></div>
                </div>

                <div><label class="block font-bold mb-2 text-gray-700">ผู้รับผิดชอบ</label>
                    <select id="t-owner" class="w-full p-3.5 bg-gray-50 rounded-2xl border">
                        <option>นายก</option><option>รองมานิต</option><option>รองบุญโฮม</option><option>เลขามาลี</option><option>ปลัด</option><option>กองช่าง</option>
                    </select>
                </div>
                
                <div><label class="block font-bold mb-2 text-gray-700 font-bold">ลิงก์เอกสาร Drive (ถ้ามี)</label><input type="url" id="t-link" placeholder="https://..." class="w-full p-3.5 bg-gray-50 rounded-2xl border"></div>
                
                <div class="pt-4 flex gap-3">
                    <button type="submit" class="flex-1 py-4 bg-main text-white rounded-2xl font-bold shadow-lg text-lg hover:bg-blue-900 transition">บันทึกคิวงาน</button>
                    <button type="button" id="btnDeleteTask" onclick="deleteTask()" class="hidden px-6 bg-red-50 text-red-500 rounded-2xl font-bold border border-red-100"><i class="fa-solid fa-trash"></i></button>
                </div>
            </form>
        </div>
    </div>

    <div id="statusModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm"><div class="bg-white w-full max-w-xs rounded-3xl p-6"><h3 class="font-bold mb-4 text-center">อัปเดตสถานะนายก</h3><div class="grid gap-2"><button onclick="updateMayorStatus('อยู่อบต./ห้องทำงาน', 'bg-green-500')" class="p-4 bg-green-50 text-green-700 rounded-2xl font-bold">🟢 อยู่อบต.</button><button onclick="updateMayorStatus('ลงพื้นที่/ติดภารกิจ', 'bg-yellow-500')" class="p-4 bg-yellow-50 text-yellow-700 rounded-2xl font-bold">🟡 ลงพื้นที่</button><button onclick="updateMayorStatus('ไม่อยู่อบต.', 'bg-red-500')" class="p-4 bg-red-50 text-red-700 rounded-2xl font-bold">🔴 ไม่อยู่อบต.</button></div><button onclick="closeModal('statusModal')" class="w-full mt-4 py-2 text-gray-400 font-bold">ปิด</button></div></div>
    <div id="contactModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4"><div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl"><h2 id="contactModalTitle" class="text-xl font-bold mb-6">รายชื่อ</h2><form id="contactForm" class="space-y-4"><input type="hidden" id="contactEditId"><input type="text" id="c-name" placeholder="ชื่อ นามสกุล" required class="w-full p-4 bg-gray-50 rounded-2xl border"><input type="text" id="c-role" placeholder="ตำแหน่ง" required class="w-full p-4 bg-gray-50 rounded-2xl border"><input type="tel" id="c-tel" placeholder="เบอร์โทรศัพท์" required class="w-full p-4 bg-gray-50 rounded-2xl border"><select id="c-group" class="w-full p-4 bg-gray-50 rounded-2xl border"><option value="1">1. ผู้บริหาร</option><option value="2">2. ข้าราชการ</option><option value="3">3. สมาชิก อบต.</option><option value="4">4. กำนัน/ผู้ใหญ่บ้าน</option></select><div class="flex gap-3 pt-4"><button type="submit" class="flex-1 py-4 bg-main text-white rounded-2xl font-bold">บันทึก</button><button type="button" onclick="closeModal('contactModal')" class="px-6 bg-gray-100 font-bold rounded-2xl">ยกเลิก</button></div></form></div></div>

    <script>
        const holidays2026 = { "01-01": "ปีใหม่", "03-03": "มาฆบูชา", "04-06": "วันจักรี", "04-13": "สงกรานต์", "04-14": "สงกรานต์", "04-15": "สงกรานต์", "05-01": "แรงงาน", "05-04": "ฉัตรมงคล", "05-11": "พืชมงคล", "05-31": "วิสาขบูชา", "06-01": "ชดเชยวิสาขฯ", "06-03": "เฉลิมฯ ราชินี", "07-28": "เฉลิมฯ ร.10", "07-29": "อาสาฬหบูชา", "07-30": "เข้าพรรษา", "08-12": "แม่แห่งชาติ", "10-13": "นวมินทรมหาราช", "10-23": "ปิยมหาราช", "10-26": "ออกพรรษา", "12-05": "พ่อแห่งชาติ", "12-07": "ชดเชยพ่อแห่งชาติ", "12-10": "รัฐธรรมนูญ", "12-31": "สิ้นปี" };

        let isAdmin = false;
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let contacts = JSON.parse(localStorage.getItem('contacts')) || [{ id: 1, name: "นายสมชาย ใจดี", role: "ปลัด อบต.", tel: "081-111-1111", group: "2" }];
        let currentViewDate = new Date();

        window.onload = () => { renderAll(); };

        // --- แก้ไข 1. ระบบ Admin Toggle ---
        function handleAdminToggle() {
            if (isAdmin) {
                // ถ้าเป็นแอดมินอยู่แล้ว กดซ้ำจะ Logout อัตโนมัติ
                isAdmin = false;
                document.getElementById('adminIcon').classList.replace('fa-user-check', 'fa-user-shield');
                document.getElementById('adminIcon').classList.remove('text-green-300');
                document.getElementById('adminBadge').classList.add('hidden');
                document.querySelectorAll('#admin-status-btn, #admin-add-contact, #fabAdd').forEach(el => el.classList.add('hidden'));
                alert("ออกจากโหมดแอดมินและบันทึกข้อมูลเรียบร้อยแล้ว");
                saveAndRefresh();
            } else {
                // ถ้ายังไม่เป็นแอดมิน ให้เปิดหน้า Login
                openModal('loginModal');
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        }

        function verifyAdminLogin() {
            const pwd = document.getElementById('adminPassword').value.toLowerCase();
            if(pwd === 'ntrd') {
                isAdmin = true;
                closeModal('loginModal');
                document.getElementById('adminIcon').classList.replace('fa-user-shield', 'fa-user-check');
                document.getElementById('adminIcon').classList.add('text-green-300');
                document.getElementById('adminBadge').classList.remove('hidden');
                document.querySelectorAll('#admin-status-btn, #admin-add-contact, #fabAdd').forEach(el => el.classList.remove('hidden'));
                renderAll();
                alert("ยินดีต้อนรับเข้าสู่โหมดแอดมิน");
            } else {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        }

        function changePage(page) {
            ['dashboard', 'calendar', 'tasks', 'contacts'].forEach(p => { 
                document.getElementById('page-' + p).classList.add('hidden'); 
                document.getElementById('nav-' + p).classList.replace('text-[#152D4D]', 'text-gray-400');
                document.getElementById('nav-' + p).classList.remove('border-b-2', 'border-[#152D4D]');
            });
            document.getElementById('page-' + page).classList.remove('hidden'); 
            document.getElementById('nav-' + page).classList.replace('text-gray-400', 'text-[#152D4D]');
            document.getElementById('nav-' + page).classList.add('border-b-2', 'border-[#152D4D]');
        }

        function renderAll() { updateStats(); calculateOverallProgress(); renderDashboardTasks(); renderCalendar(); renderFullTasks(); renderContacts(); }

        function updateStats() {
            document.getElementById('stat-total').innerText = tasks.length;
            document.getElementById('stat-pending').innerText = tasks.filter(t => t.status === 'รอดำเนินการ').length;
            document.getElementById('stat-active').innerText = tasks.filter(t => t.status === 'กำลังดำเนินการ').length;
            document.getElementById('stat-done').innerText = tasks.filter(t => t.status === 'เสร็จสิ้น').length;
        }

        function calculateOverallProgress() {
            if(tasks.length === 0) {
                document.getElementById('overallProgressValue').innerText = '0%';
                document.getElementById('overallProgressBar').style.width = '0%';
                return;
            }
            let total = tasks.reduce((sum, t) => sum + (t.status === 'เสร็จสิ้น' ? 100 : parseInt(t.progress || 0)), 0);
            let avg = Math.round(total / tasks.length);
            document.getElementById('overallProgressValue').innerText = avg + '%';
            document.getElementById('overallProgressBar').style.width = avg + '%';
        }

        // --- แก้ไข 4. ฟอร์แมตวันที่แบบเต็ม ---
        function getThaiFullDate(dateString) {
            if(!dateString) return '';
            const days = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = new Date(dateString);
            return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
        }

        function generateTaskCardHTML(t) {
            const today = new Date().toISOString().split('T')[0];
            const startObj = new Date(t.startDate);
            const diff = Math.ceil((startObj - new Date(today)) / (1000 * 60 * 60 * 24));
            
            const isToday = t.startDate === today;
            let badge = isToday ? `<span class="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold animate-pulse shadow-sm">วันนี้</span>` : 
                        (diff === 1 ? `<span class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-bold">พรุ่งนี้</span>` : 
                        (diff > 1 ? `<span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs font-bold">อีก ${diff} วัน</span>` : ''));

            // --- แก้ไข 3. สถานะใหญ่ขึ้น ---
            const statusStyles = t.status === 'เสร็จสิ้น' ? 'bg-red-100 text-red-700 border-red-200' : (t.status === 'กำลังดำเนินการ' ? 'bg-green-100 text-green-700 border-green-200' : 'bg-amber-100 text-amber-700 border-amber-200');

            return `
            <div class="bg-white rounded-3xl border border-gray-100 p-5 shadow-sm relative transition-all active:scale-[0.98] ${isToday ? 'animate-slow-bounce today-card shadow-red-100' : ''}">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center gap-2">
                        ${badge}
                        <span class="text-sm font-black text-main bg-blue-50 px-2 py-1 rounded-lg">${t.startTime || 'ไม่ระบุเวลา'}</span>
                    </div>
                    <span class="text-xs font-black px-4 py-2 rounded-full border ${statusStyles} uppercase tracking-wider shadow-sm">${t.status}</span>
                </div>
                
                <h4 class="font-bold text-gray-800 text-lg mb-4 leading-tight">${t.title}</h4>
                
                <div class="space-y-3 mb-4">
                    <div class="flex items-center gap-3 text-main font-bold text-sm">
                        <i class="fa-solid fa-calendar-check text-blue-500 text-lg"></i>
                        ${getThaiFullDate(t.startDate)}
                    </div>
                    <div class="grid grid-cols-1 gap-2 text-sm text-gray-500 font-medium">
                        <div class="flex items-center gap-3"><i class="fa-solid fa-location-dot w-4 text-red-400"></i> ${t.loc || '-'}</div>
                        <div class="flex items-center gap-3"><i class="fa-solid fa-shirt w-4 text-emerald-500"></i> ${t.dress || '-'}</div>
                        <div class="flex items-center gap-3"><i class="fa-solid fa-user-tie w-4 text-indigo-500"></i> ${t.owner}</div>
                    </div>
                </div>

                ${t.link ? `<a href="${t.link}" target="_blank" class="block w-full text-center py-3 bg-blue-50 text-blue-700 rounded-2xl text-sm font-black border border-blue-100 hover:bg-blue-100 transition"><i class="fa-brands fa-google-drive mr-2"></i> เปิดดูเอกสารอ้างอิง</a>` : ''}
                
                ${isAdmin ? `<button onclick="editTask('${t.id}')" class="absolute top-5 right-5 w-10 h-10 bg-gray-50 text-gray-400 rounded-full flex items-center justify-center hover:bg-blue-100 hover:text-main shadow-sm"><i class="fa-solid fa-pen text-sm"></i></button>` : ''}
            </div>`;
        }

        function renderDashboardTasks() {
            const active = tasks.filter(t => t.status !== 'เสร็จสิ้น').sort((a,b) => new Date(a.startDate) - new Date(b.startDate)).slice(0, 10);
            document.getElementById('taskCountBadge').innerText = `${active.length} งานที่ใกล้ถึง`;
            document.getElementById('dashboardTaskList').innerHTML = active.map(t => generateTaskCardHTML(t)).join('') || '<p class="text-center text-gray-400 text-sm py-12 bg-gray-50 rounded-3xl border-2 border-dashed">ขณะนี้ไม่มีคิวงานที่รอดำเนินการ</p>';
        }

        function renderFullTasks() {
            document.getElementById('fullTaskList').innerHTML = tasks.sort((a,b) => new Date(b.startDate) - new Date(a.startDate)).map(t => generateTaskCardHTML(t)).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const names = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('currentMonthYear').innerText = `${names[m]} ${y + 543}`;
            for(let i=0; i<first; i++) grid.innerHTML += `<div></div>`;
            for(let d=1; d<=days; d++) {
                const dateKey = `${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const dateStr = `${y}-${dateKey}`;
                const hasTask = tasks.some(t => { const s = new Date(t.startDate); const e = t.endDate ? new Date(t.endDate) : s; const curr = new Date(dateStr); return curr >= s && curr <= e; });
                const holiday = (y === 2026 && holidays2026[dateKey]) ? holidays2026[dateKey] : null;
                grid.innerHTML += `<button onclick="showDateTasks('${dateStr}')" class="h-12 relative flex items-center justify-center rounded-2xl hover:bg-blue-50 transition ${holiday ? 'text-red-500 font-black bg-red-50' : 'text-gray-700'}">${d} ${hasTask ? `<span class="absolute bottom-1 w-1.5 h-1.5 bg-blue-600 rounded-full"></span>` : ''}</button>`;
            }
        }
        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth()-1); renderCalendar(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth()+1); renderCalendar(); }
        
        function showDateTasks(d) {
            const container = document.getElementById('selectedDateTasks');
            const dayTasks = tasks.filter(t => { const s = new Date(t.startDate); const e = t.endDate ? new Date(t.endDate) : s; const curr = new Date(d); return curr >= s && curr <= e; });
            container.innerHTML = `<h4 class="text-sm font-black text-gray-500 border-b pb-2 mb-2 flex items-center justify-between">คิวงาน ${getThaiFullDate(d)} <i class="fa-solid fa-circle-info"></i></h4>`;
            container.innerHTML += dayTasks.map(t => generateTaskCardHTML(t)).join('') || '<p class="text-xs text-gray-300 py-6 text-center italic">ไม่มีภารกิจในวันนี้</p>';
        }

        function renderContacts(query = '') {
            const container = document.getElementById('contactGroups');
            const filtered = contacts.filter(c => c.name.includes(query) || c.role.includes(query));
            const groups = { "1": "ผู้บริหาร", "2": "ข้าราชการ", "3": "สมาชิก อบต.", "4": "ผู้นำชุมชน" };
            container.innerHTML = '';
            Object.keys(groups).forEach(g => {
                const members = filtered.filter(c => c.group === g);
                if(members.length > 0) {
                    let html = `<div class="space-y-2"><h4 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] pl-2 border-l-4 border-gray-300 ml-1 mb-3">${groups[g]}</h4>`;
                    members.forEach(m => {
                        html += `<div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm flex items-center justify-between"><div onclick="window.location='tel:${m.tel}'" class="flex-1 cursor-pointer"><p class="font-bold text-gray-800 text-lg">${m.name}</p><p class="text-sm text-gray-400 mb-2">${m.role}</p><p class="text-xl font-black text-main tracking-widest">${m.tel}</p></div><div class="flex flex-col gap-3"><a href="tel:${m.tel}" class="w-12 h-12 bg-green-100 text-green-700 rounded-full flex items-center justify-center shadow-sm hover:bg-green-200"><i class="fa-solid fa-phone text-xl"></i></a>${isAdmin ? `<div class="flex gap-2"><button onclick="editContact('${m.id}')" class="text-gray-300 hover:text-blue-500 transition"><i class="fa-solid fa-pen text-sm"></i></button><button onclick="deleteContact('${m.id}')" class="text-red-200 hover:text-red-500 transition"><i class="fa-solid fa-trash text-sm"></i></button></div>` : ''}</div></div>`;
                    });
                    container.innerHTML += html + `</div>`;
                }
            });
        }

        function openTaskModal() { document.getElementById('taskForm').reset(); document.getElementById('taskEditId').value = ''; document.getElementById('progressValue').innerText = '0%'; document.getElementById('t-progress').value = 0; document.getElementById('taskModalTitle').innerText = 'ลงคิวงานใหม่'; document.getElementById('btnDeleteTask').classList.add('hidden'); openModal('taskModal'); }
        function editTask(id) { const t = tasks.find(x => x.id == id); document.getElementById('taskEditId').value = t.id; ['title','startDate','startTime','endDate','endTime','status','loc','dress','owner','link'].forEach(k => document.getElementById(`t-${k}`).value = t[k] || ''); document.getElementById('t-progress').value = t.progress || 0; document.getElementById('progressValue').innerText = (t.progress || 0) + '%'; document.getElementById('taskModalTitle').innerText = 'แก้ไขคิวงาน'; document.getElementById('btnDeleteTask').classList.remove('hidden'); openModal('taskModal'); }
        document.getElementById('taskForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('taskEditId').value; const data = { id: id || Date.now(), progress: document.getElementById('t-progress').value }; ['title','startDate','startTime','endDate','endTime','status','loc','dress','owner','link'].forEach(k => data[k] = document.getElementById(`t-${k}`).value); if(id) { tasks[tasks.findIndex(x => x.id == id)] = data; } else { tasks.push(data); } saveAndClose('taskModal'); };
        function deleteTask() { if(confirm('ต้องการลบคิวงานนี้ถาวร?')) { tasks = tasks.filter(t => t.id != document.getElementById('taskEditId').value); saveAndClose('taskModal'); } }

        function openContactModal() { document.getElementById('contactForm').reset(); document.getElementById('contactEditId').value = ''; document.getElementById('contactModalTitle').innerText = 'เพิ่มรายชื่อใหม่'; openModal('contactModal'); }
        function editContact(id) { const c = contacts.find(x => x.id == id); document.getElementById('contactEditId').value = c.id; document.getElementById('c-name').value = c.name; document.getElementById('c-role').value = c.role; document.getElementById('c-tel').value = c.tel; document.getElementById('c-group').value = c.group; document.getElementById('contactModalTitle').innerText = 'แก้ไขรายชื่อ'; openModal('contactModal'); }
        function deleteContact(id) { if(confirm('ต้องการลบรายชื่อ?')) { contacts = contacts.filter(c => c.id != id); saveAndRefresh(); } }
        document.getElementById('contactForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('contactEditId').value; const data = { id: id || Date.now(), name: document.getElementById('c-name').value, role: document.getElementById('c-role').value, tel: document.getElementById('c-tel').value, group: document.getElementById('c-group').value }; if(id) { contacts[contacts.findIndex(x => x.id == id)] = data; } else { contacts.push(data); } saveAndClose('contactModal'); };

        function updateMayorStatus(txt, cls) { document.getElementById('statusText').innerText = txt; document.getElementById('statusDot').className = `absolute bottom-1 right-1 w-5 h-5 rounded-full border-2 border-white ${cls}`; closeModal('statusModal'); }
        function saveAndRefresh() { localStorage.setItem('tasks', JSON.stringify(tasks)); localStorage.setItem('contacts', JSON.stringify(contacts)); renderAll(); }
        function saveAndClose(m) { saveAndRefresh(); closeModal(m); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
