<!DOCTYPE html>
<html lang="th">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวงาน อบต. ชำผักแพว Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAg_kQRN64eIdhRDtIdsR24JSUiwHdT7tM",
            authDomain: "flutter-ai-playground-ca0f3.firebaseapp.com",
            projectId: "flutter-ai-playground-ca0f3",
            storageBucket: "flutter-ai-playground-ca0f3.firebasestorage.app",
            messagingSenderId: "679308094535",
            appId: "1:679308094535:web:81bd85c714926a10909562",
            databaseURL: "https://flutter-ai-playground-ca0f3-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        window.saveToCloud = (tasks, contacts, mStatus) => {
            const status = mStatus || window.mayorStatus || {text: 'อยู่อบต./ห้องทำงาน', color: 'bg-green-500'};
            db.ref('data/').set({ tasks, contacts, mayorStatus: status });
        };

        db.ref('data/').on('value', (snapshot) => {
            const data = snapshot.val();
            window.tasks = data?.tasks || [];
            window.contacts = data?.contacts || [];
            window.mayorStatus = data?.mayorStatus || {text: 'อยู่อบต./ห้องทำงาน', color: 'bg-green-500'};
            
            const stText = document.getElementById('statusText');
            const stDot = document.getElementById('statusDot');
            if(stText) stText.innerText = window.mayorStatus.text;
            if(stDot) stDot.className = `absolute -bottom-1 -right-1 w-5 h-5 md:w-6 md:h-6 rounded-full border-4 border-white ${window.mayorStatus.color} shadow-sm transition-colors duration-300`;

            if(typeof window.renderAll === 'function') {
                window.renderAll();
            }
        });
    </script>

    <script>
        tailwind.config = { theme: { extend: { borderRadius: { 'xl': '1rem', '2xl': '1.5rem', '3xl': '2rem' } } } }
    </script>

    <style>
        html { font-size: 18px !important; }
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .bg-main { background-color: #152D4D; }
        .text-main { color: #152D4D; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tap-effect:active { transform: scale(0.97); opacity: 0.9; }
        
        .wave-text span { display: inline-block; color: #FFD700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); animation: wave 2s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .wave-text span:nth-child(1) { animation-delay: 0.1s; } .wave-text span:nth-child(2) { animation-delay: 0.2s; }
        .wave-text span:nth-child(3) { animation-delay: 0.3s; } .wave-text span:nth-child(4) { animation-delay: 0.4s; }
        .wave-text span:nth-child(5) { animation-delay: 0.5s; } .wave-text span:nth-child(6) { animation-delay: 0.6s; }
        .wave-text span:nth-child(7) { animation-delay: 0.7s; } .wave-text span:nth-child(8) { animation-delay: 0.8s; }
        .wave-text span:nth-child(9) { animation-delay: 0.9s; } .wave-text span:nth-child(10) { animation-delay: 1.0s; }
        .wave-text span:nth-child(11) { animation-delay: 1.1s; }

        @keyframes pulse-orange { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }
        .animate-countdown { animation: pulse-orange 1.5s infinite; }

        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-upcoming { animation: bounce-subtle 2.5s infinite; border: 2px solid #3b82f6 !important; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2); }

        .glass-stat-card {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            position: relative; overflow: hidden;
        }
        .glass-stat-card .bg-icon { position: absolute; bottom: -20px; right: -15px; font-size: 90px; opacity: 0.08; transform: rotate(-15deg); }
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="max-w-6xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        
        <div class="sticky top-0 z-50 flex flex-col w-full shadow-md">

                        <span class="font-black text-2xl tracking-widest wave-text uppercase leading-none">
                            <span>C</span><span>H</span><span>U</span><span>M</span><span>P</span><span>A</span><span>K</span><span>P</span><span>A</span><span>E</span><span>W</span>
                        </span>

                <button onclick="changePage('calendar')" id="nav-calendar" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-calendar-alt mr-2"></i>ปฏิทิน</button>
                <button onclick="changePage('tasks')" id="nav-tasks" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-list-check mr-2"></i>คิวงาน</button>
                <button onclick="changePage('contacts')" id="nav-contacts" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-address-book mr-2"></i>เบอร์โทร</button>
            </nav>
        </div>

        <main id="mainContent" class="flex-1 p-4 md:p-8 space-y-8 bg-[#f8fafc]">
            <div id="page-dashboard" class="space-y-8 animate-fade-in">
                <div class="bg-white p-5 md:p-6 rounded-[2rem] border border-gray-100 flex items-center justify-between shadow-sm hover:shadow-md transition-all tap-effect relative">
                    <div class="flex items-center gap-4 md:gap-5">
                        <div class="relative">
                            <img src="https://drive.google.com/thumbnail?id=1ET2DmRqMeDl1f13eL9EZpxr_FNvtZpwM&sz=w200" class="w-16 h-16 md:w-20 md:h-20 rounded-2xl object-cover shadow-sm border-2 border-white">
                            <div id="statusDot" class="absolute -bottom-1 -right-1 w-5 h-5 md:w-6 md:h-6 rounded-full border-4 border-white bg-green-500 shadow-sm"></div>
                        </div>
                        <div>

                        </div>
                    </div>
                    <button id="admin-status-btn" onclick="openModal('statusModal')" class="hidden absolute top-5 right-5 md:relative md:top-0 md:right-0 w-10 h-10 rounded-xl bg-gray-50 border border-gray-100 flex items-center justify-center tap-effect hover:bg-gray-100 transition-all"><i class="fa-solid fa-pen text-sm text-gray-400"></i></button>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

                    </div>
                    <div class="glass-stat-card p-5 rounded-[2rem] text-amber-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">รอดำเนินการ</p><h3 id="stat-pending" class="text-4xl font-black mt-1">0</h3>

                    <div class="glass-stat-card p-5 rounded-[2rem] text-emerald-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">กำลังทำ</p><h3 id="stat-active" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-spinner bg-icon animate-spin-slow"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-[2rem] text-red-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">เสร็จสิ้น</p><h3 id="stat-done" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-check-double bg-icon"></i>
                    </div>
                </div>

                <div id="dashboardTaskList" class="w-full">
                    <div class="py-12 text-center text-gray-400 font-prompt">
                        <i class="fa-solid fa-spinner animate-spin text-3xl mb-3 text-main"></i>
                        <p>กำลังเชื่อมต่อฐานข้อมูล...</p>
                    </div>
                </div>
            </div>

            <div id="page-calendar" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 max-w-3xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="prevMonth()" class="w-10 h-10 rounded-full bg-gray-50 border tap-effect"><i class="fa-solid fa-chevron-left text-gray-500"></i></button>
                        <h3 id="currentMonthYear" class="font-black text-main text-lg uppercase"></h3>

                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center font-bold text-xs text-gray-400 mb-4 uppercase border-b pb-4">
                        <div class="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-400">ส</div>
                    </div>

                </div>
                <div id="selectedDateTasks" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="page-tasks" class="hidden space-y-6">
                <h2 class="font-black text-main text-lg border-l-4 border-blue-500 pl-3 uppercase">คิวงานทั้งหมดในระบบ</h2>
                <div id="fullTaskList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden fixed bottom-8 right-6 md:bottom-10 md:right-10 w-16 h-16 bg-main text-white rounded-3xl shadow-2xl flex items-center justify-center text-3xl z-[60] border-4 border-white transform tap-effect">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm font-prompt">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="taskModalTitle" class="text-2xl font-black text-main">บันทึกคิวงาน</h2>
                <button onclick="closeModal('taskModal')" class="text-gray-400 hover:text-red-500 tap-effect"><i class="fa-solid fa-times text-2xl"></i></button>
            </div>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="taskEditId">
                <input type="text" id="t-title" placeholder="ชื่องาน/ภารกิจ" required class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none font-bold text-main">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">วันที่เริ่ม</label><input type="date" id="t-startDate" required class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">เวลาเริ่ม</label><input type="time" id="t-startTime" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">วันที่สิ้นสุด (ถ้ามี)</label><input type="date" id="t-endDate" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">เวลาสิ้นสุด (ถ้ามี)</label><input type="time" id="t-endTime" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm"></div>
                </div>
                
                <select id="t-status" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100"><option>รอดำเนินการ</option><option>กำลังดำเนินการ</option><option>เสร็จสิ้น</option></select>
                <input type="text" id="t-loc" placeholder="สถานที่" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="text" id="t-dress" placeholder="การแต่งกาย" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="text" id="t-coord" placeholder="ผู้ประสานงาน" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <select id="t-owner" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100"><option>นายก</option><option>ปลัด</option><option>รองนายก</option><option>กองช่าง</option></select>
                <input type="url" id="t-link" placeholder="ลิงก์แนบไฟล์ Google Drive (ถ้ามี)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-sm">
                
                <div class="pt-4 flex gap-3">
                    <button type="button" id="btnDeleteTask" onclick="deleteTask()" class="hidden px-5 bg-red-50 text-red-500 rounded-2xl tap-effect"><i class="fa-solid fa-trash"></i></button>
                    <button type="button" onclick="closeModal('taskModal')" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold tap-effect">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-4 bg-main text-white rounded-2xl font-bold shadow-lg tap-effect">บันทึกคิวงาน</button>
                </div>

    <div id="contactModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm font-prompt">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border-t-8 border-indigo-600">
            <h2 id="contactModalTitle" class="text-xl font-black text-indigo-900 mb-6 uppercase">จัดการรายชื่อ</h2>
            <form id="contactForm" class="space-y-4">
                <input type="hidden" id="contactEditId">
                <input type="text" id="c-name" placeholder="ชื่อ-นามสกุล" required class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 font-bold">
                <input type="text" id="c-nickname" placeholder="ชื่อเล่น" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="text" id="c-role" placeholder="ตำแหน่ง" required class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">

                    <option value="1">1. ผู้บริหาร</option><option value="2">2. ข้าราชการ</option><option value="3">3. พนักงานจ้าง</option><option value="4">4. พนักงานจ้างเหมา</option><option value="5">5. สมาชิก อบต.</option><option value="6">6. กำนัน</option><option value="7">7. ผู้ใหญ่บ้าน</option><option value="8">8. ผู้ช่วยผู้ใหญ่บ้าน</option>
                </select>
                <div class="flex gap-3 pt-6">
                    <button type="button" onclick="closeModal('contactModal')" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold tap-effect">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg tap-effect">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md font-prompt">

            <div class="w-16 h-16 bg-main rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-lock text-white text-2xl"></i></div>
            <h2 class="text-xl font-black text-main mb-6 uppercase tracking-widest">Admin</h2>

            <div class="flex gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 py-3 rounded-2xl text-gray-400 font-bold bg-gray-100 tap-effect">ยกเลิก</button>
                <button onclick="verifyAdminLogin()" class="flex-1 py-3 rounded-2xl bg-main text-white font-bold tap-effect">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div id="statusModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm font-prompt">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center border-t-8 border-emerald-500 shadow-2xl">
            <h3 class="mb-6 text-main leading-tight font-black text-xl">อัปเดตสถานะนายก</h3>
            <div class="grid gap-3">
                <button onclick="updateMayorStatus('อยู่อบต./ห้องทำงาน', 'bg-green-500')" class="p-4 bg-green-50 text-green-700 font-bold rounded-2xl tap-effect hover:bg-green-100 text-lg border border-green-100">🟢 อยู่อบต.</button>
                <button onclick="updateMayorStatus('ลงพื้นที่/ติดภารกิจ', 'bg-amber-500')" class="p-4 bg-amber-50 text-amber-700 font-bold rounded-2xl tap-effect hover:bg-amber-100 text-lg border border-amber-100">🟡 ลงพื้นที่</button>
                <button onclick="updateMayorStatus('ไม่อยู่อบต.', 'bg-red-500')" class="p-4 bg-red-50 text-red-700 font-bold rounded-2xl tap-effect hover:bg-red-100 text-lg border border-red-100">🔴 ไม่อยู่อบต.</button>
            </div>
            <button onclick="closeModal('statusModal')" class="mt-6 text-gray-400 tap-effect uppercase text-sm font-bold bg-gray-50 px-6 py-3 rounded-xl w-full">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script>
        const holidays2026 = { "01-01": "วันขึ้นปีใหม่", "03-03": "วันมาฆบูชา", "04-06": "วันจักรี", "04-13": "วันสงกรานต์", "04-14": "วันสงกรานต์", "04-15": "วันสงกรานต์", "05-01": "วันแรงงานแห่งชาติ", "05-04": "วันฉัตรมงคล", "05-11": "วันพืชมงคลฯ", "05-31": "วันวิสาขบูชา", "06-01": "ชดเชยวันวิสาขบูชา", "06-03": "วันเฉลิมฯ พระราชินี", "07-28": "วันเฉลิมฯ ร.10", "07-29": "วันอาสาฬหบูชา", "07-30": "วันเข้าพรรษา", "08-12": "วันแม่แห่งชาติ", "10-13": "วันนวมินทรมหาราช", "10-23": "วันปิยมหาราช", "10-26": "วันออกพรรษา", "12-05": "วันพ่อแห่งชาติ", "12-07": "ชดเชยวันพ่อแห่งชาติ", "12-10": "วันรัฐธรรมนูญ", "12-31": "วันสิ้นปี" };

        window.tasks = []; window.contacts = []; window.mayorStatus = { text: 'อยู่อบต./ห้องทำงาน', color: 'bg-green-500' };
        window.isAdmin = false; window.currentPage = 'dashboard';
        let currentViewDate = new Date();

        window.onload = () => { if(typeof window.renderAll === 'function') window.renderAll(); };

        function handleAdminToggle() {
            if (window.isAdmin) { window.isAdmin = false; updateAdminUI(); renderAll(); } 
            else { document.getElementById('adminPassword').value = ''; openModal('loginModal'); }
        }

        function verifyAdminLogin() {
            if(document.getElementById('adminPassword').value === 'ntrd') {
                window.isAdmin = true; closeModal('loginModal'); updateAdminUI(); renderAll();
            } else { alert('รหัสผ่านแอดมินไม่ถูกต้อง!'); }
        }

        function changePage(p) {
            window.currentPage = p;
            ['dashboard','calendar','tasks','contacts'].forEach(id => {
                document.getElementById('page-'+id).classList.add('hidden');
                document.getElementById('nav-'+id).className = 'flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect font-prompt';
            });
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('nav-'+p).className = 'flex-1 py-4 text-main border-b-4 border-main font-bold text-sm min-w-[100px] tap-effect font-prompt';
            updateAdminUI(); window.scrollTo(0,0); renderAll();
        }

        function updateAdminUI() {
            document.getElementById('fabAdd').classList.toggle('hidden', !window.isAdmin || window.currentPage !== 'dashboard');
            document.getElementById('admin-add-contact').classList.toggle('hidden', !window.isAdmin || window.currentPage !== 'contacts');
            const statusBtn = document.getElementById('admin-status-btn');
            if(statusBtn) statusBtn.classList.toggle('hidden', !window.isAdmin || window.currentPage !== 'dashboard');
            document.getElementById('adminIcon').className = window.isAdmin ? 'fa-solid fa-user-check text-green-400 text-lg' : 'fa-solid fa-user-shield text-lg text-white';
        }

        function getDiffDays(dateString) {
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateString); target.setHours(0,0,0,0);
            return Math.ceil((target - today) / 86400000);
        }

        // เพิ่มฟังก์ชันแปลงวันที่เป็นแบบไทย
        function formatThaiDate(dateStr) {
            if(!dateStr) return '';
            const days = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return dateStr;
            return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
        }

        function taskCardHTML(t, animate = false) {
            const diff = getDiffDays(t.startDate);
            let countdown = diff === 0 ? `<div class="absolute -top-3 -right-2 bg-red-600 text-white text-[11px] font-black px-3 py-1.5 rounded-full animate-countdown shadow-lg">วันนี้!</div>` : 
                           (diff > 0 && diff <= 10) ? `<div class="absolute -top-3 -right-2 bg-orange-500 text-white text-[11px] font-black px-3 py-1.5 rounded-full animate-countdown shadow-lg">อีก ${diff} วันจะถึงงาน</div>` : '';
            
            return `<div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 relative tap-effect ${animate?'animate-upcoming':''} font-prompt hover:shadow-md transition-all">
                ${countdown}
                <div class="flex justify-between items-center mb-4"><span class="bg-blue-50 text-main px-3 py-1.5 rounded-xl text-sm font-bold"><i class="fa-regular fa-clock mr-1"></i>${t.startTime||'ไม่ระบุเวลา'}</span><span class="text-[10px] border px-2 py-1 rounded-lg uppercase text-gray-400 font-bold">${t.status}</span></div>
                <h4 class="font-bold text-xl leading-tight mb-4 text-gray-800">${t.title}</h4>
                <div class="text-sm text-gray-500 space-y-2">
                    <p><i class="fa-solid fa-calendar-day mr-2 text-main w-4"></i><span class="font-medium">${formatThaiDate(t.startDate)}</span> ${t.endDate ? ' ถึง <span class="font-medium">' + formatThaiDate(t.endDate) + '</span>' : ''}</p>
                    <p><i class="fa-solid fa-location-dot mr-2 text-main w-4"></i>${t.loc||'-'}</p>
                    <p><i class="fa-solid fa-shirt mr-2 text-main w-4"></i>การแต่งกาย: ${t.dress||'-'}</p>
                    <p><i class="fa-solid fa-user mr-2 text-main w-4"></i>รับผิดชอบ: <span class="text-main font-medium">${t.owner}</span></p>
                    ${t.coord?`<p><i class="fa-solid fa-handshake mr-2 text-main w-4"></i>ประสานงาน: ${t.coord}</p>`:''}
                </div>
                ${t.link ? `<a href="${t.link}" target="_blank" class="block mt-5 text-center py-2.5 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold border border-blue-100 hover:bg-blue-100 transition-all"><i class="fa-brands fa-google-drive mr-2"></i>เปิดไฟล์เอกสารแนบ</a>` : ''}
                ${window.isAdmin ? `<button onclick="editTask('${t.id}')" class="absolute bottom-6 right-6 w-10 h-10 bg-gray-50 text-gray-400 rounded-xl flex items-center justify-center border hover:text-main hover:bg-white transition-all"><i class="fa-solid fa-pen"></i></button>` : ''}
            </div>`;
        }

        window.renderAll = () => {
            // อัปเดตตัวเลขหน้าแรก
            document.getElementById('stat-total').innerText = window.tasks.length;
            document.getElementById('stat-pending').innerText = window.tasks.filter(t=>t.status==='รอดำเนินการ').length;
            document.getElementById('stat-active').innerText = window.tasks.filter(t=>t.status==='กำลังดำเนินการ').length;
            document.getElementById('stat-done').innerText = window.tasks.filter(t=>t.status==='เสร็จสิ้น').length;

            const todayStr = new Date().toISOString().split('T')[0];

            // 1. หน้า Dashboard
            if (window.currentPage === 'dashboard') {
                const dashContainer = document.getElementById('dashboardTaskList');
                const todayTasks = window.tasks.filter(t => t.startDate === todayStr);
                const upcomingTasks = window.tasks.filter(t => t.startDate > todayStr).sort((a,b) => a.startDate.localeCompare(b.startDate)).slice(0, 10);

                let html = `
                    <div class="mb-10">
                        <h2 class="font-black text-main text-lg border-l-4 border-main pl-3 mb-4 uppercase tracking-widest">คิวงานวันนี้</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${todayTasks.length > 0 
                                ? todayTasks.map(t => taskCardHTML(t, false)).join('') 
                                : '<div class="col-span-full bg-white rounded-[2rem] p-8 border border-dashed border-gray-200 text-center shadow-sm"><p class="text-gray-400 font-prompt"><i class="fa-regular fa-calendar-xmark text-3xl mb-3 block opacity-50"></i>ไม่มีคิวงานในวันนี้</p></div>'}
                        </div>
                    </div>
                    
                    <div>
                        <h2 class="font-black text-blue-500 text-lg border-l-4 border-blue-500 pl-3 mb-4 uppercase tracking-widest">คิวงานวันถัดไป (10 คิวล่าสุด)</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${upcomingTasks.length > 0 
                                ? upcomingTasks.map(t => taskCardHTML(t, true)).join('') 
                                : '<div class="col-span-full bg-white rounded-[2rem] p-8 border border-dashed border-gray-200 text-center shadow-sm"><p class="text-gray-400 font-prompt">ไม่มีคิวงานถัดไป</p></div>'}
                        </div>
                    </div>
                `;
                dashContainer.innerHTML = html;
            }

            // 2. หน้า Calendar
            if (window.currentPage === 'calendar') {
                const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
                const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
                const names = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                document.getElementById('currentMonthYear').innerText = `${names[m]} ${y+543}`;
                const first = new Date(y,m,1).getDay(), total = new Date(y,m+1,0).getDate();
                for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
                for(let d=1; d<=total; d++) {
                    const dateKey = `${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                    const fullDate = `${y}-${dateKey}`;
                    const hasTask = window.tasks.some(t => t.startDate === fullDate);
                    const h = holidays2026[dateKey];
                    grid.innerHTML += `<button onclick="showDayTasks('${fullDate}','${h||''}')" class="h-12 flex flex-col items-center justify-center rounded-2xl hover:bg-blue-50 relative tap-effect border border-transparent hover:border-blue-100 transition-all">
                        <span class="${h?'text-red-500 font-bold':'text-gray-700 font-medium'} text-sm">${d}</span>
                        ${hasTask?'<div class="w-1.5 h-1.5 bg-main rounded-full mt-1"></div>':''}
                    </button>`;
                }
            }

            // 3. หน้า Tasks (งานทั้งหมด)
            if (window.currentPage === 'tasks') {
                const fullList = document.getElementById('fullTaskList');
                fullList.innerHTML = window.tasks.sort((a,b)=>b.startDate.localeCompare(a.startDate)).map(t => taskCardHTML(t)).join('') || '<p class="text-center text-gray-300 py-10 w-full col-span-full font-prompt">ไม่มีข้อมูลคิวงาน</p>';
            }
            
            // 4. หน้า Contacts
            if (window.currentPage === 'contacts') renderContacts();
        };

        function showDayTasks(date, h) {
            const container = document.getElementById('selectedDateTasks');
            const dayTasks = window.tasks.filter(t => t.startDate === date);
            const thaiDate = formatThaiDate(date);
            let head = `<div class="col-span-full p-4 bg-white rounded-[2rem] border border-gray-100 shadow-sm font-prompt text-center"><p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">วันที่เลือก</p><p class="font-black text-main text-xl">${thaiDate}</p>${h?`<div class="mt-3 inline-block bg-red-50 text-red-500 font-bold text-sm px-4 py-2 rounded-xl"><i class="fa-solid fa-flag mr-2"></i>วันหยุดราชการ: ${h}</div>`:''}</div>`;
            container.innerHTML = head + (dayTasks.length ? dayTasks.map(t => taskCardHTML(t)).join('') : '<div class="col-span-full bg-white rounded-[2rem] p-8 border border-dashed border-gray-200 text-center"><p class="text-gray-400 font-prompt">ไม่มีคิวงานในวันนี้</p></div>');
        }

        function renderContacts(query = '') {
            const container = document.getElementById('contactGroups'); if(!container) return;
            const groups = { "1":"ผู้บริหาร","2":"ข้าราชการ","3":"พนักงานจ้าง","4":"พนักงานจ้างเหมา","5":"สมาชิก อบต.","6":"กำนัน","7":"ผู้ใหญ่บ้าน","8":"ผู้ช่วยผู้ใหญ่บ้าน" };
            container.innerHTML = '';
            Object.keys(groups).forEach(g => {
                const list = window.contacts.filter(c => c.group === g && (c.name.includes(query) || c.role.includes(query)));
                if(list.length) {
                    let html = `<div class="space-y-4 font-prompt"><h4 class="text-xs font-black text-gray-400 uppercase pl-3 border-l-4 border-gray-200 ml-1 mb-2 tracking-widest">${groups[g]}</h4>`;
                    list.forEach(m => {
                        html += `<div class="bg-white p-5 rounded-[2rem] border border-gray-100 flex items-center justify-between shadow-sm tap-effect hover:shadow-md transition-all">
                            <div onclick="window.location='tel:${m.tel}'" class="flex-1">
                                <p class="font-bold text-main text-lg leading-tight mb-1"><i class="fa-solid fa-circle-user mr-3 text-main w-5"></i>${m.name}</p>
                                <p class="text-[15px] text-main font-medium mb-1 leading-tight"><i class="fa-solid fa-heart mr-3 text-main w-5 opacity-40"></i>${m.nickname || '-'}</p>
                                <p class="text-[15px] text-gray-500 font-normal mb-3 leading-tight"><i class="fa-solid fa-briefcase mr-3 text-main w-5 opacity-40"></i>${m.role}</p>
                                <p class="text-xl font-black text-main tracking-widest leading-tight"><i class="fa-solid fa-mobile-retro mr-3 text-main w-5 opacity-40 text-sm"></i>${m.tel}</p>
                            </div>
                            <div class="flex flex-col items-center gap-3">
                                <a href="tel:${m.tel}" class="w-14 h-14 bg-green-50 text-green-600 rounded-[1.5rem] flex items-center justify-center shadow-sm hover:bg-green-100"><i class="fa-solid fa-phone text-xl"></i></a>
                                ${window.isAdmin ? `<div class="flex gap-2 bg-gray-50 px-3 py-2 rounded-xl border border-gray-100"><button onclick="editContact('${m.id}')" class="text-gray-400 hover:text-main w-6 h-6 flex items-center justify-center"><i class="fa-solid fa-pen text-sm"></i></button><button onclick="deleteContact('${m.id}')" class="text-red-300 hover:text-red-500 w-6 h-6 flex items-center justify-center"><i class="fa-solid fa-trash text-sm"></i></button></div>` : ''}
                            </div>
                        </div>`;
                    });
                    container.innerHTML += html + `</div>`;
                }
            });
        }

        // Utils & Form Actions
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth()-1); renderAll(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth()+1); renderAll(); }
        
        function openTaskModal() { document.getElementById('taskForm').reset(); document.getElementById('taskEditId').value = ''; document.getElementById('btnDeleteTask').classList.add('hidden'); openModal('taskModal'); }
        function editTask(id) { const t = window.tasks.find(x => x.id == id); if(!t) return; document.getElementById('taskEditId').value = t.id; ['title','startDate','startTime','endDate','endTime','status','loc','dress','coord','owner','link'].forEach(k => { if(document.getElementById(`t-${k}`)) document.getElementById(`t-${k}`).value = t[k]||''; }); document.getElementById('btnDeleteTask').classList.remove('hidden'); openModal('taskModal'); }
        document.getElementById('taskForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('taskEditId').value || Date.now().toString(); const data = { id }; ['title','startDate','startTime','endDate','endTime','status','loc','dress','coord','owner','link'].forEach(k => data[k] = document.getElementById(`t-${k}`).value); const idx = window.tasks.findIndex(x => x.id === id); if(idx > -1) window.tasks[idx] = data; else window.tasks.push(data); window.saveToCloud(window.tasks, window.contacts, window.mayorStatus); closeModal('taskModal'); };
        function deleteTask() { if(confirm('ยืนยันการลบคิวงานนี้ถาวร?')) { window.tasks = window.tasks.filter(t => t.id !== document.getElementById('taskEditId').value); window.saveToCloud(window.tasks, window.contacts, window.mayorStatus); closeModal('taskModal'); } }

        function openContactModal() { document.getElementById('contactForm').reset(); document.getElementById('contactEditId').value = ''; openModal('contactModal'); }
        function editContact(id) { const c = window.contacts.find(x => x.id == id); if(!c) return; document.getElementById('contactEditId').value = c.id; ['name','nickname','role','tel','group'].forEach(k => { if(document.getElementById(`c-${k}`)) document.getElementById(`c-${k}`).value = c[k]||''; }); openModal('contactModal'); }
        document.getElementById('contactForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('contactEditId').value || Date.now().toString(); const data = { id }; ['name','nickname','role','tel','group'].forEach(k => data[k] = document.getElementById(`c-${k}`).value); const idx = window.contacts.findIndex(x => x.id === id); if(idx > -1) window.contacts[idx] = data; else window.contacts.push(data); window.saveToCloud(window.tasks, window.contacts, window.mayorStatus); closeModal('contactModal'); };
        function deleteContact(id) { if(confirm('ยืนยันการลบรายชื่อนี้?')) { window.contacts = window.contacts.filter(c => c.id !== id); window.saveToCloud(window.tasks, window.contacts, window.mayorStatus); } }

        function updateMayorStatus(txt, cls) {
            window.mayorStatus = { text: txt, color: cls };
            window.saveToCloud(window.tasks, window.contacts, window.mayorStatus);
            closeModal('statusModal');
        }
    </script>
</body>
</html>
