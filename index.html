<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวงาน อบต. ชำผักแพว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { theme: { extend: { borderRadius: { 'xl': '1rem', '2xl': '1.5rem', '3xl': '2rem' } } } }
    </script>

    <style>
        html { font-size: 18px !important; }
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .bg-main { background-color: #152D4D; }

        /* --- Golden Wave Animation --- */
        .wave-text span {
            display: inline-block;
            color: #FFD700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            animation: wave 2s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); } /* ปรับความสูงคลื่นให้พอดีกับฟอนต์ใหม่ */
        }
        .wave-text span:nth-child(1) { animation-delay: 0.1s; }
        .wave-text span:nth-child(2) { animation-delay: 0.2s; }
        .wave-text span:nth-child(3) { animation-delay: 0.3s; }
        .wave-text span:nth-child(4) { animation-delay: 0.4s; }
        .wave-text span:nth-child(5) { animation-delay: 0.5s; }
        .wave-text span:nth-child(6) { animation-delay: 0.6s; }
        .wave-text span:nth-child(7) { animation-delay: 0.7s; }
        .wave-text span:nth-child(8) { animation-delay: 0.8s; }
        .wave-text span:nth-child(9) { animation-delay: 0.9s; }
        .wave-text span:nth-child(10) { animation-delay: 1.0s; }
        .wave-text span:nth-child(11) { animation-delay: 1.1s; }

        .progress-fill {
            width: 0%;
            transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        @keyframes slow-bounce { 0%, 100% { transform: translateY(-3px); } 50% { transform: translateY(3px); } }
        .animate-slow-bounce { animation: slow-bounce 2s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass-modal {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="w-full max-w-5xl mx-auto min-h-screen bg-white relative flex flex-col shadow-2xl">
        
        <header class="bg-main px-5 py-4 flex justify-between items-center text-white sticky top-0 z-50 shadow-xl">
            <div class="flex items-center gap-3">
                <img src="https://drive.google.com/thumbnail?id=1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY&sz=w200" class="w-11 h-11 object-contain" alt="Logo">
                <div class="flex flex-col">
                    <span class="font-black text-xl tracking-widest wave-text">
                        <span>C</span><span>H</span><span>U</span><span>M</span><span>P</span><span>A</span><span>K</span><span>P</span><span>A</span><span>E</span><span>W</span>
                    </span>
                    <span class="text-[11px] font-light opacity-80 leading-tight">องค์การบริหารส่วนตำบลชำผักแพว</span>
                </div>
            </div>
            <button onclick="handleAdminToggle()" class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition relative" id="adminBtn">
                <i id="adminIcon" class="fa-solid fa-user-shield text-lg"></i>
                <div id="adminBadge" class="hidden absolute -top-0.5 -right-0.5 w-3.5 h-3.5 bg-green-400 rounded-full border-2 border-[#152D4D]"></div>
            </button>
        </header>

        <nav class="flex bg-white border-b py-1 sticky top-[84px] z-40 shadow-sm">
            <button onclick="changePage('dashboard')" id="nav-dashboard" class="flex-1 py-3 flex flex-col items-center text-[#152D4D] border-b-2 border-[#152D4D]"><i class="fa-solid fa-chart-line text-xl mb-1"></i><span class="text-[10px] font-bold">แดชบอร์ด</span></button>
            <button onclick="changePage('calendar')" id="nav-calendar" class="flex-1 py-3 flex flex-col items-center text-gray-400"><i class="fa-solid fa-calendar-alt text-xl mb-1"></i><span class="text-[10px] font-bold">ปฏิทิน</span></button>
            <button onclick="changePage('tasks')" id="nav-tasks" class="flex-1 py-3 flex flex-col items-center text-gray-400"><i class="fa-solid fa-clipboard-list text-xl mb-1"></i><span class="text-[10px] font-bold">คิวงาน</span></button>
            <button onclick="changePage('contacts')" id="nav-contacts" class="flex-1 py-3 flex flex-col items-center text-gray-400"><i class="fa-solid fa-address-book text-xl mb-1"></i><span class="text-[10px] font-bold">เบอร์โทร</span></button>
        </nav>

        <main id="mainContent" class="flex-1 p-5 space-y-6 overflow-x-hidden">
            
            <section id="page-dashboard" class="space-y-6">
                <div class="bg-gradient-to-br from-white to-gray-50 p-5 rounded-3xl border border-gray-100 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <img src="https://drive.google.com/thumbnail?id=1ET2DmRqMeDl1f13eL9EZpxr_FNvtZpwM&sz=w200" class="w-16 h-16 rounded-2xl object-cover shadow-md border-2 border-white" alt="Mayor">
                            <div id="statusDot" class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full border-4 border-white bg-green-500 shadow-sm"></div>
                        </div>
                        <div>
                            <h2 class="font-black text-[#152D4D] text-lg">นายกณัฐรดา กล้าหาญ</h2>
                            <p id="statusText" class="text-xs text-gray-500 font-medium">อยู่อบต./ห้องทำงาน</p>
                        </div>
                    </div>
                    <button id="admin-status-btn" onclick="openModal('statusModal')" class="hidden w-9 h-9 rounded-xl bg-white shadow-sm border border-gray-100 text-gray-400"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-indigo-600 p-4 rounded-3xl text-white shadow-lg shadow-indigo-100 relative overflow-hidden">
                        <i class="fa-solid fa-layer-group absolute -right-2 -bottom-2 text-5xl opacity-10"></i>
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-wider">ทั้งหมด</p>
                        <h3 id="stat-total" class="text-3xl font-black mt-1">0</h3>
                    </div>
                    <div class="bg-amber-500 p-4 rounded-3xl text-white shadow-lg shadow-amber-100 relative overflow-hidden">
                        <i class="fa-solid fa-clock absolute -right-2 -bottom-2 text-5xl opacity-10"></i>
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-wider">รอดำเนินการ</p>
                        <h3 id="stat-pending" class="text-3xl font-black mt-1">0</h3>
                    </div>
                    <div class="bg-emerald-500 p-4 rounded-3xl text-white shadow-lg shadow-emerald-100 relative overflow-hidden">
                        <i class="fa-solid fa-spinner absolute -right-2 -bottom-2 text-5xl opacity-10"></i>
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-wider">กำลังทำ</p>
                        <h3 id="stat-active" class="text-3xl font-black mt-1">0</h3>
                    </div>
                    <div class="bg-red-500 p-4 rounded-3xl text-white shadow-lg shadow-red-100 relative overflow-hidden">
                        <i class="fa-solid fa-check-double absolute -right-2 -bottom-2 text-5xl opacity-10"></i>
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-wider">เสร็จสิ้น</p>
                        <h3 id="stat-done" class="text-3xl font-black mt-1">0</h3>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-black text-[#152D4D] text-sm">ความคืบหน้าภารกิจโดยรวม</h3>
                        <span id="overallProgressValue" class="text-blue-600 font-black text-xl tracking-tighter">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden shadow-inner p-0.5">
                        <div id="overallProgressBar" class="progress-fill h-full rounded-full bg-gradient-to-r from-blue-400 to-blue-600 shadow-sm relative">
                            <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center px-1">
                    <h3 class="font-black text-[#152D4D] border-l-4 border-main pl-3">คิวงานสำคัญวันนี้</h3>
                    <span id="taskCountBadge" class="text-xs font-bold text-gray-400"></span>
                </div>
                <div id="dashboardTaskList" class="space-y-4"></div>
            </section>

            <section id="page-calendar" class="hidden space-y-4"></section>
            <section id="page-tasks" class="hidden space-y-4"></section>
            <section id="page-contacts" class="hidden space-y-5"></section>
        </main>

        <footer class="bg-white/80 backdrop-blur-md border-t flex justify-around p-4 pb-8 z-40">
            <a href="https://www.chumpakpaew.go.th" class="flex flex-col items-center text-gray-400 hover:text-main transition-colors"><i class="fa-solid fa-globe text-2xl mb-1"></i><span class="text-[10px] font-bold">เว็บไซต์</span></a>
            <a href="https://www.facebook.com/xbt.cha.phak.ph.w" class="flex flex-col items-center text-gray-400 hover:text-blue-700 transition-colors"><i class="fa-brands fa-facebook text-2xl mb-1"></i><span class="text-[10px] font-bold">เฟสบุ๊ก</span></a>
            <a href="https://lin.ee/dCB8MH3" class="flex flex-col items-center text-gray-400 hover:text-green-500 transition-colors"><i class="fa-brands fa-line text-2xl mb-1"></i><span class="text-[10px] font-bold">ไลน์</span></a>
            <a href="tel:036-714-081" class="flex flex-col items-center text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-phone text-2xl mb-1"></i><span class="text-[10px] font-bold">โทรศัพท์</span></a>
        </footer>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden fixed bottom-32 right-6 w-16 h-16 bg-main text-white rounded-3xl shadow-2xl flex items-center justify-center text-3xl z-50 border-4 border-white transform hover:scale-110 transition-all">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/40 backdrop-blur-md">
        <div class="glass-modal w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center border-t-4 border-blue-400/30">
            <div class="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white text-2xl shadow-xl rotate-3">
                <i class="fa-solid fa-fingerprint"></i>
            </div>
            <h2 class="text-xl font-black text-gray-800 mb-1 tracking-tighter">ยืนยันรหัสแอดมิน</h2>
            <p class="text-[10px] text-gray-400 mb-8 font-medium">กรุณาใส่รหัสผ่านเพื่อจัดการข้อมูล</p>
            <input type="password" id="adminPassword" placeholder="••••••••" class="w-full p-4 bg-white/50 rounded-2xl border-2 border-transparent focus:border-blue-400 text-center font-black tracking-[0.8em] mb-8 shadow-inner outline-none transition-all">
            <div class="flex gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 py-3 rounded-2xl bg-white text-gray-500 font-black shadow-sm hover:bg-gray-50 text-sm">ยกเลิก</button>
                <button onclick="verifyAdminLogin()" class="flex-1 py-3 rounded-2xl bg-main text-white font-black shadow-lg hover:shadow-blue-200 text-sm">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script>
        // ใส่ฟังก์ชันเดิมทั้งหมดที่ทำงานได้ดีอยู่แล้วต่อจากตรงนี้...
        // [ระบบเดิมของคุณคงที่]
        const holidays2026 = { "01-01": "วันขึ้นปีใหม่", "03-03": "วันมาฆบูชา", "04-06": "วันจักรี", "04-13": "วันสงกรานต์", "04-14": "วันสงกรานต์", "04-15": "วันสงกรานต์", "05-01": "วันแรงงานแห่งชาติ", "05-04": "วันฉัตรมงคล", "05-11": "วันพืชมงคลฯ", "05-31": "วันวิสาขบูชา", "06-01": "ชดเชยวันวิสาขบูชา", "06-03": "วันเฉลิมฯ พระราชินี", "07-28": "วันเฉลิมฯ ร.10", "07-29": "วันอาสาฬหบูชา", "07-30": "วันเข้าพรรษา", "08-12": "วันแม่แห่งชาติ", "10-13": "วันนวมินทรมหาราช", "10-23": "วันปิยมหาราช", "10-26": "วันออกพรรษา", "12-05": "วันพ่อแห่งชาติ", "12-07": "ชดเชยวันพ่อแห่งชาติ", "12-10": "วันรัฐธรรมนูญ", "12-31": "วันสิ้นปี" };

        let isAdmin = false;
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let contacts = JSON.parse(localStorage.getItem('contacts')) || [{ id: 1, name: "นายสมชาย ใจดี", role: "ปลัด อบต.", tel: "081-111-1111", group: "2" }];
        let currentViewDate = new Date();

        window.onload = () => { renderAll(); };

        function handleAdminToggle() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('adminIcon').classList.replace('fa-user-check', 'fa-user-shield');
                document.getElementById('adminIcon').classList.remove('text-green-300');
                document.getElementById('adminBadge').classList.add('hidden');
                document.querySelectorAll('#admin-status-btn, #admin-add-contact, #fabAdd').forEach(el => el.classList.add('hidden'));
                saveAndRefresh();
            } else {
                openModal('loginModal');
            }
        }

        function verifyAdminLogin() {
            const pwd = document.getElementById('adminPassword').value.toLowerCase();
            if(pwd === 'ntrd') {
                isAdmin = true;
                closeModal('loginModal');
                document.getElementById('adminIcon').classList.replace('fa-user-shield', 'fa-user-check');
                document.getElementById('adminIcon').classList.add('text-green-300');
                document.getElementById('adminBadge').classList.remove('hidden');
                document.querySelectorAll('#admin-status-btn, #admin-add-contact, #fabAdd').forEach(el => el.classList.remove('hidden'));
                renderAll();
            } else {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        }

        function changePage(page) {
            ['dashboard', 'calendar', 'tasks', 'contacts'].forEach(p => { 
                const pg = document.getElementById('page-' + p);
                if(pg) pg.classList.add('hidden'); 
                const nav = document.getElementById('nav-' + p);
                if(nav) nav.classList.replace('text-[#152D4D]', 'text-gray-400');
                if(nav) nav.classList.remove('border-b-2', 'border-[#152D4D]');
            });
            const activePg = document.getElementById('page-' + page);
            if(activePg) activePg.classList.remove('hidden'); 
            const activeNav = document.getElementById('nav-' + page);
            if(activeNav) activeNav.classList.replace('text-gray-400', 'text-[#152D4D]');
            if(activeNav) activeNav.classList.add('border-b-2', 'border-[#152D4D]');
            if(page === 'dashboard') calculateOverallProgress();
        }

        function renderAll() { updateStats(); calculateOverallProgress(); renderDashboardTasks(); }

        function updateStats() {
            document.getElementById('stat-total').innerText = tasks.length;
            document.getElementById('stat-pending').innerText = tasks.filter(t => t.status === 'รอดำเนินการ').length;
            document.getElementById('stat-active').innerText = tasks.filter(t => t.status === 'กำลังดำเนินการ').length;
            document.getElementById('stat-done').innerText = tasks.filter(t => t.status === 'เสร็จสิ้น').length;
        }

        function calculateOverallProgress() {
            const bar = document.getElementById('overallProgressBar');
            const valText = document.getElementById('overallProgressValue');
            if(!bar) return;
            if(tasks.length === 0) { valText.innerText = '0%'; bar.style.width = '0%'; return; }
            let doneTasks = tasks.filter(t => t.status === 'เสร็จสิ้น').length;
            let avg = Math.round((doneTasks / tasks.length) * 100);
            setTimeout(() => {
                bar.style.width = avg + '%';
                valText.innerText = avg + '%';
                if(avg === 100) { bar.classList.replace('from-blue-400', 'from-emerald-400'); bar.classList.replace('to-blue-600', 'to-emerald-600'); }
            }, 100);
        }

        // ฟังก์ชันอื่นๆ เช่น renderDashboardTasks ไว้ใช้งานต่อตามโค้ดต้นฉบับของคุณ...
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function saveAndRefresh() { localStorage.setItem('tasks', JSON.stringify(tasks)); renderAll(); }

    </script>
</body>
</html>
