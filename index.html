<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHUMPAKPAEW App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    borderRadius: { 'xl': '1rem', '2xl': '1.5rem', '3xl': '2rem' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Prompt', sans-serif; font-size: 18px; background-color: #f8fafc; }
        .bg-main { background-color: #152D4D; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        /* Animation */
        @keyframes bounce-soft { 0%, 100% { transform: translateY(-5px); } 50% { transform: translateY(5px); } }
        .animate-soft { animation: bounce-soft 3s ease-in-out infinite; }
        .animate-blink { animation: pulse 1.5s infinite; }

        /* Custom Scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, select, textarea { font-size: 18px !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden items-center justify-center bg-gray-200">

    <div id="app" class="w-full max-w-md h-screen bg-white shadow-2xl relative overflow-hidden flex flex-col">
        
        <div id="splashScreen" class="absolute inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-all duration-700">
            <div class="text-center p-6">
                <div class="bg-gray-50 p-8 rounded-3xl mb-6 shadow-inner">
                    <img src="https://lh3.googleusercontent.com/d/1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY" alt="Logo" class="w-32 h-32 object-contain mx-auto">
                </div>
                <h1 class="text-2xl font-bold text-[#152D4D]">CHUMPAKPAEW</h1>
                <p class="text-gray-500 mb-8">อบต. ชุมปักแปว</p>
                <button onclick="startApp()" class="px-10 py-4 bg-main text-white rounded-2xl font-bold shadow-xl hover:scale-105 active:scale-95 transition-all">
                    เริ่มต้นใช้งาน
                </button>
            </div>
        </div>

        <header class="bg-main px-5 py-4 flex justify-between items-center text-white">
            <div class="flex items-center gap-3">
                <img src="https://lh3.googleusercontent.com/d/1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY" class="w-10 h-10 bg-white rounded-xl p-1">
                <span class="font-bold tracking-tight text-xl">CHUMPAKPAEW</span>
            </div>
            <button onclick="handleAdminLogin()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition">
                <i class="fa-solid fa-user-gear"></i>
            </button>
        </header>

        <nav class="flex justify-around bg-white border-b py-2 text-[14px] font-medium text-gray-400">
            <button onclick="changePage('dashboard')" id="nav-dashboard" class="flex flex-col items-center flex-1 text-blue-900"><i class="fa-solid fa-house-chimney mb-1"></i>แดชบอร์ด</button>
            <button onclick="changePage('calendar')" id="nav-calendar" class="flex flex-col items-center flex-1"><i class="fa-solid fa-calendar-days mb-1"></i>ปฏิทิน</button>
            <button onclick="changePage('tasks')" id="nav-tasks" class="flex flex-col items-center flex-1"><i class="fa-solid fa-briefcase mb-1"></i>งานทั้งหมด</button>
            <button onclick="changePage('contacts')" id="nav-contacts" class="flex flex-col items-center flex-1"><i class="fa-solid fa-address-book mb-1"></i>สมุดเบอร์</button>
        </nav>

        <main id="mainContent" class="flex-1 overflow-y-auto no-scrollbar p-5 pb-24 space-y-6">
            
            <section id="page-dashboard" class="space-y-6">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <img src="https://lh3.googleusercontent.com/d/1ET2DmRqMeDl1f13eL9EZpxr_FNvtZpwM" class="w-16 h-16 rounded-2xl object-cover border-2 border-blue-50">
                            <div id="statusDot" class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full border-4 border-white bg-green-500"></div>
                        </div>
                        <div>
                            <h2 class="font-bold text-[#152D4D]">นายก อบต.</h2>
                            <p id="statusText" class="text-sm text-gray-500">อยู่อบต./ห้องทำงาน</p>
                        </div>
                    </div>
                    <button id="admin-status-btn" onclick="openModal('statusModal')" class="hidden w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-400"><i class="fa-solid fa-pen-to-square"></i></button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div style="background-color: #E0E7FF" class="p-4 rounded-3xl text-center shadow-sm">
                        <p class="text-sm text-indigo-700 font-medium">งานทั้งหมด</p>
                        <h3 id="stat-total" class="text-3xl font-black text-indigo-900">0</h3>
                    </div>
                    <div style="background-color: #FEF3C7" class="p-4 rounded-3xl text-center shadow-sm">
                        <p class="text-sm text-amber-700 font-medium">รอดำเนินการ</p>
                        <h3 id="stat-pending" class="text-3xl font-black text-amber-900">0</h3>
                    </div>
                    <div style="background-color: #D0F9E5" class="p-4 rounded-3xl text-center shadow-sm">
                        <p class="text-sm text-emerald-700 font-medium">กำลังทำ</p>
                        <h3 id="stat-active" class="text-3xl font-black text-emerald-900">0</h3>
                    </div>
                    <div style="background-color: #EF4444" class="p-4 rounded-3xl text-center shadow-sm text-white">
                        <p class="text-sm font-medium opacity-90">เสร็จสิ้น</p>
                        <h3 id="stat-done" class="text-3xl font-black">0</h3>
                    </div>
                </div>

                <div id="highlightSection">
                    <h3 class="font-bold text-lg mb-3 flex items-center justify-between">
                        คิวงานสำคัญ <span id="pulseLabel" class="hidden text-red-500 text-xs animate-blink">● วันนี้</span>
                    </h3>
                    <div id="highlightCard"></div>
                </div>
            </section>

            <section id="page-calendar" class="hidden space-y-4">
                <div class="bg-white p-4 rounded-3xl border shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <button onclick="prevMonth()" class="w-10 h-10 rounded-full hover:bg-gray-100"><i class="fa-solid fa-chevron-left"></i></button>
                        <h3 id="currentMonthYear" class="font-bold text-[#152D4D]"></h3>
                        <button onclick="nextMonth()" class="w-10 h-10 rounded-full hover:bg-gray-100"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="grid grid-cols-7 text-center text-xs font-bold text-gray-400 mb-2">
                        <div class="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-400">ส</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center font-medium"></div>
                </div>
                <div id="selectedDateTasks" class="space-y-3"></div>
            </section>

            <section id="page-tasks" class="hidden space-y-3">
                <h3 class="font-bold text-lg">รายการคิวงานทั้งหมด</h3>
                <div id="fullTaskList" class="space-y-3"></div>
            </section>

            <section id="page-contacts" class="hidden space-y-4">
                <div class="relative">
                    <input type="text" onkeyup="renderContacts(this.value)" placeholder="ค้นหาชื่อ หรือตำแหน่ง..." class="w-full p-4 pl-12 bg-white rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-[#152D4D]">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                </div>
                <div id="contactGroups" class="space-y-6"></div>
                <button id="admin-add-contact" onclick="openContactModal()" class="hidden w-full py-4 rounded-2xl border-2 border-dashed border-gray-300 text-gray-400 font-bold"><i class="fa-solid fa-plus mr-2"></i>เพิ่มรายชื่อใหม่</button>
            </section>

        </main>

        <footer class="absolute bottom-0 w-full glass-nav border-t flex justify-around p-3 z-50">
            <a href="https://www.chumpakpaew.go.th" class="flex flex-col items-center text-xs"><i class="fa-solid fa-globe text-blue-500 mb-1"></i>เว็บ</a>
            <a href="https://www.facebook.com" class="flex flex-col items-center text-xs"><i class="fa-brands fa-facebook text-blue-700 mb-1"></i>เฟสบุ๊ก</a>
            <a href="https://lin.ee/dCB8MH3" class="flex flex-col items-center text-xs"><i class="fa-brands fa-line text-green-500 mb-1"></i>ไลน์</a>
            <a href="tel:036-714-081" class="flex flex-col items-center text-xs"><i class="fa-solid fa-phone text-red-500 mb-1"></i>โทร</a>
        </footer>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden absolute bottom-24 right-6 w-16 h-16 bg-main text-white rounded-3xl shadow-2xl items-center justify-center text-2xl z-50 transition transform active:scale-90">
            <i class="fa-solid fa-plus"></i>
        </button>

    </div>

    <div id="taskModal" class="hidden fixed inset-0 z-[110] bg-black/60 flex items-end">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="taskModalTitle" class="text-xl font-bold">ลงคิวงาน</h2>
                <button onclick="closeModal('taskModal')" class="w-10 h-10 bg-gray-100 rounded-full"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="taskEditId">
                <div><label class="block text-sm font-bold mb-1">ชื่องาน (บังคับกรอก)*</label><input type="text" id="t-title" required class="w-full p-3 bg-gray-50 rounded-xl outline-none border focus:border-main"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-bold mb-1">วันที่*</label><input type="date" id="t-date" required class="w-full p-3 bg-gray-50 rounded-xl outline-none border"></div>
                    <div><label class="block text-sm font-bold mb-1">เวลา</label><input type="time" id="t-time" class="w-full p-3 bg-gray-50 rounded-xl outline-none border"></div>
                </div>
                <div><label class="block text-sm font-bold mb-1">สถานะ</label>
                    <select id="t-status" class="w-full p-3 bg-gray-50 rounded-xl outline-none border">
                        <option>รอดำเนินการ</option><option>กำลังดำเนินการ</option><option>เสร็จสิ้น</option>
                    </select>
                </div>
                <div><label class="block text-sm font-bold mb-1">สถานที่ / ผู้ประสานงาน</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="t-loc" placeholder="สถานที่" class="w-full p-3 bg-gray-50 rounded-xl outline-none border">
                        <input type="text" id="t-coord" placeholder="ผู้ประสานงาน" class="w-full p-3 bg-gray-50 rounded-xl outline-none border">
                    </div>
                </div>
                <div><label class="block text-sm font-bold mb-1">การแต่งกาย</label><input type="text" id="t-dress" placeholder="เช่น ชุดปกติขาว, ชุดพื้นเมือง" class="w-full p-3 bg-gray-50 rounded-xl outline-none border"></div>
                <div><label class="block text-sm font-bold mb-1">ผู้รับผิดชอบ</label>
                    <select id="t-owner" class="w-full p-3 bg-gray-50 rounded-xl outline-none border">
                        <option>นายก</option><option>รองมานิต</option><option>รองบุญโฮม</option><option>เลขามาลี</option><option>ปลัด</option><option>กองช่าง</option>
                    </select>
                </div>
                <div><label class="block text-sm font-bold mb-1">เอกสารแนบ</label><input type="file" class="w-full p-2 text-sm bg-gray-50 rounded-xl border border-dashed border-gray-300"></div>
                <button type="submit" class="w-full py-4 bg-main text-white rounded-2xl font-bold shadow-lg">บันทึกคิวงาน</button>
                <button type="button" id="btnDeleteTask" onclick="deleteTask()" class="hidden w-full py-4 text-red-500 font-bold">ลบคิวงานนี้</button>
            </form>
        </div>
    </div>

    <div id="contactModal" class="hidden fixed inset-0 z-[110] bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 id="contactModalTitle" class="text-xl font-bold mb-4">เพิ่มรายชื่อ</h2>
            <form id="contactForm" class="space-y-4">
                <input type="hidden" id="contactEditId">
                <input type="text" id="c-name" placeholder="ชื่อ-นามสกุล (ชื่อเล่น)" required class="w-full p-3 bg-gray-50 rounded-xl border">
                <input type="text" id="c-role" placeholder="ตำแหน่ง" required class="w-full p-3 bg-gray-50 rounded-xl border">
                <input type="tel" id="c-tel" placeholder="เบอร์โทรศัพท์" required class="w-full p-3 bg-gray-50 rounded-xl border">
                <select id="c-group" class="w-full p-3 bg-gray-50 rounded-xl border">
                    <option value="1">1. นายก/ผู้บริหาร</option>
                    <option value="2">2. ข้าราชการ/พนักงาน</option>
                    <option value="3">3. สมาชิก อบต.</option>
                    <option value="4">4. กำนัน/ผู้ใหญ่บ้าน</option>
                </select>
                <button type="submit" class="w-full py-4 bg-main text-white rounded-2xl font-bold shadow-lg">บันทึกข้อมูล</button>
                <button type="button" onclick="closeModal('contactModal')" class="w-full py-2 text-gray-400 font-medium">ยกเลิก</button>
            </form>
        </div>
    </div>

    <div id="statusModal" class="hidden fixed inset-0 z-[110] bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6">
            <h3 class="font-bold mb-4 text-center">อัปเดตสถานะนายก</h3>
            <div class="grid gap-2">
                <button onclick="updateMayorStatus('อยู่อบต./ห้องทำงาน', 'bg-green-500')" class="p-3 bg-green-50 text-green-700 rounded-xl font-bold">🟢 อยู่อบต.</button>
                <button onclick="updateMayorStatus('ลงพื้นที่/ติดภารกิจ', 'bg-yellow-500')" class="p-3 bg-yellow-50 text-yellow-700 rounded-xl font-bold">🟡 ลงพื้นที่</button>
                <button onclick="updateMayorStatus('ไม่อยู่อบต.', 'bg-red-500')" class="p-3 bg-red-50 text-red-700 rounded-xl font-bold">🔴 ไม่อยู่อบต.</button>
            </div>
        </div>
    </div>

    <script>
        // --- Data ---
        let isAdmin = false;
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let contacts = JSON.parse(localStorage.getItem('contacts')) || [
            { id: 1, name: "นายสมชาย ใจดี", role: "นายก อบต.", tel: "081-111-1111", group: "1" },
            { id: 2, name: "นางมาลี มีสุข", role: "ปลัด อบต.", tel: "082-222-2222", group: "2" }
        ];

        let currentViewDate = new Date();
        const holidayList = { "01-01": "วันขึ้นปีใหม่", "04-13": "วันสงกรานต์", "05-01": "วันแรงงาน", "12-05": "วันพ่อ" };

        // --- Core Functions ---
        function startApp() {
            document.getElementById('splashScreen').classList.add('opacity-0', '-translate-y-full');
            setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 700);
            renderAll();
        }

        function changePage(page) {
            ['dashboard', 'calendar', 'tasks', 'contacts'].forEach(p => {
                document.getElementById('page-' + p).classList.add('hidden');
                document.getElementById('nav-' + p).classList.remove('text-blue-900', 'border-t-2', 'border-blue-900');
                document.getElementById('nav-' + p).classList.add('text-gray-400');
            });
            document.getElementById('page-' + page).classList.remove('hidden');
            document.getElementById('nav-' + page).classList.add('text-blue-900');
        }

        function handleAdminLogin() {
            if(isAdmin) { isAdmin = false; alert("ออกจากระบบแอดมิน"); location.reload(); return; }
            const pass = prompt("ใส่รหัสผ่านแอดมิน:");
            if(pass === 'ntrd') {
                isAdmin = true;
                alert("ยินดีต้อนรับ แอดมิน!");
                document.querySelectorAll('#admin-status-btn, #admin-add-contact, #fabAdd').forEach(el => el.classList.remove('hidden'));
                renderAll();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        }

        // --- Rendering ---
        function renderAll() {
            updateStats();
            renderHighlight();
            renderCalendar();
            renderFullTasks();
            renderContacts();
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = tasks.length;
            document.getElementById('stat-pending').innerText = tasks.filter(t => t.status === 'รอดำเนินการ').length;
            document.getElementById('stat-active').innerText = tasks.filter(t => t.status === 'กำลังดำเนินการ').length;
            document.getElementById('stat-done').innerText = tasks.filter(t => t.status === 'เสร็จสิ้น').length;
        }

        function renderHighlight() {
            const today = new Date().toISOString().split('T')[0];
            const sorted = tasks.filter(t => t.status !== 'เสร็จสิ้น').sort((a,b) => new Date(a.date) - new Date(b.date));
            const container = document.getElementById('highlightCard');
            const pulse = document.getElementById('pulseLabel');
            
            if(sorted.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-gray-400 bg-gray-50 rounded-3xl border-2 border-dashed">ไม่มีคิวงานที่กำลังจะถึง</div>`;
                pulse.classList.add('hidden');
                return;
            }

            const item = sorted[0];
            const isToday = item.date === today;
            isToday ? pulse.classList.remove('hidden') : pulse.classList.add('hidden');

            const diff = Math.ceil((new Date(item.date) - new Date(today)) / (1000*60*60*24));
            const dayLabel = diff === 0 ? "วันนี้" : (diff === 1 ? "พรุ่งนี้" : `อีก ${diff} วัน`);

            container.innerHTML = `
                <div class="bg-white p-5 rounded-3xl shadow-lg border-t-4 border-blue-900 ${isToday ? 'animate-soft shadow-blue-100' : ''}">
                    <div class="flex justify-between items-start mb-3">
                        <span class="px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-full">${dayLabel}</span>
                        <span class="text-xs text-gray-400">${item.date} ${item.time || ''}</span>
                    </div>
                    <h4 class="text-xl font-bold text-gray-800 mb-2">${item.title}</h4>
                    <p class="text-sm text-gray-500 mb-4"><i class="fa-solid fa-location-dot mr-1"></i> ${item.loc || '-'}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold">${item.owner[0]}</div>
                            <span class="text-xs font-bold text-gray-600">${item.owner}</span>
                        </div>
                        ${isAdmin ? `<button onclick="editTask('${item.id}')" class="text-blue-500 text-sm font-bold">แก้ไข</button>` : ''}
                    </div>
                </div>
            `;
        }

        // --- Calendar Logic ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYear = document.getElementById('currentMonthYear');
            grid.innerHTML = '';

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            monthYear.innerText = `${monthNames[month]} ${year + 543}`;

            // Empty days
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

            // Days
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${(month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const hasTask = tasks.some(t => t.date === dateStr);
                const holiday = holidayList[`${(month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`];
                
                grid.innerHTML += `
                    <button onclick="showDateTasks('${dateStr}')" class="h-12 relative flex items-center justify-center rounded-xl hover:bg-blue-50 transition ${holiday ? 'text-red-500' : ''}">
                        ${d}
                        ${hasTask ? `<span class="absolute bottom-1 w-1.5 h-1.5 bg-blue-900 rounded-full"></span>` : ''}
                    </button>
                `;
            }
        }

        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth() + 1); renderCalendar(); }

        function showDateTasks(dateStr) {
            const container = document.getElementById('selectedDateTasks');
            const dayTasks = tasks.filter(t => t.date === dateStr);
            container.innerHTML = `<h4 class="font-bold text-sm text-gray-400">คิวงานวันที่ ${dateStr}</h4>`;
            
            if(dayTasks.length === 0) {
                container.innerHTML += `<div class="p-4 bg-gray-50 rounded-2xl text-center text-sm text-gray-400">ไม่มีคิวงาน</div>`;
                return;
            }

            dayTasks.forEach(t => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm">${t.title}</p>
                            <p class="text-xs text-gray-400">${t.time || 'ไม่ระบุเวลา'}</p>
                        </div>
                        <span class="text-[10px] px-2 py-1 bg-gray-100 rounded-lg">${t.status}</span>
                    </div>
                `;
            });
        }

        function renderFullTasks() {
            const container = document.getElementById('fullTaskList');
            const list = tasks.sort((a,b) => new Date(b.date) - new Date(a.date));
            container.innerHTML = '';
            
            list.forEach(t => {
                const isDone = t.status === 'เสร็จสิ้น';
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm ${isDone ? 'opacity-60' : ''}">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold ${isDone ? 'text-red-500' : 'text-blue-600'}">${t.date}</span>
                            <span class="text-xs font-medium text-gray-400">${t.status}</span>
                        </div>
                        <h4 class="font-bold mb-2">${t.title}</h4>
                        <div class="text-[12px] text-gray-500 grid grid-cols-2 gap-2">
                            <span><i class="fa-solid fa-user-tag mr-1"></i> ${t.owner}</span>
                            <span><i class="fa-solid fa-shirt mr-1"></i> ${t.dress || '-'}</span>
                        </div>
                        ${isAdmin ? `<button onclick="editTask('${t.id}')" class="mt-3 w-full py-2 bg-gray-50 rounded-xl text-xs font-bold">แก้ไขข้อมูล</button>` : ''}
                    </div>
                `;
            });
        }

        // --- Contact Logic ---
        function renderContacts(query = '') {
            const container = document.getElementById('contactGroups');
            container.innerHTML = '';
            const filtered = contacts.filter(c => c.name.includes(query) || c.role.includes(query));
            
            const groupNames = { "1": "1. นายก/ผู้บริหาร", "2": "2. ข้าราชการ/พนักงาน", "3": "3. สมาชิก อบต.", "4": "4. กำนัน/ผู้ใหญ่บ้าน" };

            Object.keys(groupNames).forEach(g => {
                const members = filtered.filter(c => c.group === g);
                if(members.length > 0) {
                    let html = `<div class="space-y-3"><h4 class="font-bold text-[#152D4D] border-l-4 border-blue-900 pl-2 text-sm">${groupNames[g]}</h4>`;
                    members.forEach(m => {
                        html += `
                            <div class="bg-white p-4 rounded-3xl border shadow-sm flex items-center justify-between transition active:scale-95">
                                <div onclick="window.location='tel:${m.tel}'" class="flex-1">
                                    <p class="font-bold text-gray-800">${m.name}</p>
                                    <p class="text-xs text-gray-400">${m.role}</p>
                                </div>
                                <div class="flex gap-2">
                                    <a href="tel:${m.tel}" class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-phone"></i></a>
                                    ${isAdmin ? `<button onclick="editContact('${m.id}')" class="w-10 h-10 bg-gray-50 text-gray-400 rounded-full flex items-center justify-center"><i class="fa-solid fa-edit"></i></button>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    container.innerHTML += html;
                }
            });
        }

        // --- Action Functions ---
        function openTaskModal() {
            document.getElementById('taskForm').reset();
            document.getElementById('taskEditId').value = '';
            document.getElementById('taskModalTitle').innerText = 'ลงคิวงานใหม่';
            document.getElementById('btnDeleteTask').classList.add('hidden');
            openModal('taskModal');
        }

        function editTask(id) {
            const t = tasks.find(x => x.id == id);
            document.getElementById('taskEditId').value = t.id;
            document.getElementById('t-title').value = t.title;
            document.getElementById('t-date').value = t.date;
            document.getElementById('t-time').value = t.time;
            document.getElementById('t-status').value = t.status;
            document.getElementById('t-loc').value = t.loc;
            document.getElementById('t-coord').value = t.coord;
            document.getElementById('t-dress').value = t.dress;
            document.getElementById('t-owner').value = t.owner;
            document.getElementById('taskModalTitle').innerText = 'แก้ไขคิวงาน';
            document.getElementById('btnDeleteTask').classList.remove('hidden');
            openModal('taskModal');
        }

        document.getElementById('taskForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('taskEditId').value;
            const data = {
                id: id || Date.now(),
                title: document.getElementById('t-title').value,
                date: document.getElementById('t-date').value,
                time: document.getElementById('t-time').value,
                status: document.getElementById('t-status').value,
                loc: document.getElementById('t-loc').value,
                coord: document.getElementById('t-coord').value,
                dress: document.getElementById('t-dress').value,
                owner: document.getElementById('t-owner').value
            };

            if(id) {
                const idx = tasks.findIndex(x => x.id == id);
                tasks[idx] = data;
            } else {
                tasks.push(data);
            }
            saveAndRefresh();
            closeModal('taskModal');
        };

        function deleteTask() {
            const id = document.getElementById('taskEditId').value;
            if(confirm('ยืนยันการลบคิวงานนี้?')) {
                tasks = tasks.filter(t => t.id != id);
                saveAndRefresh();
                closeModal('taskModal');
            }
        }

        function openContactModal() {
            document.getElementById('contactForm').reset();
            document.getElementById('contactEditId').value = '';
            document.getElementById('contactModalTitle').innerText = 'เพิ่มรายชื่อใหม่';
            openModal('contactModal');
        }

        function editContact(id) {
            const c = contacts.find(x => x.id == id);
            document.getElementById('contactEditId').value = c.id;
            document.getElementById('c-name').value = c.name;
            document.getElementById('c-role').value = c.role;
            document.getElementById('c-tel').value = c.tel;
            document.getElementById('c-group').value = c.group;
            document.getElementById('contactModalTitle').innerText = 'แก้ไขรายชื่อ';
            openModal('contactModal');
        }

        document.getElementById('contactForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('contactEditId').value;
            const data = {
                id: id || Date.now(),
                name: document.getElementById('c-name').value,
                role: document.getElementById('c-role').value,
                tel: document.getElementById('c-tel').value,
                group: document.getElementById('c-group').value
            };
            if(id) {
                const idx = contacts.findIndex(x => x.id == id);
                contacts[idx] = data;
            } else {
                contacts.push(data);
            }
            saveAndRefresh();
            closeModal('contactModal');
        };

        function updateMayorStatus(txt, cls) {
            document.getElementById('statusText').innerText = txt;
            document.getElementById('statusDot').className = `absolute -bottom-1 -right-1 w-5 h-5 rounded-full border-4 border-white ${cls}`;
            closeModal('statusModal');
        }

        function saveAndRefresh() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            localStorage.setItem('contacts', JSON.stringify(contacts));
            renderAll();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Initial Start
        window.onload = () => {
            // Check current month for calendar
            renderCalendar();
        };
    </script>
</body>
</html>
