<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวงาน อบต. ชำผักแพว Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { theme: { extend: { borderRadius: { 'xl': '1rem', '2xl': '1.5rem', '3xl': '2rem' } } } }
    </script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .bg-main { background-color: #152D4D; }
        .text-main { color: #152D4D; }
        .glass-stat-card {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            position: relative; overflow: hidden; transition: all 0.3s ease;
        }
        .glass-stat-card .bg-icon { position: absolute; bottom: -20px; right: -10px; font-size: 90px; opacity: 0.1; transform: rotate(-15deg); }
        .tap-effect:active { transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes slow-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-upcoming { animation: slow-bounce 2.5s ease-in-out infinite; border: 2px solid #3b82f6 !important; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2); }
        
        @keyframes pulse-orange { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; transform: scale(0.95); } }
        .animate-countdown { animation: pulse-orange 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen pb-20 md:pb-0">

    <div id="app" class="max-w-6xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        
        <header class="bg-main px-6 py-4 flex justify-between items-center text-white sticky top-0 z-50 shadow-md">
            <div class="flex items-center gap-4">
                <img src="https://drive.google.com/thumbnail?id=1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY&sz=w200" class="w-11 h-11 object-contain">
                <h1 class="font-black text-xl tracking-tighter uppercase">CHUMPAKPAEW <span class="font-light text-xs block opacity-70 font-prompt">อบต. ชำผักแพว</span></h1>
            </div>
            <button onclick="handleAdminToggle()" id="adminBtn" class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center tap-effect border border-white/20">
                <i id="adminIcon" class="fa-solid fa-user-shield text-lg text-white"></i>
            </button>
        </header>

        <nav class="flex bg-white border-b sticky top-[75px] z-40 shadow-sm overflow-x-auto no-scrollbar font-prompt">
            <button onclick="changePage('dashboard')" id="nav-dashboard" class="flex-1 py-4 text-main border-b-4 border-main font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-chart-line mr-2"></i>แดชบอร์ด</button>
            <button onclick="changePage('calendar')" id="nav-calendar" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-calendar-alt mr-2"></i>ปฏิทิน</button>
            <button onclick="changePage('tasks')" id="nav-tasks" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-list-check mr-2"></i>คิวงาน</button>
            <button onclick="changePage('contacts')" id="nav-contacts" class="flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect"><i class="fa-solid fa-address-book mr-2"></i>เบอร์โทร</button>
        </nav>

        <main id="mainContent" class="flex-1 p-4 md:p-8 bg-[#fcfdfe]">
            
            <section id="page-dashboard" class="space-y-8 animate-fade-in">
                <div id="big-numbers" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="glass-stat-card p-5 rounded-[2rem] text-indigo-700">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">งานทั้งหมด</p>
                        <h3 id="stat-total" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-folder-tree bg-icon"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-[2rem] text-amber-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">รอดำเนินการ</p>
                        <h3 id="stat-pending" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-clock-rotate-left bg-icon"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-[2rem] text-emerald-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">กำลังทำ</p>
                        <h3 id="stat-active" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-spinner bg-icon"></i>
                    </div>
                    <div class="glass-stat-card p-5 rounded-[2rem] text-red-600">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest font-prompt">เสร็จสิ้น</p>
                        <h3 id="stat-done" class="text-4xl font-black mt-1">0</h3>
                        <i class="fa-solid fa-check-double bg-icon"></i>
                    </div>
                </div>

                <div id="dashboardTaskList" class="w-full">
                    <div class="py-10 text-center text-gray-400 font-prompt">
                        <i class="fa-solid fa-spinner animate-spin text-3xl mb-3 text-main"></i>
                        <p>กำลังโหลดข้อมูลคิวงาน...</p>
                    </div>
                </div>
            </section>

            <section id="page-calendar" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 max-w-3xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="prevMonth()" class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center border tap-effect"><i class="fa-solid fa-chevron-left text-gray-500"></i></button>
                        <h3 id="currentMonthYear" class="font-black text-main text-xl"></h3>
                        <button onclick="nextMonth()" class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center border tap-effect"><i class="fa-solid fa-chevron-right text-gray-500"></i></button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center font-bold text-sm text-gray-400 mb-4 uppercase border-b pb-4">
                        <div class="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-400">ส</div>
                    </div>
                    <div id="daysGrid" class="grid grid-cols-7 gap-2 md:gap-3"></div>
                </div>
                <div id="selectedDateTasks" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="page-tasks" class="hidden space-y-6">
                <h2 class="font-black text-main text-lg border-l-4 border-blue-500 pl-3 uppercase">คิวงานทั้งหมดในระบบ</h2>
                <div id="fullTaskList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </section>

            <section id="page-contacts" class="hidden space-y-6">
                <div class="max-w-3xl mx-auto space-y-6">
                    <div class="relative">
                        <input type="text" id="contactSearch" onkeyup="renderContacts(this.value)" placeholder="ค้นหารายชื่อ หรือ ตำแหน่ง..." class="w-full p-5 pl-14 bg-white rounded-3xl shadow-lg border-none outline-none focus:ring-2 focus:ring-main transition-all font-prompt">
                        <i class="fa-solid fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-300 text-lg"></i>
                    </div>
                    <button id="admin-add-contact" onclick="openContactModal()" class="hidden w-full py-4 bg-indigo-50 text-indigo-700 rounded-2xl font-black border-2 border-dashed border-indigo-200 tap-effect">
                        <i class="fa-solid fa-user-plus mr-2"></i> เพิ่มรายชื่อใหม่
                    </button>
                    <div id="contactGroups" class="space-y-8"></div>
                </div>
            </section>
        </main>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden fixed bottom-8 right-6 md:bottom-10 md:right-10 w-16 h-16 bg-main text-white rounded-3xl shadow-2xl flex items-center justify-center text-3xl z-[60] border-4 border-white transform tap-effect">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar font-prompt">
            <div class="flex justify-between items-center mb-6">
                <h2 id="taskModalTitle" class="text-2xl font-black text-main">บันทึกคิวงาน</h2>
                <button onclick="closeModal('taskModal')" class="text-gray-300 hover:text-red-500 tap-effect"><i class="fa-solid fa-times text-2xl"></i></button>
            </div>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="taskEditId">
                <input type="text" id="t-title" placeholder="ชื่องาน/ภารกิจ" required class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none font-bold text-main">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">วันที่เริ่ม</label><input type="date" id="t-startDate" required class="w-full p-4 bg-gray-50 rounded-2xl border-none text-sm"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">เวลาเริ่ม</label><input type="time" id="t-startTime" class="w-full p-4 bg-gray-50 rounded-2xl border-none text-sm"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">วันที่สิ้นสุด (ถ้ามี)</label><input type="date" id="t-endDate" class="w-full p-4 bg-gray-50 rounded-2xl border-none text-sm"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-gray-400 pl-2">เวลาสิ้นสุด (ถ้ามี)</label><input type="time" id="t-endTime" class="w-full p-4 bg-gray-50 rounded-2xl border-none text-sm"></div>
                </div>
                
                <select id="t-status" class="w-full p-4 bg-gray-50 rounded-2xl border-none"><option>รอดำเนินการ</option><option>กำลังดำเนินการ</option><option>เสร็จสิ้น</option></select>
                <input type="text" id="t-loc" placeholder="สถานที่" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input type="text" id="t-dress" placeholder="การแต่งกาย" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input type="text" id="t-coord" placeholder="ผู้ประสานงาน" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <select id="t-owner" class="w-full p-4 bg-gray-50 rounded-2xl border-none"><option>นายก</option><option>ปลัด</option><option>รองนายก</option><option>กองช่าง</option></select>
                <input type="url" id="t-link" placeholder="ลิงก์ Google Drive ไฟล์แนบ (ถ้ามี)" class="w-full p-4 bg-gray-50 rounded-2xl border-none text-sm">
                
                <div class="pt-6 flex gap-3">
                    <button type="button" id="btnDeleteTask" onclick="deleteTask()" class="hidden px-5 bg-red-50 text-red-500 rounded-2xl tap-effect"><i class="fa-solid fa-trash"></i></button>
                    <button type="button" onclick="closeModal('taskModal')" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold tap-effect">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-4 bg-main text-white rounded-2xl font-bold shadow-lg tap-effect">บันทึกคิวงาน</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center font-prompt">
            <div class="w-16 h-16 bg-main rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-lock text-white text-2xl"></i></div>
            <h2 class="text-xl font-black text-main mb-6 uppercase">รหัสผ่านแอดมิน</h2>
            <input type="password" id="adminPassword" placeholder="••••" class="w-full p-4 bg-gray-50 rounded-2xl text-center font-black mb-8 outline-none text-2xl tracking-[0.5em] focus:border-main focus:ring-1">
            <div class="flex gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 py-3 rounded-2xl text-gray-400 font-bold bg-gray-100 tap-effect">ยกเลิก</button>
                <button onclick="verifyAdminLogin()" class="flex-1 py-3 rounded-2xl bg-main text-white font-bold tap-effect">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div id="contactModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border-t-8 border-indigo-600 font-prompt">
            <h2 id="contactModalTitle" class="text-xl font-black text-indigo-900 mb-6 uppercase">จัดการรายชื่อ</h2>
            <form id="contactForm" class="space-y-4">
                <input type="hidden" id="contactEditId">
                <input type="text" id="c-name" placeholder="ชื่อ-นามสกุล" required class="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold">
                <input type="text" id="c-nickname" placeholder="ชื่อเล่น" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input type="text" id="c-role" placeholder="ตำแหน่ง" required class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input type="tel" id="c-tel" placeholder="เบอร์โทรศัพท์" required class="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold">
                <select id="c-group" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                    <option value="1">1. ผู้บริหาร</option><option value="2">2. ข้าราชการ</option><option value="3">3. พนักงานจ้าง</option><option value="4">4. พนักงานจ้างเหมา</option><option value="5">5. สมาชิก อบต.</option><option value="6">6. กำนัน</option><option value="7">7. ผู้ใหญ่บ้าน</option><option value="8">8. ผู้ช่วยผู้ใหญ่บ้าน</option>
                </select>
                <div class="flex gap-3 pt-6">
                    <button type="button" onclick="closeModal('contactModal')" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold tap-effect">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg tap-effect">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const holidays2026 = { "01-01": "วันขึ้นปีใหม่", "03-03": "วันมาฆบูชา", "04-06": "วันจักรี", "04-13": "วันสงกรานต์", "04-14": "วันสงกรานต์", "04-15": "วันสงกรานต์", "05-01": "วันแรงงานแห่งชาติ", "05-04": "วันฉัตรมงคล", "05-11": "วันพืชมงคลฯ", "05-31": "วันวิสาขบูชา", "06-01": "ชดเชยวันวิสาขบูชา", "06-03": "วันเฉลิมฯ พระราชินี", "07-28": "วันเฉลิมฯ ร.10", "07-29": "วันอาสาฬหบูชา", "07-30": "วันเข้าพรรษา", "08-12": "วันแม่แห่งชาติ", "10-13": "วันนวมินทรมหาราช", "10-23": "วันปิยมหาราช", "10-26": "วันออกพรรษา", "12-05": "วันพ่อแห่งชาติ", "12-07": "ชดเชยวันพ่อแห่งชาติ", "12-10": "วันรัฐธรรมนูญ", "12-31": "วันสิ้นปี" };

        window.tasks = []; window.contacts = [];
        window.isAdmin = false; window.currentPage = 'dashboard';
        let currentViewDate = new Date();

        function handleAdminToggle() {
            if (window.isAdmin) { window.isAdmin = false; updateAdminUI(); renderAll(); } 
            else { document.getElementById('adminPassword').value = ''; openModal('loginModal'); }
        }

        function verifyAdminLogin() {
            if(document.getElementById('adminPassword').value === 'ntrd') {
                window.isAdmin = true; closeModal('loginModal'); updateAdminUI(); renderAll();
            } else { alert('รหัสผ่านแอดมินไม่ถูกต้อง!'); }
        }

        function changePage(p) {
            window.currentPage = p;
            ['dashboard','calendar','tasks','contacts'].forEach(id => {
                document.getElementById('page-'+id).classList.add('hidden');
                document.getElementById('nav-'+id).className = 'flex-1 py-4 text-gray-400 font-bold text-sm min-w-[100px] tap-effect font-prompt';
            });
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('nav-'+p).className = 'flex-1 py-4 text-main border-b-4 border-main font-bold text-sm min-w-[100px] tap-effect font-prompt';
            updateAdminUI(); renderAll();
        }

        function updateAdminUI() {
            document.getElementById('fabAdd').classList.toggle('hidden', !window.isAdmin || window.currentPage !== 'dashboard');
            document.getElementById('admin-add-contact').classList.toggle('hidden', !window.isAdmin || window.currentPage !== 'contacts');
            document.getElementById('adminIcon').className = window.isAdmin ? 'fa-solid fa-user-check text-green-400 text-xl' : 'fa-solid fa-user-shield text-lg text-white';
        }

        function getDiffDays(dateString) {
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateString); target.setHours(0,0,0,0);
            return Math.ceil((target - today) / 86400000);
        }

        function taskCardHTML(t, animate = false) {
            const diff = getDiffDays(t.startDate);
            let countdown = diff === 0 ? `<div class="absolute -top-3 -right-2 bg-red-600 text-white text-[11px] font-black px-3 py-1.5 rounded-full animate-countdown shadow-lg">วันนี้!</div>` : 
                           (diff > 0 && diff <= 10) ? `<div class="absolute -top-3 -right-2 bg-orange-500 text-white text-[11px] font-black px-3 py-1.5 rounded-full animate-countdown shadow-lg">อีก ${diff} วัน</div>` : '';
            
            return `<div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 relative tap-effect ${animate?'animate-upcoming':''} font-prompt hover:shadow-md transition-all">
                ${countdown}
                <div class="flex justify-between items-center mb-4"><span class="bg-blue-50 text-main px-3 py-1.5 rounded-xl text-sm font-bold"><i class="fa-regular fa-clock mr-1"></i>${t.startTime||'ไม่ระบุเวลา'}</span><span class="text-[10px] border px-2 py-1 rounded-lg uppercase text-gray-400 font-bold">${t.status}</span></div>
                <h4 class="font-bold text-xl leading-tight mb-4 text-gray-800">${t.title}</h4>
                <div class="text-sm text-gray-500 space-y-2">
                    <p><i class="fa-solid fa-calendar-day mr-2 text-main w-4"></i><span class="font-medium">${t.startDate}</span> ${t.endDate ? ' ถึง <span class="font-medium">' + t.endDate + '</span>' : ''}</p>
                    <p><i class="fa-solid fa-location-dot mr-2 text-main w-4"></i>${t.loc||'-'}</p>
                    <p><i class="fa-solid fa-shirt mr-2 text-main w-4"></i>การแต่งกาย: ${t.dress||'-'}</p>
                    <p><i class="fa-solid fa-user mr-2 text-main w-4"></i>รับผิดชอบ: <span class="text-main font-medium">${t.owner}</span></p>
                    ${t.coord?`<p><i class="fa-solid fa-handshake mr-2 text-main w-4"></i>ประสานงาน: ${t.coord}</p>`:''}
                </div>
                ${t.link ? `<a href="${t.link}" target="_blank" class="block mt-5 text-center py-2.5 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold border border-blue-100 hover:bg-blue-100 transition-all"><i class="fa-brands fa-google-drive mr-2"></i>เปิดไฟล์เอกสารแนบ</a>` : ''}
                ${window.isAdmin ? `<button onclick="editTask('${t.id}')" class="absolute bottom-6 right-6 w-10 h-10 bg-gray-50 text-gray-400 rounded-xl flex items-center justify-center border hover:text-main hover:bg-white"><i class="fa-solid fa-pen"></i></button>` : ''}
            </div>`;
        }

        window.renderAll = () => {
            // อัปเดตตัวเลขหน้าแรก
            document.getElementById('stat-total').innerText = window.tasks.length;
            document.getElementById('stat-pending').innerText = window.tasks.filter(t=>t.status==='รอดำเนินการ').length;
            document.getElementById('stat-active').innerText = window.tasks.filter(t=>t.status==='กำลังดำเนินการ').length;
            document.getElementById('stat-done').innerText = window.tasks.filter(t=>t.status==='เสร็จสิ้น').length;

            const todayStr = new Date().toISOString().split('T')[0];

            // 1. หน้า Dashboard (แบ่ง 2 หมวด)
            if (window.currentPage === 'dashboard') {
                const dashContainer = document.getElementById('dashboardTaskList');
                const todayTasks = window.tasks.filter(t => t.startDate === todayStr);
                const upcomingTasks = window.tasks.filter(t => t.startDate > todayStr).sort((a,b) => a.startDate.localeCompare(b.startDate)).slice(0, 10);

                let html = `
                    <div class="mb-8">
                        <h2 class="font-black text-main text-lg border-l-4 border-main pl-3 mb-4 uppercase">คิวงานวันนี้</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${todayTasks.length > 0 
                                ? todayTasks.map(t => taskCardHTML(t, false)).join('')
