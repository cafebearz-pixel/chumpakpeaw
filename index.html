    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg_kQRN64eIdhRDtIdsR24JSUiwHdT7tM",
            authDomain: "flutter-ai-playground-ca0f3.firebaseapp.com",
            projectId: "flutter-ai-playground-ca0f3",
            storageBucket: "flutter-ai-playground-ca0f3.firebasestorage.app",
            messagingSenderId: "679308094535",
            appId: "1:679308094535:web:81bd85c714926a10909562",
            databaseURL: "https://flutter-ai-playground-ca0f3-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveToCloud = (tasks, contacts) => {
            set(ref(db, 'data/'), { tasks, contacts });
        };

        onValue(ref(db, 'data/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.tasks = data.tasks || [];
                window.contacts = data.contacts || [];
                window.renderAll();
            }
        });
    </script>

        /* Modern Glass Big Number Cards */
        .glass-stat-card {
            background: rgba(255, 255, 255, 0.7);

            border: 1px solid rgba(255, 255, 255, 0.3);

    <script>
        const holidays2026 = { "01-01": "วันขึ้นปีใหม่", "03-03": "วันมาฆบูชา", "04-06": "วันจักรี", "04-13": "วันสงกรานต์", "04-14": "วันสงกรานต์", "04-15": "วันสงกรานต์", "05-01": "วันแรงงานแห่งชาติ", "05-04": "วันฉัตรมงคล", "05-11": "วันพืชมงคลฯ", "05-31": "วันวิสาขบูชา", "06-01": "ชดเชยวันวิสาขบูชา", "06-03": "วันเฉลิมฯ พระราชินี", "07-28": "วันเฉลิมฯ ร.10", "07-29": "วันอาสาฬหบูชา", "07-30": "วันเข้าพรรษา", "08-12": "วันแม่แห่งชาติ", "10-13": "วันนวมินทรมหาราช", "10-23": "วันปิยมหาราช", "10-26": "วันออกพรรษา", "12-05": "วันพ่อแห่งชาติ", "12-07": "ชดเชยวันพ่อแห่งชาติ", "12-10": "วันรัฐธรรมนูญ", "12-31": "วันสิ้นปี" };
        window.isAdmin = false; window.currentPage = 'dashboard'; window.tasks = []; window.contacts = []; let currentViewDate = new Date();

        function handleAdminToggle() { if (window.isAdmin) { window.isAdmin = false; document.getElementById('adminIcon').className = 'fa-solid fa-user-shield text-lg text-white'; document.getElementById('adminBadge').classList.add('hidden'); updateAdminVisibility(); renderAll(); } else { document.getElementById('adminPassword').value = ''; openModal('loginModal'); } }
        function verifyAdminLogin() { const pwdInput = document.getElementById('adminPassword'); if(pwdInput.value.toLowerCase() === 'ntrd') { window.isAdmin = true; pwdInput.value = ''; closeModal('loginModal'); document.getElementById('adminIcon').className = 'fa-solid fa-user-check text-green-300 text-lg'; document.getElementById('adminBadge').classList.remove('hidden'); updateAdminVisibility(); renderAll(); } else { alert("รหัสผ่านไม่ถูกต้อง"); pwdInput.value = ''; } }
        function updateAdminVisibility() { const fab = document.getElementById('fabAdd'); const addContactBtn = document.getElementById('admin-add-contact'); const statusBtn = document.getElementById('admin-status-btn'); fab.classList.toggle('hidden', !window.isAdmin || window.currentPage !== 'dashboard'); statusBtn.classList.toggle('hidden', !window.isAdmin || window.currentPage !== 'dashboard'); if(addContactBtn) addContactBtn.classList.toggle('hidden', !window.isAdmin || window.currentPage !== 'contacts'); }
        function changePage(page) { window.currentPage = page; ['dashboard', 'calendar', 'tasks', 'contacts'].forEach(p => { const el = document.getElementById('page-' + p); const nav = document.getElementById('nav-' + p); if(el) el.classList.add('hidden'); if(nav) { nav.classList.replace('text-[#152D4D]', 'text-gray-400'); nav.classList.remove('border-b-2', 'border-[#152D4D]'); } }); document.getElementById('page-' + page).classList.remove('hidden'); const activeNav = document.getElementById('nav-' + page); activeNav.classList.replace('text-gray-400', 'text-[#152D4D]'); activeNav.classList.add('border-b-2', 'border-[#152D4D]'); updateAdminVisibility(); renderAll(); }

        window.renderAll = () => { updateStats(); calculateOverallProgress(); renderDashboardTasks(); renderCalendar(); renderFullTasks(); renderContacts(); }
        function updateStats() { document.getElementById('stat-total').innerText = window.tasks.length; document.getElementById('stat-pending').innerText = window.tasks.filter(t => t.status === 'รอดำเนินการ').length; document.getElementById('stat-active').innerText = window.tasks.filter(t => t.status === 'กำลังดำเนินการ').length; document.getElementById('stat-done').innerText = window.tasks.filter(t => t.status === 'เสร็จสิ้น').length; }
        function calculateOverallProgress() { const bar = document.getElementById('overallProgressBar'); const valText = document.getElementById('overallProgressValue'); if(!bar) return; let doneTasks = window.tasks.filter(t => t.status === 'เสร็จสิ้น').length; let avg = window.tasks.length > 0 ? Math.round((doneTasks / window.tasks.length) * 100) : 0; bar.style.width = avg + '%'; valText.innerText = avg + '%'; }
        function getThaiFullDate(dateString) { if(!dateString) return ''; const days = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"]; const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"]; const d = new Date(dateString); return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`; }

        function generateTaskCardHTML(t) {
            const today = new Date().toISOString().split('T')[0];
            const isToday = t.startDate === today;
            const statusStyles = t.status === 'เสร็จสิ้น' ? 'bg-red-100 text-red-700' : (t.status === 'กำลังดำเนินการ' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700');
            return `
            <div class="bg-white rounded-[2rem] border border-gray-100 p-6 shadow-md relative tap-effect ${isToday ? 'animate-slow-bounce today-card' : ''}">
                <div class="flex justify-between items-start mb-4"><span class="text-[18px] font-medium text-main bg-blue-50 px-3 py-1 rounded-xl font-prompt">${t.startTime || 'ไม่ระบุเวลา'}</span><span class="text-[12px] font-medium px-4 py-2 rounded-full border ${statusStyles} uppercase font-prompt">${t.status}</span></div>
                <h4 class="font-medium text-[22px] text-gray-800 mb-3 leading-tight">${t.title}</h4>
                <div class="space-y-1 text-[18px] text-gray-500 font-prompt">
                    <div class="text-main font-medium mb-2 font-prompt"><i class="fa-solid fa-calendar-day mr-2 text-main text-lg w-5 h-5"></i>${getThaiFullDate(t.startDate)}</div>
                    <div class="text-[17px] font-normal"><span class="text-gray-400 text-sm">สถานที่:</span> <span class="text-gray-600">${t.loc || '-'}</span></div>
                    <div class="text-[17px] font-normal"><span class="text-gray-400 text-sm">แต่งกาย:</span> <span class="text-gray-600">${t.dress || '-'}</span></div>
                    <div class="text-[17px] font-normal"><span class="text-gray-400 text-sm">ผู้ประสาน:</span> <span class="text-gray-600">${t.coord || '-'}</span></div>
                    <div class="text-[17px] font-normal"><span class="text-gray-400 text-sm">ผู้รับผิดชอบ:</span> <span class="text-gray-600">${t.owner}</span></div>
                </div>
                ${t.link ? `<a href="${t.link}" target="_blank" class="block w-full text-center py-3 mt-4 bg-blue-50 text-blue-700 rounded-2xl font-bold border border-blue-100 tap-effect text-sm">เปิดเอกสาร</a>` : ''}
                ${window.isAdmin ? `<button onclick="editTask('${t.id}')" class="absolute top-5 right-5 w-10 h-10 bg-gray-50 text-gray-300 rounded-2xl flex items-center justify-center border hover:text-main tap-effect"><i class="fa-solid fa-pen-nib text-sm text-gray-400"></i></button>` : ''}
            </div>`;
        }

        function renderDashboardTasks() { const active = window.tasks.filter(t => t.status !== 'เสร็จสิ้น').sort((a,b) => new Date(a.startDate) - new Date(b.startDate)).slice(0, 10); document.getElementById('dashboardTaskList').innerHTML = active.map(t => generateTaskCardHTML(t)).join('') || '<p class="text-center text-gray-300 py-10 italic">ไม่มีคิวงาน</p>'; }
        function renderFullTasks() { const el = document.getElementById('fullTaskList'); if(el) el.innerHTML = window.tasks.sort((a,b) => new Date(b.startDate) - new Date(a.startDate)).map(t => generateTaskCardHTML(t)).join(''); }
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); if(!grid) return; grid.innerHTML = '<div class="font-bold text-gray-500">อา</div><div class="font-bold text-gray-500">จ</div><div class="font-bold text-gray-500">อ</div><div class="font-bold text-gray-500">พ</div><div class="font-bold text-gray-500">พฤ</div><div class="font-bold text-gray-500">ศ</div><div class="font-bold text-gray-500">ส</div>';
            const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
            const names = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('currentMonthYear').innerText = `${names[m]} ${y + 543}`;
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += `<div></div>`;
            for(let d=1; d<=days; d++) {
                const dateKey = `${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const hasTask = window.tasks.some(t => { const s = new Date(t.startDate); const e = t.endDate ? new Date(t.endDate) : s; const curr = new Date(`${y}-${dateKey}`); return curr >= s && curr <= e; });
                const holiday = (y === 2026 && holidays2026[dateKey]) ? holidays2026[dateKey] : null;
                grid.innerHTML += `<button onclick="showDateTasks('${y}-${dateKey}')" class="h-12 relative flex items-center justify-center rounded-2xl hover:bg-blue-50 transition tap-effect font-prompt ${holiday ? 'text-red-500 font-black' : 'text-gray-700'}">${d}${hasTask?'<span class="absolute bottom-1 w-1.5 h-1.5 bg-blue-600 rounded-full"></span>':''}</button>`;
            }
        }
        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth()-1); renderCalendar(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth()+1); renderCalendar(); }
        function showDateTasks(d) { const container = document.getElementById('selectedDateTasks'); if(!container) return; const dayTasks = window.tasks.filter(t => { const s = new Date(t.startDate); const e = t.endDate ? new Date(t.endDate) : s; const curr = new Date(d); return curr >= s && curr <= e; }); container.innerHTML = `<h4 class="text-sm font-black text-gray-400 mb-4 border-b pb-4 uppercase tracking-widest font-prompt leading-tight">${getThaiFullDate(d)}</h4>`; container.innerHTML += dayTasks.map(t => generateTaskCardHTML(t)).join('') || '<p class="text-center text-gray-300">ไม่มีคิวงาน</p>'; }

        function renderContacts(query = '') {
            const container = document.getElementById('contactGroups'); if(!container) return;
            const filtered = window.contacts.filter(c => c.name.includes(query) || c.role.includes(query));
            const groups = { "1": "ผู้บริหาร", "2": "ข้าราชการ", "3": "พนักงานจ้าง", "4": "พนักงานจ้างเหมา", "5": "สมาชิก อบต.", "6": "กำนัน", "7": "ผู้ใหญ่บ้าน", "8": "ผู้ช่วยผู้ใหญ่บ้าน" };
            container.innerHTML = '';
            Object.keys(groups).forEach(g => {
                const members = filtered.filter(c => c.group === g);
                if(members.length > 0) {
                    let html = `<div class="space-y-3"><h4 class="text-xs font-black text-gray-400 uppercase font-prompt pl-2 border-l-4 border-gray-200 ml-1 mb-4 leading-tight">${groups[g]}</h4>`;
                    members.forEach(m => {
                        html += `<div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm flex items-center justify-between tap-effect hover:shadow-md"><div onclick="window.location='tel:${m.tel}'" class="flex-1 cursor-pointer font-prompt">
                            <p class="font-medium text-main text-lg leading-tight mb-2 uppercase"><i class="fa-solid fa-user-circle mr-3 text-main text-lg w-5 h-5"></i>${m.name}</p>
                            <p class="text-[17px] text-gray-500 font-normal mb-1leading-tight"><i class="fa-solid fa-heart mr-3 text-main text-lg w-5 h-5"></i>${m.nickname || '-'}</p>
                            <p class="text-[17px] text-gray-500 font-normal mb-3 leading-tight"><i class="fa-solid fa-briefcase mr-3 text-main text-lg w-5 h-5"></i>${m.role}</p>
                            <p class="text-lg font-medium text-main tracking-widest"><i class="fa-solid fa-mobile-screen-button mr-3 text-main text-lg w-5 h-5"></i>${m.tel}</p>
                        </div><div class="flex flex-col gap-3"><a href="tel:${m.tel}" class="w-14 h-14 bg-green-50 text-green-700 rounded-3xl flex items-center justify-center shadow-lg hover:bg-green-100 transition tap-effect"><i class="fa-solid fa-phone text-2xl text-green-600"></i></a>${window.isAdmin ? `<div class="flex gap-2 justify-center"><button onclick="editContact('${m.id}')" class="text-gray-300 tap-effect hover:text-main"><i class="fa-solid fa-pen text-sm text-gray-300"></i></button><button onclick="deleteContact('${m.id}')" class="text-red-200 tap-effect hover:text-red-500"><i class="fa-solid fa-trash text-sm text-red-200"></i></button></div>` : ''}</div></div>`;
                    });
                    container.innerHTML += html + `</div>`;
                }
            });
        }

        function openTaskModal() { document.getElementById('taskForm').reset(); document.getElementById('taskEditId').value = ''; document.getElementById('btnDeleteTask').classList.add('hidden'); openModal('taskModal'); }
        function editTask(id) { const t = window.tasks.find(x => x.id == id); if(!t) return; document.getElementById('taskEditId').value = t.id; ['title','startDate','startTime','endDate','endTime','status','loc','dress','owner','link','coord'].forEach(k => { const el = document.getElementById(`t-${k}`); if(el) el.value = t[k] || ''; }); document.getElementById('btnDeleteTask').classList.remove('hidden'); openModal('taskModal'); }
        document.getElementById('taskForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('taskEditId').value; const data = { id: id || Date.now() }; ['title','startDate','startTime','endDate','endTime','status','loc','dress','owner','link','coord'].forEach(k => data[k] = document.getElementById(`t-${k}`).value); if(id) { const idx = window.tasks.findIndex(x => x.id == id); window.tasks[idx] = data; } else { window.tasks.push(data); } window.saveToCloud(window.tasks, window.contacts); closeModal('taskModal'); };
        function deleteTask() { if(confirm('ต้องการลบคิวงานนี้ถาวร?')) { window.tasks = window.tasks.filter(t => t.id != document.getElementById('taskEditId').value); window.saveToCloud(window.tasks, window.contacts); closeModal('taskModal'); } }

        function openContactModal() { document.getElementById('contactForm').reset(); document.getElementById('contactEditId').value = ''; openModal('contactModal'); }
        function editContact(id) { const c = window.contacts.find(x => x.id == id); if(!c) return; document.getElementById('contactEditId').value = c.id; ['name','nickname','role','tel','group'].forEach(k => { const el = document.getElementById(`c-${k}`); if(el) el.value = c[k] || ''; }); openModal('contactModal'); }
        function deleteContact(id) { if(confirm('ลบรายชื่อ?')) { window.contacts = window.contacts.filter(c => c.id != id); window.saveToCloud(window.tasks, window.contacts); } }
        document.getElementById('contactForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('contactEditId').value; const data = { id: id || Date.now(), name: document.getElementById('c-name').value, nickname: document.getElementById('c-nickname').value, role: document.getElementById('c-role').value, tel: document.getElementById('c-tel').value, group: document.getElementById('c-group').value }; if(id) { const idx = window.contacts.findIndex(x => x.id == id); window.contacts[idx] = data; } else { window.contacts.push(data); } window.saveToCloud(window.tasks, window.contacts); closeModal('contactModal'); };

        function updateMayorStatus(txt, cls) { document.getElementById('statusText').innerText = txt; document.getElementById('statusDot').className = `absolute -bottom-1 -right-1 w-6 h-6 rounded-full border-4 border-white ${cls}`; closeModal('statusModal'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); if(id === 'loginModal') document.getElementById('adminPassword').value = ''; }
    </script>
</body>
</html>
