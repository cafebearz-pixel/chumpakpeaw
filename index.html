<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวงาน อบต. ชำผักแพว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { theme: { extend: { borderRadius: { 'xl': '1rem', '2xl': '1.25rem', '3xl': '1.5rem' } } } }
    </script>

    <style>
        /* ปรับขนาดอักษรฐานเป็น 18px */
        html { font-size: 18px !important; }
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; color: #334155; }
        
        .bg-main { background-color: #152D4D; }
        
        /* แอนิเมชันเด้งวันนี้ */
        @keyframes slow-bounce { 0%, 100% { transform: translateY(-3px); } 50% { transform: translateY(3px); } }
        .animate-slow-bounce { animation: slow-bounce 2s ease-in-out infinite; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        
        /* คิวงานวันนี้ขอบกระพริบ */
        .today-border { border: 2px solid #ef4444; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="w-full max-w-5xl mx-auto min-h-screen bg-[#fcfdfe] relative flex flex-col shadow-sm">
        
        <header class="bg-main px-4 py-3 flex justify-between items-center text-white sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <img src="https://drive.google.com/thumbnail?id=1pgip9WQ97-gztB2sYoGyTWRt7tlVtmnY&sz=w200" class="w-10 h-10 object-contain">
                <span class="font-bold text-lg">CHUMPAKPAEW</span>
            </div>
            <button onclick="openAdminLoginModal()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition">
                <i id="adminIcon" class="fa-solid fa-user-shield text-lg"></i>
            </button>
        </header>

        <nav class="flex bg-white border-b py-1 sticky top-[64px] z-40 shadow-sm overflow-x-auto no-scrollbar">
            <button onclick="changePage('dashboard')" id="nav-dashboard" class="flex-1 py-2 flex flex-col items-center text-[#152D4D] border-b-2 border-[#152D4D] min-w-[80px]"><i class="fa-solid fa-house text-lg"></i><span class="text-[12px]">หน้าหลัก</span></button>
            <button onclick="changePage('calendar')" id="nav-calendar" class="flex-1 py-2 flex flex-col items-center text-gray-400 min-w-[80px]"><i class="fa-solid fa-calendar-alt text-lg"></i><span class="text-[12px]">ปฏิทิน</span></button>
            <button onclick="changePage('tasks')" id="nav-tasks" class="flex-1 py-2 flex flex-col items-center text-gray-400 min-w-[80px]"><i class="fa-solid fa-tasks text-lg"></i><span class="text-[12px]">งานทั้งหมด</span></button>
            <button onclick="changePage('contacts')" id="nav-contacts" class="flex-1 py-2 flex flex-col items-center text-gray-400 min-w-[80px]"><i class="fa-solid fa-phone-alt text-lg"></i><span class="text-[12px]">เบอร์โทร</span></button>
        </nav>

        <main id="mainContent" class="flex-1 p-4 space-y-6">
            
            <section id="page-dashboard" class="space-y-5">
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between card-shadow">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <img src="https://drive.google.com/thumbnail?id=1ET2DmRqMeDl1f13eL9EZpxr_FNvtZpwM&sz=w200" class="w-16 h-16 rounded-full object-cover border-2 border-white shadow-sm">
                            <div id="statusDot" class="absolute bottom-0 right-0 w-4 h-4 rounded-full border-2 border-white bg-green-500"></div>
                        </div>
                        <div>
                            <h2 class="font-bold text-[#152D4D] text-lg">นายกณัฐรดา กล้าหาญ</h2>
                            <p id="statusText" class="text-gray-500 text-sm">อยู่อบต./ห้องทำงาน</p>
                        </div>
                    </div>
                    <button id="admin-status-btn" onclick="openModal('statusModal')" class="hidden w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fa-solid fa-ellipsis-v"></i></button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div style="background-color: #E0E7FF" class="p-4 rounded-2xl text-center shadow-sm">
                        <p class="text-indigo-600 font-bold text-xs uppercase tracking-wider">ทั้งหมด</p>
                        <h3 id="stat-total" class="text-3xl font-black text-indigo-900 mt-1">0</h3>
                    </div>
                    <div style="background-color: #FEF3C7" class="p-4 rounded-2xl text-center shadow-sm">
                        <p class="text-amber-700 font-bold text-xs uppercase tracking-wider">รอดำเนินการ</p>
                        <h3 id="stat-pending" class="text-3xl font-black text-amber-900 mt-1">0</h3>
                    </div>
                    <div style="background-color: #D0F9E5" class="p-4 rounded-2xl text-center shadow-sm">
                        <p class="text-emerald-700 font-bold text-xs uppercase tracking-wider">กำลังทำ</p>
                        <h3 id="stat-active" class="text-3xl font-black text-emerald-900 mt-1">0</h3>
                    </div>
                    <div style="background-color: #EF4444" class="p-4 rounded-2xl text-center shadow-sm">
                        <p class="text-white font-bold text-xs uppercase tracking-wider">เสร็จสิ้น</p>
                        <h3 id="stat-done" class="text-3xl font-black text-white mt-1">0</h3>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-gray-100 card-shadow">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-sm text-gray-600 uppercase tracking-widest">ความคืบหน้าภาพรวม</h3>
                        <span id="overallProgressValue" class="text-blue-600 font-black text-lg">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
                        <div id="overallProgressBar" class="bg-main h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold text-[#152D4D] border-l-4 border-[#152D4D] pl-2">คิวงานสำคัญ</h3>
                        <span id="taskCountBadge" class="text-xs font-bold text-gray-400"></span>
                    </div>
                    <div id="dashboardTaskList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </section>

            <section id="page-calendar" class="hidden space-y-4">
                <div class="bg-white p-4 rounded-2xl border card-shadow">
                    <div class="flex justify-between items-center mb-4">
                        <button onclick="prevMonth()" class="w-8 h-8 rounded-full bg-gray-50"><i class="fa-solid fa-chevron-left"></i></button>
                        <h3 id="currentMonthYear" class="font-bold text-[#152D4D]"></h3>
                        <button onclick="nextMonth()" class="w-8 h-8 rounded-full bg-gray-50"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="grid grid-cols-7 text-center text-xs font-bold text-gray-400 mb-2">
                        <div class="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-400">ส</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center font-medium"></div>
                </div>
                <div id="selectedDateTasks" class="space-y-3"></div>
            </section>

            <section id="page-tasks" class="hidden space-y-3">
                <h3 class="font-bold text-[#152D4D] border-l-4 border-blue-500 pl-2">คิวงานทั้งหมด</h3>
                <div id="fullTaskList" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </section>

            <section id="page-contacts" class="hidden space-y-4">
                <input type="text" onkeyup="renderContacts(this.value)" placeholder="ค้นหาชื่อหรือตำแหน่ง..." class="w-full p-3 bg-white rounded-xl border-gray-200 card-shadow">
                <div id="contactGroups" class="space-y-4"></div>
                <button id="admin-add-contact" onclick="openContactModal()" class="hidden w-full py-3 rounded-xl border-2 border-dashed border-[#152D4D] text-[#152D4D] font-bold">เพิ่มรายชื่อ</button>
            </section>

        </main>

        <footer class="bg-white border-t flex justify-around p-3 pb-6 z-40">
            <a href="https://www.chumpakpaew.go.th" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-globe text-xl mb-1"></i><span class="text-[10px]">เว็บ</span></a>
            <a href="https://www.facebook.com/xbt.cha.phak.ph.w" class="flex flex-col items-center text-gray-400"><i class="fa-brands fa-facebook text-xl mb-1"></i><span class="text-[10px]">เฟสบุ๊ก</span></a>
            <a href="https://lin.ee/dCB8MH3" class="flex flex-col items-center text-gray-400"><i class="fa-brands fa-line text-xl mb-1"></i><span class="text-[10px]">ไลน์</span></a>
            <a href="tel:036-714-081" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-phone text-xl mb-1"></i><span class="text-[10px]">โทร</span></a>
        </footer>

        <button id="fabAdd" onclick="openTaskModal()" class="hidden fixed bottom-24 right-5 w-14 h-14 bg-main text-white rounded-full shadow-lg flex items-center justify-center text-xl z-50 border-2 border-white">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-4">
                <h2 id="taskModalTitle" class="text-xl font-bold text-[#152D4D]">ลงคิวงาน</h2>
                <button onclick="closeModal('taskModal')" class="text-gray-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="taskForm" class="space-y-4 text-sm">
                <input type="hidden" id="taskEditId">
                <div><label class="block font-bold mb-1">ชื่องาน *</label><input type="text" id="t-title" required class="w-full p-2.5 bg-gray-50 rounded-xl border"></div>
                
                <div class="bg-blue-50 p-3 rounded-xl">
                    <div class="flex justify-between mb-1"><label class="font-bold text-xs text-blue-800">ความคืบหน้างาน</label><span id="progressValue" class="font-bold text-blue-800">0%</span></div>
                    <input type="range" id="t-progress" min="0" max="100" value="0" class="w-full h-1.5 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="document.getElementById('progressValue').innerText = this.value + '%'">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block font-bold mb-1">เริ่มวันที่ *</label><input type="date" id="t-startDate" required class="w-full p-2 bg-gray-50 rounded-lg border text-xs"></div>
                    <div><label class="block font-bold mb-1">เวลาเริ่ม</label><input type="time" id="t-startTime" class="w-full p-2 bg-gray-50 rounded-lg border text-xs"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block font-bold mb-1">ถึงวันที่</label><input type="date" id="t-endDate" class="w-full p-2 bg-gray-50 rounded-lg border text-xs"></div>
                    <div><label class="block font-bold mb-1">เวลาสิ้นสุด</label><input type="time" id="t-endTime" class="w-full p-2 bg-gray-50 rounded-lg border text-xs"></div>
                </div>

                <div><label class="block font-bold mb-1 text-gray-700 font-bold">สถานะ</label>
                    <select id="t-status" class="w-full p-2.5 bg-gray-50 rounded-xl border">
                        <option>รอดำเนินการ</option><option>กำลังดำเนินการ</option><option>เสร็จสิ้น</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block font-bold mb-1">สถานที่</label><input type="text" id="t-loc" class="w-full p-2.5 bg-gray-50 rounded-xl border"></div>
                    <div><label class="block font-bold mb-1">การแต่งกาย</label><input type="text" id="t-dress" class="w-full p-2.5 bg-gray-50 rounded-xl border"></div>
                </div>

                <div><label class="block font-bold mb-1">ผู้รับผิดชอบ</label>
                    <select id="t-owner" class="w-full p-2.5 bg-gray-50 rounded-xl border">
                        <option>นายก</option><option>รองมานิต</option><option>รองบุญโฮม</option><option>เลขามาลี</option><option>ปลัด</option><option>กองช่าง</option>
                    </select>
                </div>
                
                <div><label class="block font-bold mb-1">ลิงก์ Drive (ถ้ามี)</label><input type="url" id="t-link" placeholder="https://..." class="w-full p-2.5 bg-gray-50 rounded-xl border"></div>
                
                <div class="pt-2 flex gap-2">
                    <button type="submit" class="flex-1 py-3 bg-main text-white rounded-xl font-bold shadow-md">บันทึกคิวงาน</button>
                    <button type="button" id="btnDeleteTask" onclick="deleteTask()" class="hidden px-4 bg-red-50 text-red-500 rounded-xl font-bold"><i class="fa-solid fa-trash"></i></button>
                </div>
            </form>
        </div>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 z-[200] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm"><div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl text-center"><h2 class="text-xl font-bold text-[#152D4D] mb-4">แอดมินเข้าสู่ระบบ</h2><input type="password" id="adminPassword" placeholder="รหัสผ่าน..." class="w-full p-3 bg-gray-50 rounded-xl border text-center font-bold tracking-widest mb-4"><div class="flex gap-2"><button onclick="closeModal('loginModal')" class="flex-1 py-3 rounded-xl bg-gray-100 font-bold">ยกเลิก</button><button onclick="verifyAdminLogin()" class="flex-1 py-3 rounded-xl bg-main text-white font-bold">ตกลง</button></div></div></div>
    <div id="statusModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4"><div class="bg-white w-full max-w-xs rounded-2xl p-5"><h3 class="font-bold mb-4 text-center">อัปเดตสถานะนายก</h3><div class="grid gap-2"><button onclick="updateMayorStatus('อยู่อบต./ห้องทำงาน', 'bg-green-500')" class="p-3 bg-green-50 text-green-700 rounded-xl font-bold">🟢 อยู่อบต.</button><button onclick="updateMayorStatus('ลงพื้นที่/ติดภารกิจ', 'bg-yellow-500')" class="p-3 bg-yellow-50 text-yellow-700 rounded-xl font-bold">🟡 ลงพื้นที่</button><button onclick="updateMayorStatus('ไม่อยู่อบต.', 'bg-red-500')" class="p-3 bg-red-50 text-red-700 rounded-xl font-bold">🔴 ไม่อยู่อบต.</button></div><button onclick="closeModal('statusModal')" class="w-full mt-3 py-2 text-gray-400 font-bold">ปิด</button></div></div>
    <div id="contactModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4"><div class="bg-white w-full max-w-sm rounded-2xl p-5"><h2 id="contactModalTitle" class="text-lg font-bold mb-4">เพิ่มรายชื่อ</h2><form id="contactForm" class="space-y-3"><input type="hidden" id="contactEditId"><input type="text" id="c-name" placeholder="ชื่อ" required class="w-full p-2.5 bg-gray-50 rounded-xl border"><input type="text" id="c-role" placeholder="ตำแหน่ง" required class="w-full p-2.5 bg-gray-50 rounded-xl border"><input type="tel" id="c-tel" placeholder="เบอร์โทร" required class="w-full p-2.5 bg-gray-50 rounded-xl border"><select id="c-group" class="w-full p-2.5 bg-gray-50 rounded-xl border"><option value="1">1. ผู้บริหาร</option><option value="2">2. ข้าราชการ</option><option value="3">3. สมาชิก อบต.</option><option value="4">4. กำนัน/ผู้ใหญ่บ้าน</option></select><div class="flex gap-2 pt-2"><button type="submit" class="flex-1 py-3 bg-main text-white rounded-xl font-bold">บันทึก</button><button type="button" onclick="closeModal('contactModal')" class="px-4 bg-gray-100 font-bold">ยกเลิก</button></div></form></div></div>

    <script>
        const holidays2026 = { "01-01": "ปีใหม่", "03-03": "มาฆบูชา", "04-06": "จักรี", "04-13": "สงกรานต์", "04-14": "สงกรานต์", "04-15": "สงกรานต์", "05-01": "แรงงาน", "05-04": "ฉัตรมงคล", "05-11": "พืชมงคล", "05-31": "วิสาขบูชา", "06-01": "ชดเชยวิสาขฯ", "06-03": "เฉลิมฯ ราชินี", "07-28": "เฉลิมฯ ร.10", "07-29": "อาสาฬหบูชา", "07-30": "เข้าพรรษา", "08-12": "แม่แห่งชาติ", "10-13": "นวมินทรมหาราช", "10-23": "ปิยมหาราช", "10-26": "ออกพรรษา", "12-05": "พ่อแห่งชาติ", "12-07": "ชดเชยวันพ่อ", "12-10": "รัฐธรรมนูญ", "12-31": "สิ้นปี" };

        let isAdmin = false;
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let contacts = JSON.parse(localStorage.getItem('contacts')) || [{ id: 1, name: "นายสมชาย ใจดี", role: "ปลัด อบต.", tel: "081-111-1111", group: "2" }];
        let currentViewDate = new Date();

        window.onload = () => { renderAll(); };

        function changePage(page) {
            ['dashboard', 'calendar', 'tasks', 'contacts'].forEach(p => { 
                document.getElementById('page-' + p).classList.add('hidden'); 
                document.getElementById('nav-' + p).classList.replace('text-[#152D4D]', 'text-gray-400');
                document.getElementById('nav-' + p).classList.remove('border-b-2', 'border-[#152D4D]');
            });
            document.getElementById('page-' + page).classList.remove('hidden'); 
            document.getElementById('nav-' + page).classList.replace('text-gray-400', 'text-[#152D4D]');
            document.getElementById('nav-' + page).classList.add('border-b-2', 'border-[#152D4D]');
        }

        function openAdminLoginModal() { if(isAdmin){if(confirm("ออกจากระบบแอดมิน?")){isAdmin=false; location.reload();} return;} document.getElementById('adminPassword').value = ''; document.getElementById('loginModal').classList.remove('hidden'); }
        function verifyAdminLogin() { if(document.getElementById('adminPassword').value.toLowerCase() === 'ntrd') { isAdmin = true; closeModal('loginModal'); document.getElementById('adminIcon').classList.replace('fa-user-shield', 'fa-user-check'); document.getElementById('adminIcon').classList.add('text-green-300'); document.querySelectorAll('#admin-status-btn, #admin-add-contact, #fabAdd').forEach(el => el.classList.remove('hidden')); renderAll(); } else { alert("รหัสผ่านไม่ถูกต้อง!"); } }

        function renderAll() { updateStats(); calculateOverallProgress(); renderDashboardTasks(); renderCalendar(); renderFullTasks(); renderContacts(); }

        function updateStats() {
            document.getElementById('stat-total').innerText = tasks.length;
            document.getElementById('stat-pending').innerText = tasks.filter(t => t.status === 'รอดำเนินการ').length;
            document.getElementById('stat-active').innerText = tasks.filter(t => t.status === 'กำลังดำเนินการ').length;
            document.getElementById('stat-done').innerText = tasks.filter(t => t.status === 'เสร็จสิ้น').length;
        }

        function calculateOverallProgress() {
            if(tasks.length === 0) {
                document.getElementById('overallProgressValue').innerText = '0%';
                document.getElementById('overallProgressBar').style.width = '0%';
                return;
            }
            let total = tasks.reduce((sum, t) => sum + (t.status === 'เสร็จสิ้น' ? 100 : parseInt(t.progress || 0)), 0);
            let avg = Math.round(total / tasks.length);
            document.getElementById('overallProgressValue').innerText = avg + '%';
            document.getElementById('overallProgressBar').style.width = avg + '%';
        }

        function formatDateShort(dateString) {
            if(!dateString) return '';
            const d = new Date(dateString);
            const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            return `${d.getDate()} ${months[d.getMonth()]}`;
        }

        function generateTaskCardHTML(t) {
            const today = new Date().toISOString().split('T')[0];
            const startObj = new Date(t.startDate);
            const diff = Math.ceil((startObj - new Date(today)) / (1000 * 60 * 60 * 24));
            
            const isToday = t.startDate === today;
            let badge = isToday ? `<span class="bg-red-500 text-white px-2 py-0.5 rounded text-[10px] font-bold animate-pulse">วันนี้</span>` : 
                        (diff === 1 ? `<span class="bg-blue-500 text-white px-2 py-0.5 rounded text-[10px] font-bold">พรุ่งนี้</span>` : 
                        (diff > 1 ? `<span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-[10px] font-bold">อีก ${diff} วัน</span>` : ''));

            const statusStyles = t.status === 'เสร็จสิ้น' ? 'bg-red-100 text-red-700' : (t.status === 'กำลังดำเนินการ' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700');

            return `
            <div class="bg-white rounded-2xl border border-gray-100 p-4 shadow-sm relative ${isToday ? 'animate-slow-bounce today-border' : ''}">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-2">
                        ${badge}
                        <span class="text-xs font-bold text-gray-400">${formatDateShort(t.startDate)} ${t.startTime || ''}</span>
                    </div>
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded ${statusStyles}">${t.status}</span>
                </div>
                <h4 class="font-bold text-gray-800 mb-2 leading-snug">${t.title}</h4>
                <div class="grid grid-cols-1 gap-1 text-xs text-gray-500 mb-3">
                    <div class="flex items-center gap-2"><i class="fa-solid fa-location-dot w-3"></i> ${t.loc || '-'}</div>
                    <div class="flex items-center gap-2"><i class="fa-solid fa-shirt w-3"></i> ${t.dress || '-'}</div>
                    <div class="flex items-center gap-2"><i class="fa-solid fa-user-tie w-3"></i> ${t.owner}</div>
                </div>
                ${t.link ? `<a href="${t.link}" target="_blank" class="block w-full text-center py-2 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold border border-blue-100 hover:bg-blue-100 transition"><i class="fa-brands fa-google-drive mr-1"></i> เอกสารแนบ</a>` : ''}
                ${isAdmin ? `<button onclick="editTask('${t.id}')" class="absolute top-4 right-4 text-gray-300 hover:text-blue-500"><i class="fa-solid fa-pen text-xs"></i></button>` : ''}
            </div>`;
        }

        function renderDashboardTasks() {
            const active = tasks.filter(t => t.status !== 'เสร็จสิ้น').sort((a,b) => new Date(a.startDate) - new Date(b.startDate)).slice(0, 10);
            document.getElementById('taskCountBadge').innerText = `${active.length} งาน`;
            document.getElementById('dashboardTaskList').innerHTML = active.map(t => generateTaskCardHTML(t)).join('') || '<p class="text-center text-gray-400 text-sm py-8">ไม่มีคิวงานค้าง</p>';
        }

        function renderFullTasks() {
            document.getElementById('fullTaskList').innerHTML = tasks.sort((a,b) => new Date(b.startDate) - new Date(a.startDate)).map(t => generateTaskCardHTML(t)).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const names = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('currentMonthYear').innerText = `${names[m]} ${y + 543}`;
            for(let i=0; i<first; i++) grid.innerHTML += `<div></div>`;
            for(let d=1; d<=days; d++) {
                const dateKey = `${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const dateStr = `${y}-${dateKey}`;
                const hasTask = tasks.some(t => { const s = new Date(t.startDate); const e = t.endDate ? new Date(t.endDate) : s; const curr = new Date(dateStr); return curr >= s && curr <= e; });
                const holiday = (y === 2026 && holidays2026[dateKey]) ? holidays2026[dateKey] : null;
                grid.innerHTML += `<button onclick="showDateTasks('${dateStr}')" class="h-10 relative flex items-center justify-center rounded-lg hover:bg-blue-50 transition ${holiday ? 'text-red-500 font-bold' : 'text-gray-700'}">${d} ${hasTask ? `<span class="absolute bottom-1 w-1 h-1 bg-blue-600 rounded-full"></span>` : ''}</button>`;
            }
        }
        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth()-1); renderCalendar(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth()+1); renderCalendar(); }
        function showDateTasks(d) {
            const container = document.getElementById('selectedDateTasks');
            const dayTasks = tasks.filter(t => { const s = new Date(t.startDate); const e = t.endDate ? new Date(t.endDate) : s; const curr = new Date(d); return curr >= s && curr <= e; });
            container.innerHTML = `<h4 class="text-xs font-bold text-gray-400 border-b pb-1">คิวงานวันที่ ${formatDateShort(d)}</h4>`;
            container.innerHTML += dayTasks.map(t => generateTaskCardHTML(t)).join('') || '<p class="text-xs text-gray-300 py-2">ไม่มีคิวงาน</p>';
        }

        function renderContacts(query = '') {
            const container = document.getElementById('contactGroups');
            const filtered = contacts.filter(c => c.name.includes(query) || c.role.includes(query));
            const groups = { "1": "ผู้บริหาร", "2": "ข้าราชการ", "3": "สมาชิก อบต.", "4": "ผู้นำชุมชน" };
            container.innerHTML = '';
            Object.keys(groups).forEach(g => {
                const members = filtered.filter(c => c.group === g);
                if(members.length > 0) {
                    let html = `<div class="space-y-2"><h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-1">${groups[g]}</h4>`;
                    members.forEach(m => {
                        html += `<div class="bg-white p-4 rounded-xl border border-gray-50 shadow-sm flex items-center justify-between"><div onclick="window.location='tel:${m.tel}'" class="flex-1"><p class="font-bold text-gray-800 text-sm">${m.name}</p><p class="text-[10px] text-gray-400 mb-1">${m.role}</p><p class="text-lg font-black text-blue-600 tracking-tighter">${m.tel}</p></div><div class="flex flex-col gap-2"><a href="tel:${m.tel}" class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center shadow-sm"><i class="fa-solid fa-phone text-sm"></i></a>${isAdmin ? `<div class="flex gap-1"><button onclick="editContact('${m.id}')" class="text-gray-300"><i class="fa-solid fa-pen text-[10px]"></i></button><button onclick="deleteContact('${m.id}')" class="text-red-200"><i class="fa-solid fa-trash text-[10px]"></i></button></div>` : ''}</div></div>`;
                    });
                    container.innerHTML += html + `</div>`;
                }
            });
        }

        function openTaskModal() { document.getElementById('taskForm').reset(); document.getElementById('taskEditId').value = ''; document.getElementById('progressValue').innerText = '0%'; document.getElementById('t-progress').value = 0; document.getElementById('taskModalTitle').innerText = 'ลงคิวงานใหม่'; document.getElementById('btnDeleteTask').classList.add('hidden'); openModal('taskModal'); }
        function editTask(id) { const t = tasks.find(x => x.id == id); document.getElementById('taskEditId').value = t.id; ['title','startDate','startTime','endDate','endTime','status','loc','dress','owner','link'].forEach(k => document.getElementById(`t-${k}`).value = t[k] || ''); document.getElementById('t-progress').value = t.progress || 0; document.getElementById('progressValue').innerText = (t.progress || 0) + '%'; document.getElementById('taskModalTitle').innerText = 'แก้ไขคิวงาน'; document.getElementById('btnDeleteTask').classList.remove('hidden'); openModal('taskModal'); }
        document.getElementById('taskForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('taskEditId').value; const data = { id: id || Date.now(), progress: document.getElementById('t-progress').value }; ['title','startDate','startTime','endDate','endTime','status','loc','dress','owner','link'].forEach(k => data[k] = document.getElementById(`t-${k}`).value); if(id) { tasks[tasks.findIndex(x => x.id == id)] = data; } else { tasks.push(data); } saveAndClose('taskModal'); };
        function deleteTask() { if(confirm('ลบงานนี้?')) { tasks = tasks.filter(t => t.id != document.getElementById('taskEditId').value); saveAndClose('taskModal'); } }

        function openContactModal() { document.getElementById('contactForm').reset(); document.getElementById('contactEditId').value = ''; document.getElementById('contactModalTitle').innerText = 'เพิ่มรายชื่อ'; openModal('contactModal'); }
        function editContact(id) { const c = contacts.find(x => x.id == id); document.getElementById('contactEditId').value = c.id; document.getElementById('c-name').value = c.name; document.getElementById('c-role').value = c.role; document.getElementById('c-tel').value = c.tel; document.getElementById('c-group').value = c.group; document.getElementById('contactModalTitle').innerText = 'แก้ไขรายชื่อ'; openModal('contactModal'); }
        function deleteContact(id) { if(confirm('ลบ?')) { contacts = contacts.filter(c => c.id != id); saveAndRefresh(); } }
        document.getElementById('contactForm').onsubmit = (e) => { e.preventDefault(); const id = document.getElementById('contactEditId').value; const data = { id: id || Date.now(), name: document.getElementById('c-name').value, role: document.getElementById('c-role').value, tel: document.getElementById('c-tel').value, group: document.getElementById('c-group').value }; if(id) { contacts[contacts.findIndex(x => x.id == id)] = data; } else { contacts.push(data); } saveAndClose('contactModal'); };

        function updateMayorStatus(txt, cls) { document.getElementById('statusText').innerText = txt; document.getElementById('statusDot').className = `absolute bottom-0 right-0 w-4 h-4 rounded-full border-2 border-white ${cls}`; closeModal('statusModal'); }
        function saveAndRefresh() { localStorage.setItem('tasks', JSON.stringify(tasks)); localStorage.setItem('contacts', JSON.stringify(contacts)); renderAll(); }
        function saveAndClose(m) { saveAndRefresh(); closeModal(m); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
